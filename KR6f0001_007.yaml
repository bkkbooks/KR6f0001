body:
  text: 爾時佛告無邊莊嚴有諸天神住雞羅娑山彼等天神能令諸說法者六根清淨於諸演說開示法時助其語業令相續說即說呪曰鉢囉二合多鉢怛底一吠嚧折那筏底二沒陀末底三嚩蘇末底四達摩末底五遏三鉢囉二合謀上沙筏底六粵皤珊㮈唎設曩筏底七烏波僧荷囉涅弟賖筏底八佛言無邊莊嚴有諸天神住娑羅林彼等天神能令諸說法者身語意業皆悉清淨及能令彼言音清徹謂美妙聲可愛樂聲及能授與愛語不相違語即說呪曰涅囉引藍婆阿孽囉二合羯嚟一乞曬麼毗制曳二涅皤娑筏底三涅荷囉筏底四烏闍筏底五烏波曩酩底六烏波僧荷囉羯囉尼上七阿引尾捨他八伊荷馱囉尼目溪九達摩目溪十達摩波吒嚟十一佛言無邊莊嚴有諸天神住雪山南面彼等天神為說法者於此法中勤修行者樂求法者愛樂法者益其精氣即說呪曰羯唎耶二合曩遏他二合微薩若儞一驕賖唎耶二合怒孽帝二嗚播引耶僧仡唎二合呬引帝三微寧目帝四扇引多鉢那微薩囉儞五烏皤引上婆耶賒筏底六佛言無邊莊嚴有諸天神住大海岸彼等天神為聞法故為諸法師而作安樂如來為欲利益彼故說此呪句及天帝釋亦能授與此諸呪句此是能攝帝釋等句即說呪曰麼棄鉢底一麼蘇莽底二泥引婆上阿囉二合若三舍至鉢底四薩婆阿蘇囉曩五涅羅二合伽引多儞六未而曬二合野七素鉢囉二合底瑟恥多八鉢囉二合莽阿囉二合娜怒上比九阿素囉上喃十泥嚩南上阿地鉢砧知臨反十一薩上十二那布囉塞仡唎二合覩引呬涅十三泥微呬庶上皤上細十四嚩引娑嚩薩那十五布爛㮈囉十六都十七多引閉肆十八阿素囉二合薩那十九墮喏上阿䞘其迄反林二十多嚩二合鉢施埵二十一微圖孕二合肆多二十二麼訶素囉二十三阿素麗那囉二合鉢囉演底二十四避引多囉二合悉多二合二十五那輸地賒二十六那莽勃陀肆也二合二十七已曷底二合使曳二合二十八曩麼獄去多囉二合二十九摩訶野舍三十泥嚩引阿素囉肆酩三十一僧孽囉二合名上三十二勃陀攝陀三十三阿耨多囉三十四室囉二合末斯三十五泥嚩微誓耶三十六那麼勃陀引底曩引莽斯三十七僧上羯囉二合麼闡引那去斯末捻引三十八勃陀囊引銘曩嚩呬多三十九微誓曳素四十多多泥嚩四十一阿素囉室者二合四十二微寧多𭊃四十三訖里二合多引帝四十四囉乞沙二合泥嚩引南上四十五麼努沙引南四十六囉乞沙二合三上尾那四十七曳翳訶四十八達麼儞泥世四十九污多囒二合底五十素引鉢囉二合底瑟恥二合多五十一寧疙魚近反里二合呬多五十二多嚩二合夜引阿素引囉五十三阿囉二合去灑二合娑藥叉緊那囉五十四曩引伽鳩盤吒步多儞五十五毗舍引遮那曩嚩多他五十六阿者羅悉他上二合曩五十七鉢囉二合鉢覩肆五十八印那囉二合印那囉二合五十九布囉二合塞訖里二合多六十阿底嚴毗引囉六十一扇引旦引者六十二阿孽囉二合布𡀔沙六十三細引尾囊六十四鉢囉二合攘漫覩引肆六十五泥末那囉二合六十六勃地麼引多他微庶路二合多六十七阿引末捨翳訶六十八素多囉二合肆氏六十九阿囉二合乞沙二合三上末娜呬多七十娑訶薩囉二合泥多囉二合七十一素引目佉罨播娑二合麗七十二鉢唎嚩引履多七十三污波悶攘汝陽反薩嚩二合甘羯忙七十四布囉二合迷呬覩肆銘七十五野訖唎二合檐七十六阿底鉢始遮七十七阿努鉢囉二合沒多七十八阿者羅素鉢唎二合底瑟恥二合多七十九訖里二合膽呬八十據舍藍布囉二合迷八十一麼怒世數八十二忙呬引鉢底八十三布囉嚩二合虛牟肆八十四泥嚩引南上八十五布𡂉印底八十六答嚩忙努引沙上八十七勃陀肆野二合訖唎二合得嚩二合八十八薩得迦二合藍八十九布闍陛殺底九十帝莫呼九十一摩訶嚩莽寧九十二微者藍皤嚩南者九十三素庶引皤底九十四泥嚩來野肆去九十五莽地野二合肆氏九十六野去疏二合呬九十七播履嚩履覩九十八鉢囉二合灆磨九十九呵唎磨𤙖者一百多嚩肆迦一百一微舍那阿疙囉二合嚩引呬一百二娑哆底麼底一百三素囉多鉢囉二合底一百四娑囉多娑多他一百五鉢囉二合部引薩建陀一百六阿儞囉者莽囉者一百七摩訶磨霓一百八摩訶薩建引陀一百九摩訶計都一百十素鉢囉二合地者一百十一摩訶磨囉一百十二翳帝藥叉一百十三摩訶帝喏一百十四阿囉二合乞羼二合底皤嚩南多嚩一百十五摩護藥叉鉢唎二合嚩引𡀔一百十六曳那輸皤肆嚩娑嚩一百十七摩素薩嚩嚩素底喏一百十八摩訶帝喏摩訶仰儞一百十九摩訶鉢囉二合訶囉怒制嚩一百二十阿尾呬上娑那耶引多替嚩者一百二十一素名嚧暮囉陀二合儞一百二十二多嚩嚩娑嚩一百二十三薩嚩泥嚩一百二十四布囉塞訖唎二合覩一百二十五庶去引婆底一百二十六婆嚩曩污婆引娑一百二十七鉢囉二合磨悶者肆一百二十八底喏娑一百二十九佛言無邊莊嚴此是能攝帝釋等句若善男子趣菩提者於彼後時有諸衆生攝受法者及為衆生攝法善巧得安住者由是諸句天帝釋等而當授與此等諸句佛言無邊莊嚴何者是能攝四天王并眷屬句而說頌曰於彼住夜叉無忿無擾亂多聞之長子及父咸恭敬刪闍耶夜叉及諸勝軍旅而常擁護彼愛樂此法者持國大神王恆將諸眷屬彼亦常衛護善說此經者醜目之眷屬自身與軍衆若能住此教一切當擁護增長王亦爾軍旅及諸衆愛樂此法者普皆作衛護幢幡大幢力此住於東方大稱羅剎斯彼皆攝入此而於此法門有能受持者自身與眷屬常親近守護藍婆毗羯遮并及悉馱多奚離末底等此皆住南方侍衛於帝釋彼皆攝入此擁護益精氣一切智者說劍離三蜜多及伽羅繫翅并與蜜室多名稱羅剎斯皆住於西方此等皆攝來說法了義者一切常擁護實諦有實諦名稱羅剎斯深信於此法彼住於北方佛為擁護故攝彼來入此由如來威力一切合掌住佛言無邊莊嚴何者是能攝四天王并諸眷屬侍從內宮令入之句即說呪曰散寧微舍儞一摩訶引薩嚟二摩訶揭儞三摩訶揭若儞四鉢囉二合步引多微誓曳五馱嚩二合社阿孽囉六污播嚩引薩儞七阿儞邏引細曩覩娑呵八曩曩筏囊㮈賒儞舍九折埵唎引路引迦播引囉儞十覩肆銘囉引若曩污折他十一阿引吠設娜十二伊呵薩曼嚩引呵囉他去十三勿囉二合𡂉寧孽囉二合呵十四薩迷折突地捨十五佛言無邊莊嚴何者是摧伏魔波旬句汝應諦聽善思念之即說呪曰蜜底麗二合一蜜多囉嚩底二迦𡀔寧三迦𡀔曩嚩底四微步引底五微步引多嚩底六鉢囉二合牟折儞七鉢囉二合牟折囊嚩底八訖唎二合多訖唎二合多嚩底九阿怒仰酩十阿怒仰莽嚩底十一塢播引多掣娜儞十二伽引麼微嚩攘儞十三底唎二合瑟曩二合娑牟姝去殺儞十四儞孽唎二合呬引多忙引囉嚩藍十五嗢多囉囊嚩底十六鉢囉二合底與二合多囉嚩底十七塢閉引去沙怒娑呬帝十八阿引灆麼囊微輸馱儞十九寧那囉二合舍曩二十阿三引暮引訶儞二十一儞瑟二合鉢囉二合半引者寧二十二佛言無邊莊嚴此是摧伏魔波旬句由是句故不令天魔及諸軍衆而得其便佛言無邊莊嚴何者是能攝彼大梵天句汝今諦聽善思念之即說呪曰阿地鉢底一摩訶悉他去引二合曩上筏底二娑嚩二合琰訖唎二合多三悉他引二合曩酩底四曩曩摩護微尾馱五鉢囉二合底與二合播薩他二合曩伽囉曩六阿地伽薩他二合曩鉢底七庶馱薩他引二合曩孽覩八娑含引鉢底九阿地羯爛引二合多十微庶引馱曩十一庶婆鉢唎十二鉢囉庶皤引地目多十三鉢囉二合勃多二合室唎二合多十四儞嚩引娑囊十五鉢囉二合步引多十六鉢囉二合皤十七儞孽囉二合蹊引多伽上麼十八娑嚩二合悉底二合伽引麼十九鉢囉二合底與二合播薩他引二合曩二十佛言無邊莊嚴此是能攝大梵天句由是句故大梵諸天能授與彼諸說法師清淨妙善等引梵行圓滿文句佛言無邊莊嚴何者是淨居諸天法光明句汝今諦聽善思念之即說呪曰微輸引馱曩嚩底一案底麼伽引嚕儞二伽引麼磨嚩三塢娑引多上儞四鉢囉二合涅酩多引儞五鉢唎二合演多六鉢囉二合底與二合波悉他二合曩鉢耶引七嚩娑引曩八阿引賴耶微輸引馱儞九阿引攘鉢演多伽囉儞十案底麼泥上舍十一鉢囉二合底與二合播悉他引二合寧十二佛言無邊莊嚴此是淨居諸天法光明句由是呪句而能授與諸善男子我諸法藏佛言無邊莊嚴若有天王人王阿修羅王迦樓羅王及諸龍王或大威德小威德者若信不信諸衆生等我皆授與陀羅尼句令其信者於此法中獲增上信其不信者默然捨之不令得起語言諍論說此法時若有來作障礙留難而悉摧伏此中何者是能攝取淨信者句即說呪曰愚嚧那上嚟一阿者鉢麗二娑嚩二合毗涅呵引囉三句末泥四涅攘曩鉢囉二合底微嚧異寧五只多珊者曩儞六只多鉢唎二合羯酩七只多三上鉢囉二合娑引那儞八麼曩肆也二合九呵唎灑二合伽囉儞十微攘曩肆也二合十一阿怒娑嚩二合底十二阿怒達麼努閉去灑二合寧十三呬都珊那唎舍儞十四多他阿去殺二合囉鉢那十五涅泥上舍十六輸引地多上嚩底十七野他引孽多十八野他努句路上播麼十九塢播莽涅泥上引舍二十微庶引地多二十一怛多囉二合伽引麗二十二曩者羯答微閻二合二十三三上鉢囉二合娑引娜遏他二合覩娑麼二十四野他引怒句懶者目佉二十五塢波僧賀囉喻儞舍二十六阿引舍耶肆也二合二十七微庶引地耶二十八野他庶引地底二十九羅去灑二合曩羅去灑二合儞三十羅去灑二合曩嚩底三十一羅去灑二合囊微輸馱儞三十二鉢囉底吠馱遏他三十三珊那唎二合舍儞三十四句舍囉冒他薩謎呵三十五鉢囉二合微者曳三十六娑麼娑囉儞三十七訖唎多引怒阿囉二合去史二合三十八薩底也二合遏替三十九薩底也二合南上四十素微輸引地帝四十一佛言無邊莊嚴此是能攝淨信者句及授與句由是當能授與說此法師善品及義善男子我今復說摧伏不信者句即說呪曰去灑二合迷一去灑麼嚩底二迷多囉二合鉢唎二合羯麼三鉢囉二合底與二合波娑他二合引寧四伽𡀔囊鉢囉二合底邏引婆五呬多努劍跛六散喏曩儞七僧揭囉二合呵嚩薩覩二合八呬多嚩薩覩九散那囉二合舍儞十鉢唎二合嚩喏儞耶十一嚩喏儞十二簸跛咩多囉二合十三細嚩儞十四曩坦多囉二合泥世薩他二合答微耶二合十五野多囉二合尾揭囉二合呵嚩底怒十六薩摩孽爛二合陀十七鉢囉二合那引邏儞十八塢波蔗囉珊那唎舍儞十九儞舍囉二合夜微庶引馱儞二十阿引多麼二合怒伽酩二十一鉢囉二合塢波僧呵囉二合儞二十二涅酩多引儞二十三阿怒囉去沙二合二十四鉢囉二合底與二合波娑他引二合寧二十五佛言無邊莊嚴此是調伏不信者句由是不令造諸過惡直爾善法尚多憎嫉何況於此無上法教是故此諸呪句為滅一切諸過惡故為斷一切煩惱故轉無邊莊嚴我見衆生心無淨信或欲鬪諍或欲損害或欲惱亂而來親近如來知彼心所動作隨其種類以諸法門而作覺悟令其捨離不善尋思及令發起諸善根因無邊莊嚴如來安住於十八種不共法中能善了知衆生心行及能了知心所攝法無邊莊嚴何等名為十八佛不共法無邊莊嚴所謂如來於某時夜現覺阿耨多羅三藐三菩提乃至入於無餘涅槃於其中間無有誤失無卒暴音無忘失念無不擇捨無種種想無不定心精進無退念無退志欲無退等持無退慧無退解脫無退解脫智見無退一切如來身業智為前導隨智而轉一切如來語業智為前導隨智而轉一切如來意業智為前導隨智而轉如來智見於過去世無著無礙如來智見於未來世無著無礙如來智見於現在世無著無礙無邊莊嚴如來成就此等十八不共法故無量智見力悉皆成就故能開演此陀羅尼門清淨法品為於不信一切有情生淨信故為淨信者於此法門得清淨智無邊莊嚴如來隨所樂欲以諸無量種種語言分別解說此陀羅尼門亦不能說此陀羅尼門斷疑理趣百分之一乃至俱胝百千算數及譬喻分何以故此諸法門是無量門不思議門此所有門能得一切智智轉故復次無邊莊嚴由此如來以無量異名今為汝等開示演說此諸法門欲令汝等普遍了知無量法門得陀羅尼故即說呪曰怛姪他阿引唎曳一阿引唎耶二合嚩底二阿引唎耶二合怒上揭帝三儞馱引寧四儞馱曩嚩底五嚩覩鉢囉二合酩六嚩囉覩二合簸掣那上伽囉儞七阿引伽引舍微輸引馱儞八阿怒去鎩二合簸儞九阿寧去鎩二合簸儞十阿微孽多鉢囉酩十一阿怒播孽上底儞十二涅畔引曩鉢他微輸引馱儞十三微耶二合波儞去史二合鉢底十四阿怒播引那十五寧𡀔引馱播囉酩十六薩嚩攘涅畔引曩去寧那囉二合舍寧十七佛告無邊莊嚴菩薩言此諸陀羅尼印能清淨句異名說句由受持此陀羅尼法門以少功用證菩薩位差別妙智及近大悲由隨義覺證得悟入一切法智無邊莊嚴此陀羅尼句是大良藥以能除破諸重病故復能除滅無明無智極黑暗障隨順明法圓滿轉故隨何明法圓滿而轉謂隨順明法智圓滿故而能現證宿住智明隨順明法智善巧故而得出生天眼智明隨順捨離諸煩惱故能現證得漏盡智明由此復能獲得一切所學波羅蜜多無上智見一切智智見一切智智地無邊莊嚴汝觀如來善能如許廣大說法於諸方便善巧圓滿無邊莊嚴如來如是成就大智能善安住一切智智力無畏等此無上寶藏於無量俱胝那由他劫所修善根之所積集以是緣故能善安住此諸法門今為汝等成熟佛法於法理趣出生善巧開示演說此陀羅尼清淨法品若善男子善女人等發心求趣大菩提者而欲隨我正修學者於我法教欲擁護者於諸如來無量法藏欲受持者於此法中當勤修習志樂精進住不放逸不著三界於一切智智心作意善加持者於諸色緣清淨善巧善修習者於受想行識清淨善巧勤修習者於實諦句出生清淨勤修習者於諸法中應可樂求諸清淨智無邊莊嚴由內清淨故一切法清淨由內寂靜故一切法寂靜由內寂滅故一切法寂滅由內無所取故一切法無所取由內不住故諸法不住由內滅故一切法滅由內無所作故一切法無所作由內無來去故一切諸法亦無來去無邊莊嚴此諸門句令諸菩薩內清淨轉由外本性無分別故不起分別然能受持清淨陀羅尼門捨離貪恚心不貢高為諸如來之所稱歎於諸衆生最為殊勝作無上主當能證得無礙智說歡喜辨才於前後際得清淨智能遍記䇷而能隨念中道之性及能證得無生法忍能證緣起願殊勝性及於諸願能遍清淨當能遍持不共一切法智善巧所發語言衆皆信受能於當來雨大法雨無邊莊嚴菩薩由得陀羅尼故必定當證無生法忍逮得一切法清淨智及能出生如是法智謂一切法不生不滅而復證得如是法智謂虛妄生生不成就不成就者即便散壞散壞法者而無所趣此一切法皆滅壞門此滅壞門同無生相若是無生彼即無滅如實觀察一切諸法遠離相已則不執著則不戲論無邊莊嚴此是諸菩薩無生智門善巧觀察而能入此諸陀羅尼由是速能獲無生忍辨才具足爾時世尊欲重宣此義而說頌曰若法虛妄生生已必滅壞諸法離於有於誰可遍持諸法既非有無有無可取若法不可得於何而遍持若不了諸法自性不可得彼則行於相不得陀羅尼諸法如虛空由是說開示虛空及開示二俱無所有此二離於有諸法亦空無如是解法者彼能獲總持隨覺無初始不分別中後諸法離分別一切悉空無若處無堅實不實亦非有依諸法真理云何得遍持如是了諸法自性無所有我今略說彼得清淨總持諸法如虛空亦等於空曠以慧常觀察彼能獲總持諸法無所有不生亦不起無有無可取此云何遍持一切法無相自性無戲論一切皆離相說法無所有若能如是解一切法如理彼則無分別而能得遍持諸法以自性無故不可得解了無有義彼成就總持若如是觀察一切法不染智不分別空彼能持諸法無常義空義苦義及厭離若以慧了知彼智得增長示說無所取涅槃如理義堅無分別意亦不分別法由是能受持諸法不堅固無有無所取寂靜空難見若解法已說於說不分別無著無分別能持此法門若解了相已能了於無相彼亦於諸法不起捨離想彼能了此義正覺之所說善巧說祕密彼能隨我覺若如理觀察無量一切法彼捨離諸量能覺此理趣若能觀察法無名及無相能了達此義彼能增長忍諸願與殊勝及如理觀察所願并諸色不住能違彼了此法門義能如理觀察於諸法理中彼亦無疑惑若以慧觀察一切諸法相決定解了者彼則入無相彼於此理趣能了善安住如是無畏者能速證佛法於法不戲論平等無分別了法相應已於厭離無惑於滅不分別蘊盡寂靜義彼於法平等得如理辨才能修習慈悲利益諸衆生善住相應者彼覺了無上若離衆生相能了法無我法無戲論義如理不戲論若聞此法已能速得淨信彼當見正覺彌勒兩足尊彼令我歡喜於此衆會中若有聞此法彼能作賢愛敬愛如來者是則無破壞由聞此法已能為善賢愛若於賢劫中欲見諸如來修學此法門能令諸佛喜無量壽威光阿閦大名稱若欲見彼者當學此法門若欲成菩提寂靜最勝法或求轉輪位當學此法門若樂求最上善巧總持門當於此法學常應不放逸若欲成廣大最上殊勝願求證菩提者當學此法門此經之所說陀羅尼法門能開示諸法此印最無上諸法內真實以總持開示此虛空法門善決無邊義所說諸善門此法能開示總持義善巧陀羅尼力故總持說為慧能持一切法總持義善巧以慧能了知於此異多釋已善說佛法以義正開示無上菩提分差別智善巧於斯正開示若於此法學證無上菩提於此教開示無上善法門得方便智已應當說此法未曾說諸法此無上種性於此義當學開示甘露句智者若欲求諸佛無礙慧若於此義學當獲最上智我於往昔時無量無數劫若不學此法不證寂理趣由我曾供養無量百千佛為是能了知說此無上法我為諸衆生作無邊義利汝等應當作得此陀羅尼若能了知此陀羅尼門印智者由一句能入此法門我智慧無上亦無有數量由我具智蘊能開示此法智者於此求隨覺菩提義於此義法門無畏當勤學智者若欲求廣大智慧性於佛生尊重當學此法門若欲轉法輪及吹大法螺智者應如理當學此法門若欲放光明普照無邊際求於佛法時於此如理學於天人世間若欲為上首彼可學此經決定一切法欲求廣大智發起諸功德樂求佛慧時於此應隨學欲開示法門樂求於最勝無戲論佛智於此義當學若欲樂開示無礙智所說修學此法已應說甘露句若欲照俱胝無量無邊界彼等於此教應當善修學此無上法門能淨除諸法一切法清淨於此經中說種智兩足尊演此廣大法於為菩薩說此經最無上佛告無邊莊嚴是故諸菩薩於此法教生愛樂已為攝此法令久住故復為哀愍諸衆生故於此法教應當書寫受持讀誦無邊莊嚴若復有人於彼時中聞此法已於如來所以愛樂心而常思念彼諸人等當得如來無邊法藏諸陀羅尼辨才具足於一切法速得自在能具攝受不可思議佛剎莊嚴聲聞菩薩無邊莊嚴若諸菩薩住一切法無戲論者由陀羅尼清淨門故此諸法門常得現前皆能攝受無量不可思議殊勝功德無邊莊嚴此是第三陀羅尼門清淨法品無邊莊嚴於彼後時若有菩薩欲隨我學此陀羅尼法門者當親近善友遠離惡友為遍擁護此諸法門當捨身命受持陀羅尼清淨法印譬如迦利邸迦月圓滿時光明照耀於衆星中最為殊勝如是此陀羅尼印三品攝受所有法門亦復如是於一切契經中此法光明最為殊勝一切菩薩皆大尊重故能出生無量辨才此無量辨才應知即是不放逸地何者是於不放逸地謂於此法作意思惟如理觀察不生妄念如是能令遍忍清淨若諸菩薩精勤志求不放逸者於此法門應善修習為令此法得久住故心常謙下尊重於法書寫經卷不離身手見有志樂希求法者發心趣向大菩提者應當為彼開示流布教授讀誦書寫經卷乃至隨義而為解釋如其受持所有法門不應藏匿願諸衆生得此無上佛法利益我等當令一切衆生於諸佛法常不缺減如是菩薩於法無吝常樂施人於義不祕盡皆為說無少法門而不開示無邊莊嚴應為利益安樂諸衆生故汝當受持此法門品陀羅尼門能清淨句爾時世尊復告尊者阿難陀曰汝當受持此法門品我諸弟子承事我者亦當受持如是經典時阿難陀白世尊言以佛神力我已受持我由成就此法門故無量法門皆得現前佛言阿難陀如是如是如汝所說由佛威力及此法門遍清淨故諸有受持此法門者及親事我能受持者無量法門皆得現前是故阿難陀汝當受持如來法教無量法藏說此法時於衆會中無量菩薩即便獲得大法光明得法光故無量諸佛所說法門皆得現前及得近於一切智智如所樂求勝願莊嚴悉能成就阿難陀汝觀諸法本性甚深如是如來能於無名相法作名相說又能開示諸法本性亦復淨除令見清淨雖說諸法無法可說亦無能說佛言阿難陀若能如是觀諸法性便得發生無量智慧說此法時無數菩薩證無生法忍無量衆生發阿耨多羅三藐三菩提心於阿僧祇劫當證無上正等菩提復能出生無量辨才爾時世尊加持此陀羅尼門放大光明其光普照無量無邊諸佛世界由此光明彼諸世界所有菩薩皆悉得聞此陀羅尼聞此法已能遍成熟菩提法分於彼復有無量衆生皆發阿耨多羅三藐三菩提心當於爾時一切衆生皆得安樂是時復有諸天雨天波頭摩華於大衆會諸菩薩中唱如是言願一切衆生得佛智慧爾時無量辨才菩薩白佛言世尊當何名此法門我當云何奉持佛告無量辨才菩薩言此法門名陀羅尼王亦名陀羅尼印亦名三品所攝善巧汝當受持此是無邊辨才攝一切義善巧法門由此法門而能照了一切諸法斷一切疑是故諸菩薩於此法門應當奉持爾時一切大衆為供養法故以五色華散於佛上佛說此經已諸菩薩摩訶薩一切衆會及天人阿修羅乾闥婆等聞佛所說皆大歡喜信受奉行
