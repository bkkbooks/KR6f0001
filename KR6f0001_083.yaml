body:
  text: 大唐三藏菩提流志奉詔譯無盡伏藏會第二十之一如是我聞一時佛在王舍城耆闍崛山與大比丘衆一千人俱皆悉成就殊勝功德能師子吼菩薩摩訶薩五百人一切皆得陀羅尼門辨才無礙證無生忍住不退轉具諸三昧遊戲神通善知衆生心行所趣其名曰日幢菩薩月幢菩薩普光菩薩月王菩薩照高峯菩薩毗盧遮那菩薩師子慧菩薩功德寶光菩薩一切義成菩薩成就宿緣菩薩成就願行菩薩空慧菩薩等心菩薩喜愛菩薩樂衆菩薩戰勝菩薩慧行菩薩電得菩薩勝辨菩薩師子吼菩薩妙言音菩薩能警覺菩薩巧轉行菩薩寂滅行菩薩如是等菩薩摩訶薩而為上首復有釋提桓因四大天王娑婆世界主梵天王及大威德諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽如是等無量諸大衆俱爾時電得菩薩見諸大衆寂然清淨諸大龍象皆悉已集即從座起偏袒右肩右膝著地合掌向佛白言世尊我有少疑今欲咨問唯願如來見垂聽許爾時世尊告電得菩薩言如來應正等覺恣汝所問當為汝説電得菩薩白佛言世尊菩薩摩訶薩成就何法能滿衆生一切所欲不為諸過之所染著隨其根性方便引導令彼衆生身壞命終不墮惡趣決定當得證於平等處世無染猶如蓮花不動法界遊諸佛剎常不離佛不見色身住三解脫不入正位隨衆生欲嚴淨佛土於剎那頃速能成就阿耨多羅三藐三菩提爾時電得菩薩摩訶薩即於佛前以偈問曰無上人中尊無邊知見者安住於共法利益諸世間等心視衆生為世所依怙示諸邪正道令畢竟安樂積集勝功德猶如衆寶聚世間智慧日三界應供尊願説最上乘成就菩薩道面相如滿月具足奢摩他開示寂靜法能滅諸煩惱願説菩薩行饒益諸衆生佛剎并壽命色身與眷屬三業及諸法一切皆清淨唯願如來説清淨菩薩行云何降伏魔云何而説法云何不忘失唯願為宣説云何勇進者遍入於生死安住一相中於法常無動云何諸佛所親近而供養常觀佛色身畢竟離諸相雖證三解脫如鳥飛空界未具諸功德終不入涅槃知諸根性欲隨順無所畏亦不生染著成熟彼衆生先施世間樂後令發淨心具足殊勝智證無上菩提如是深妙義唯願如來説爾時世尊告電得菩薩摩訶薩言善哉善哉善男子乃能問佛如是之義利益安樂無量衆生攝受現在世間天人及未來世諸菩薩等是故電得應當諦聽善思念之當為汝説電得菩薩言唯然世尊願樂欲聞佛告電得菩薩摩訶薩有五種伏藏大伏藏無盡伏藏遍無盡伏藏無邊伏藏菩薩具足如是伏藏永離貧窮即能成就如上所説殊勝功德以少功力速疾當得阿耨多羅三藐三菩提云何為五所謂貪行伏藏瞋行伏藏癡行伏藏等分行伏藏諸法伏藏電得云何名為菩薩摩訶薩貪行伏藏謂諸衆生貪行相應顛倒繫縛隨行諸相種種分別於色聲香味觸法等諸境界中執著堅固耽樂昏迷菩薩於彼諸衆生等種種心行應如實知彼諸衆生何所樂欲於何境界染習增強具足成就何等信解往昔曾種何等善根於何乘中當得發趣所有善根久如成熟菩薩為斷諸衆生等一切欲故令彼善心常相續故審諦觀察而為療治電得當知衆生根行差別難識一切聲聞辟支佛所不能知何況凡夫及諸外道是故電得或有衆生雖著諸欲亦能成熟阿耨多羅三藐三菩提或有衆生才觸欲境或以染心發於語言便得成熟無上明脫或有衆生覩諸妙色心生欲染彼色變壞即便覺知欲惱便息深念無常則能成熟無上明脫或有衆生雖見女人不生貪著於後思念方起染心想彼形容而生愛戀或有衆生於其夢中見可意色心生貪著繫念追求或有衆生聞女人聲便生貪愛有時暫見離貪染心便得成熟無上明脫是故電得菩薩於是種種貪病及以貪藥善巧了知而於法界無有二相於此迷惑法界衆生起大悲心電得若貪瞋癡若法界智無有少法而可得者菩薩作是念言如我所見是諸衆生於此無相自性空寂假名安立和合法中起於貪欲瞋恚愚癡我當於此如實觀察為彼迷惑貪欲衆生住於大悲成滿昔願不動法界以無功用智而成熟之若有丈夫於彼女人妄生淨想起重貪染菩薩即便示現女身端正殊妙色相具足珍寶瓔珞種種莊嚴猶如天女昔所未見隨彼衆生令其愛著極貪戀已量彼堪任方便拔其貪欲毒箭以自在力還變女身現其人前而為説法令彼衆生通達法界便沒不現若有女人於彼丈夫心生愛染菩薩便為現丈夫身乃至拔其貪欲毒箭而為説法令入法界便沒不現電得是諸貪行二萬一千及彼諸行八萬四千菩薩無功用智出生無量億千法門開曉衆生悉令解脫而亦不念我為衆生如是説法亦無衆生得解脫者電得譬如無熱龍王以業力故於其宮內出四大河為諸衆生水陸住者夏時熱惱而作清涼潤澤花果滋實五穀令諸衆生安隱快樂而彼龍王不作是念我今令此河水流出已出當出然於四河常自泛滿為衆生用菩薩亦復如是成就昔願以無功用智説四聖諦滅除一切生死熱惱普施人天聖解脫樂而是菩薩亦不念言我今説法已説當説任運住於大悲之心觀察衆生隨應説法復次電得譬如帝釋有十二那由他諸天女等以彼帝釋自在力故現其多身令諸天女於彼欲樂皆得滿足各自念言我今獨與帝釋歡娛而是帝釋實無所染菩薩亦復如是於諸衆生應可度者隨其意樂而成熟之然是菩薩亦無染著復次電得譬如日輪出山峯時光明普遍照閻浮提所照之處青黃赤白種種形色皆悉顯現而彼日輪一色一光無差別相菩薩亦復如是智慧日輪照於法界出彼衆生執著山峯所緣一相隨其意樂而為説法然於法界無有二相電得是名菩薩摩訶薩貪行伏藏菩薩證得此伏藏已或於一劫或過一劫隨諸衆生種種意樂現無量身以種種言詞而為説法然於法界亦無二相復次電得譬如真金由工巧力隨意所作種種瓔珞莊嚴之具其相各異而彼金性無有差別菩薩亦復如是善觀法界隨諸衆生種種意樂現無量身以種種言詞而為説法然於法界亦無二相是為常入法界一相菩薩獲得如是伏藏能為衆生種種説法彼聞法已具足富有無盡聖財生死貧窮悉皆永斷復次電得云何名為菩薩摩訶薩瞋行伏藏謂諸衆生憍慢相應計我我所住自他相從久遠來不修慈忍瞋恚熱惱自壞其心於佛法僧不生憶念瞋毒所覆迷惑於法菩薩於彼多瞋衆生終不起於損害傷惱唯作是念奇哉衆生愚癡迷惑乃於諸法本性寂靜無垢濁無和合無違諍遠離法中顛倒相應妄生瞋恨如是念已住大悲心常自懇惻設有支解其身分者為欲調伏瞋行衆生安住忍辱若彼無量瞋行衆生互相違背心懷恚恨是業成已當墮毒蛇惡趣之中住忍菩薩以慈念力化此衆生能令不受惡趣之報決定當得證於平等是名菩薩善巧方便滅除衆生瞋恚之行復次電得菩薩若見瞋惱衆生作是念言一切諸法本性清淨此諸衆生隨相而行妄生分別於此平等無違法中而起瞋心彼諸衆生於法界性不能了知若此衆生見法性者終不於他而生忿害以不了知法界本性是故生瞋菩薩於彼多瞋衆生倍增慈愍住於大悲成滿昔願以無功用智為壞衆生瞋恚行故開示演説種種法門而亦不念我為衆生除瞋説法何以故菩薩善觀法界相故是為菩薩安住法界無差別相滅煩惱行電得譬如不除黑暗得現光明亦非無能除黑暗者如是黑暗及光明性皆如虛空無有差別菩薩亦復如是依此法界無差別智善巧説法摧滅種種瞋行衆生不於法界而作差別電得譬如日輪所出光明隨所照處皆日輪攝菩薩亦復如是為欲調伏滅除瞋行所有言説皆是法輪不於法界而作差別如是瞋行二萬一千及彼諸行八萬四千菩薩成就無功用智隨彼衆生種種瞋行而為説法不作是念我為衆生今現説法已説當説是名菩薩摩訶薩瞋行伏藏菩薩證得此伏藏已若於一劫若過一劫隨諸衆生種種意樂以種種文字語言方便演説不能得其瞋行邊際而是菩薩智慧辨才亦不可盡是名菩薩善説法界無差別相獲得如是瞋行伏藏復次電得云何名為菩薩摩訶薩癡行伏藏電得諸菩薩等如是之行甚為難事謂諸衆生隨惑行者惱害他者無明胎㲉所纏裹者如蠶處繭自繫縛者於法界中無方便者不善觀察所應行者著我見者行邪道者住鈍行者難出離者為如是等迷惑衆生從初發心起大加行不生疲苦亦無懈怠如是思惟應以何緣何等勝解云何説法令此衆生入菩薩行而得解脫菩薩往昔善觀法界以無功用智住於大悲知彼衆生迷法界已隨力所堪而為説法悉令調伏亦不念言我今説法已説當説以彼往昔誓願力故善觀緣起自然演出百千法門斷除衆生無明業行令得解脫電得譬如良醫善療衆病先善綜習醫方諸論才見病相皆悉了知呪藥所施無不除愈菩薩亦復如是善觀法界以無功用智為彼積集癡行衆生隨其根性開示演説百千法門悉令明了電得是名菩薩摩訶薩癡行伏藏菩薩證得此伏藏已善觀緣起為如是等癡行衆生若於一劫若過一劫隨其性欲以種種文字語言善巧演説不能得其癡行邊際而是菩薩智慧辨才亦不可盡是名菩薩於一切法無差別相善巧宣説獲得如是癡行伏藏如是癡行二萬一千及彼諸行八萬四千菩薩為斷如是行故開示演説百千法門是名菩薩癡行伏藏復次電得云何名為菩薩摩訶薩等分行伏藏譬如四面鏡輪清徹明淨無諸垢翳懸於四衢所對色像皆於中現無有增減而此明鏡亦不念言我能現此種種色像然善磨瑩此鏡輪已一切諸相自然而現菩薩亦復如是法界鏡輪善磨瑩已住無功用三昧隨諸衆生心行差別開示演説百千法門悉令了知皆得解脫不起法相及衆生相何以故菩薩善觀法界相故於此四行相應衆生如實了知隨其根性而為説法而於法界及衆生界如實觀察無有二相爾所法界及衆生界明見無二無差別故電得譬如虛空無有種種差別之相亦無建立菩薩亦復如是善觀法界了一切法入於一相亦由往昔誓願力故隨衆生行種種説法而於法界無有差別電得此等分行二萬一千及彼諸行八萬四千菩薩觀察悉皆明了譬如良醫知病授藥以無功用智種種説法是名菩薩摩訶薩等分行伏藏菩薩證得此伏藏已為諸衆生若一劫若過一劫隨其志樂以種種言詞善巧宣説不能得其諸行邊際菩薩智慧辨才亦不可盡是名菩薩善説法界無差別相獲得如是等分行伏藏
