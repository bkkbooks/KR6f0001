body:
  text: 爾時會中有月實勝上童真從座而起合掌白佛言世尊云何見色因云何見欲因云何見見因云何見戒取因佛告月實智見智境愚見愚境智者見諸姝麗美色了知穢惡唯是肉段筋骨膿血大脈小脈大腸小腸𦙽液腦膜腎心脾膽肝肺肚胃生藏熟藏黃淡涕唾髮鬚毛爪大小便利薄皮裹之不淨污露可畏可惡凡所有色皆四大生是為色因月實如父母生身身之堅鞕為地大流潤為水大暖熱為火大飄動為風大有所覺知念及聲香味觸等界斯皆為識月實童真復白佛言世尊將死之時云何識捨於身云何識遷於身云何識知今捨此身佛告月實衆生隨業獲報識流相續持身不絶期畢報終識棄捨身隨業遷受譬如水乳和煎以火熱力乳水及膩各各分散如是月實衆生命盡以業力故形骸與識及諸入界各各分散識為所依以取法界及法界念并善惡業遷受他報月實譬如大吉善蘇以衆良藥味力熟功和合為之大吉善蘇棄凡蘇性持良藥力辛苦酸鹹澀甘六味以資人身便與人身作色香味識棄此身持善惡業及法果等遷受餘報亦復如是月實蘇質如身諸藥和合為大吉善如諸法諸根和合為業衆藥味觸資成於蘇如業資識服大吉善悅澤充盛光色美好安隱無患如善資識獲諸樂報服蘇違法顏容變惡慘無血氣色死土白如惡資識獲諸苦報月實吉善寶蘇無手足眼能取良藥色香味力識亦如是取法界受及諸善業棄此身界受於中陰得天妙念見六欲天十六地獄見己之身手足端嚴諸根麗美見所棄尸云此是我前生之身復見高勝妙相天宮種種莊嚴花果卉木藤蔓蒙覆光明赫麗如新鍊金衆寶鈿飾彼見此已心大歡喜因大喜愛識便託之此善業人捨身受身安樂無苦如乘馬者棄一乘一譬如壯士武略備具見敵兵至著堅甲胄乘策驥駿所去無畏識資善根棄出入息捨界入身遷受勝樂亦復如是自梵身天爰至有頂生於其中爾時會中大藥王子從座而起合掌白佛言世尊識捨於身作何色像佛言善哉善哉大藥汝今所問是大甚深佛之境界唯除如來更無能了於是賢護勝上童真白佛言大藥王子所問甚深其智微妙敏利明決佛告賢護此大藥王子已於毗婆尸佛所植諸善根曾於五百生中生外道家為外道時常思識義識者云何云何為識於五百生不能決了識之去來莫知由緒我於今日為破疑網令得開解於是賢護勝上童真謂大藥王子言善哉善哉仁今所問微妙甚深月實之問其義淺狹猶如嬰兒心遊外境而不知內正法希聞諸佛難遇佛圓廣智無測深慧至妙之理應專啓請時大藥王子見佛熙怡顏容舒悅如秋蓮開踊躍歡喜一心合掌而白佛言世尊我愛深法渴仰深法常恐如來入般涅槃不聞正法而於末濁衆生之中愚無所知不識善惡於善不善熟與不熟不能覺了迷惑輪轉生死苦趣佛告大藥王子如來正法難遇難得我於往昔為半伽他登山自墜棄捨身命為求正法經歷無量百千萬億種種苦難大藥汝所希望皆恣汝問我當為汝分別解説大藥王子白佛言唯然奉教世尊識相云何願垂開示佛告大藥如人影像現之於水此像不可執持非有無辨如芻洛迦形如渴愛像大藥王子白佛言世尊云何渴愛佛言如人對可意色眼根趣之名為渴愛猶持明鏡視己面像若去於鏡面像不現識之遷運亦復如是善惡業形與識色像皆不可見如生盲人日出日沒晝夜明暗皆悉不知識莫能見亦復如是身中渴愛受想與念皆不可見身之諸大諸入諸陰彼皆是識諸有色體眼耳鼻舌及身色聲香味觸等并無色體受苦樂心皆亦是識大藥如人舌得食物知甜苦辛酸鹹澀等六味皆辨舌與食物俱有形色而味無形又因身骨髓肉血覺知諸受骨等有形受無形色知識福非福果亦復如是時賢護勝上童真禮佛雙足白佛言世尊此識可知福非福耶佛言善聽非未見諦而能見識識不可視非如掌中阿摩勒果識不在於眼等之中若識在於眼等之中剖破眼等應當見識賢護恆沙諸佛見識無色我亦如是見識無色識非凡愚之所能見但以譬喻而開顯耳賢護欲知識之罪福汝今當聽譬如有人為諸天神或乾闥婆等及塞建陀等鬼神所著賢護於意云何其為天等鬼神所著其著之體求於身中可得見不賢護白佛言不也世尊天等鬼神所著其著之體無色無形身內外求皆不可見賢護其為福勝諸大天神之所著者即須好香花燒衆名香香美飲食清淨安置祭解供具咸須香潔如是此識為福資者便獲尊貴安樂之果或為人王或為輔相或豪望貴重或財富自在或為諸長或作大商主或得天身受天勝果由識為福資身獲樂報如彼福勝天神所著得勝妙花香香美飲食便即歡喜病者安隱今得尊貴豪富自在當知皆是由福資識身獲樂果賢護其為富丹那等下惡鬼神之所著者便愛糞垢腐敗涕唾諸不淨物以此祭解歡喜病愈其人以鬼神力隨鬼神欲愛樂不淨臭朽糞穢識以罪資亦復如是或生貧窮或生餓鬼及諸食穢畜生之中種種惡趣由罪資識身獲苦果賢護勝上天神其著之體無質無形而受種種香潔供養識福無形受勝樂報亦復如是富丹那等下惡鬼神為彼著者便受不淨穢惡飲食識資罪業獲識苦報亦復如是賢護當知識無形質如天等鬼神所著之體供具飲食所獲好惡如資罪福得苦樂報大藥王子白佛言世尊云何見欲因佛言大藥互因生欲猶如鑽燧兩木互因加之人功而有火生如是因識及因男女色聲香味觸等而有欲生譬如因花生果花中無果果生花滅如是因身顯識循身求識識不可見識業果生身便謝滅身骨髓等不淨諸物咸悉銷散又如種子持將來果味色香觸遷植而生識棄此身持善惡業受想作意受來生報亦復如是又如男女愛欲歡會分離而去識身和合戀結愛著味玩慳吝報盡分離隨業受報父母因緣中陰對之以業力生識獲身果愛情及業俱無形質欲色相因而生於欲是為欲因大藥云何見戒取因戒謂師所制戒不殺不盜不邪淫不妄語不飲酒等行取謂執取是戒作如是見因是持戒當得須陀洹果斯陀含果阿那含果以是因故獲於勝有謂受人天等身斯皆是有漏善非無漏善無漏之善無陰熟果今此戒取是有漏種植之於識報善惡業識不淳淨煩惱因故受熱惱苦是為見戒取因大藥白佛言云何識取天身乃至取地獄身佛言大藥識與法界持微妙視非肉眼所依以為見因此微妙視與福境合見於天宮欲樂嬉戲見已歡喜識便繫著作如是念我當往彼染愛戀念而為有因見已故身臥棄尸所作如是念此尸是我大善知識由其積集諸善業故令我今者獲於天報大藥白佛言世尊此識於尸既有愛重何不託止佛言大藥譬如剪棄鬚髮雖見烏光香澤寧可更植於身令重生不大藥白佛言不也世尊已棄鬚髮不可重植於身令其更生佛言如是大藥已棄之尸識亦不可重託受報大藥復白佛言世尊此識冥寞玄微無質可取無狀可尋云何能持象等大身衆生縱身堅固猶若金剛而能貫入壯夫之身力敵九象而能持之佛言大藥譬如風大無質無形止於幽谷或竅隙中其出暴猛或摧倒須彌碎為塵粉大藥須彌風大色相云何大藥白佛言風大微妙無質無形佛言大藥風大微妙無質無形識亦如是妙無形質大身小身咸悉能持或受蚊身或受象身譬如明燈其焰微妙置之於室隨室大小衆暗咸除識亦如是隨諸業因任持大小大藥白佛言世尊諸業相性彼復云何以何因緣而得顯現佛言大藥生諸天宮食天妙饌安寧快樂斯皆業果之所致也如人渴乏巡遊曠野一得清涼美水一無所得受渴乏苦得冷水者無人持與受渴乏者亦無遮障不許與水各以業因受苦樂報大藥應當以是見善惡業如空中月白黑二分又如生果由火大增熟便色異如是此身由福增故生勝族家資産豐盈金寶溢滿勝相顯盛或生諸天宮快樂自在斯皆善業福相顯現譬如種子植之於地果現樹首然其種子不從枝入枝而至樹首剖析樹身亦不見子無人持子置於枝上樹成根固求種不見如是諸善惡業咸依於身求之於身亦不見業如因種有花種中無花因花有果花中無果花果增進增進不見因身有業因業有身身中無業業中無身亦復如是如花熟落其果乃現身熟謝殞業果方出如有種子花果之因具有如是有身善惡業因備在彼業無形亦無熟相如人身影無質無礙不可執持不繫著人進止往來隨人運動亦不見影從身而出業身亦爾有身有業而不見業繫著於身亦不離身而能有業如辛苦澀殊味諸藥能滌淨身除一切病令身充悅顏色光澤人見之者知服良藥藥味可取熟功無形視不可見執不可得而能資人膚容色澤業無形質能資於身亦復如是善業資者飲食衣服內外諸資豐饒美麗手足端正形容姝好屋宅華侈摩尼金銀衆寶盈積安寧快樂歡娛適意當知此為善業之相生於下賤邊地貧窮資用闕乏希羡他樂飲食麁惡或不得食形容弊陋所止卑下當知此為惡業之相猶如明鏡鑒面好醜鏡像無質取不可得如是識資善不善業生人天中或生地獄畜生等中大藥應當如是見業與識和合遷化大藥言世尊云何微識能持諸根能取大身佛言大藥譬如獵者入於山林持弓毒箭而射香象箭毒霑血毒運象身支體既廢根境同喪毒流要害身色青赤猶如淤血毒殺象已便即遷化於意云何毒與象身多少大小可得比不大藥白佛言世尊毒與象身多少大小其量懸殊不可為對猶如須彌比之芥子大藥如是識棄此身以取諸根棄此諸界隨業遷化亦復如是大藥復白佛言世尊云何微細之識任持大身而不疲倦佛言大藥須彌山王高八萬四千由旬難陀烏波難陀二大龍王各繞三匝二龍大息搖振須彌內海中水咸變成毒此二龍王長大力壯和修吉龍德叉迦龍二大龍王亦與之等於意云何四龍王識與蚊蚋識寧有異不大藥言世尊四龍蚊蚋其識無異大藥如一小渧跋錯那婆入四龍口四龍便死於意云何小渧藥毒龍口中毒何毒為大大藥白佛言龍口毒大小渧藥毒甚為微少大藥大身衆生力敵九象微妙之識無色無形非分別量隨業任持亦復如是如尼瞿陀子極微細種之生樹婆娑廣大枝條百千於意云何其子與樹大小類不大藥言世尊其子與樹大小相懸如藕絲孔比虛空界如是大藥樹於子中求不可得若不因子樹則不生微細尼瞿陀子能生大樹微細之識能生大身識中求身身不可得若除於識身則無有大藥復白佛言云何金剛堅固不可壞識止於危脆速朽身內佛言大藥譬如貧人得如意寶以寶力故高宇雕樹妙麗宮室園林鬱茂花果敷榮象馬妓侍資用樂具自然而至其人於後失如意寶衆資樂具咸悉銷滅如意神寶堅固貞牢縱千金剛不能毀壞所生資用虛假無常速散速滅識亦如是堅固不壞所生之身速朽速滅大藥言世尊柔妙之識云何穿入麁鞕色中佛言大藥水體至柔激流懸泉能穿山石於意云何水石之質鞕軟如何大藥言世尊石質堅鞕猶若金剛水質柔軟為諸樂觸大藥識亦如是至妙至柔能穿剛鞕大身之色遷入受報大藥復白佛言世尊衆生捨身云何生諸天中乃至云何生於地獄等中佛言大藥衆生臨終之時福業資者棄本之視得天妙視以天妙視見六欲天爰及六趣見身搖動見天宮殿及歡喜園雜花園等又見諸天處蓮花殿麗妓侍繞笑謔嬉戲衆花飾耳服憍奢耶臂印環釧種種莊嚴花常開敷衆具備設見天天女心便染戀歡喜適意姿顏舒悅面若蓮花視不錯亂鼻不虧曲口氣不臭目色明鮮如青蓮葉身諸節際無有苦痛眼耳鼻口又無血出不失大小便利不毛驚孔現掌不死黃甲不青黑手足不亂亦不捲縮好相顯現見虛空中有高大殿彩柱百千雕麗列布垂諸鈴網和風吹拂清音悅美種種香花莊嚴寶殿諸天童子衆寶嚴身遊戲殿內見已歡喜微笑齒現如君圖花自不張開亦不合閉語音和潤身不極冷亦不極熱親屬圍繞亦不憂苦日初出時當捨其壽所見明白無諸黑暗異香芬馥四方而至見佛尊儀歡喜敬重見已親愛歡喜離詞猶如暫行便即旋返安慰親知不令憂惱有流法爾生必當死勿以分別而生苦惱大藥善業之人臨命終時好樂布施種種伽他種種頌歎種種明因重重稱説正法之教如睡不睡安隱捨壽將捨壽時天父天母同止一座天母手中自然花出天母見花顧謂天父甚為福吉希奇勝果天今當知子慶之歡時將不久天母遂以兩手搖弄其花弄花之時命便終盡無相之識棄捨諸根持諸境業棄捨諸界持諸界事遷受異報猶如乘馬棄一乘一如日愛引光如木生火又如月影現澄清水識資善業遷受天報如脈風移速託花內天父天母同座視之甘露欲風吹花七日寶璫嚴身曜動炫煥天童朗潔現天母手大藥白佛言世尊無形之識云何假因緣力而生有形云何有形止因緣內佛言大藥如木和合相觸生火此火木中求不可得若除於木亦不得火因緣和合而生於火因緣不具火即不生木等之中尋火色相竟不可見然咸見火從木中出如是大藥識假父母因緣和合生有形身有形身中求識不得離有形身亦無有識大藥如火未出火相不現亦無暖觸諸相皆無如是大藥若未有身識受想行皆悉不現大藥如見日輪光明照曜而諸凡夫不見日體是黑是白黃白黃赤皆不能知但以照熱光明出沒循還諸作用事而知有日識亦如是以諸作用而知有識大藥白佛言云何為識作用佛言大藥受覺想行思憂苦惱此為識之作用復有善不善業熏習為種作用顯識大藥白佛言云何識離於身便速受身識捨故身新身未受當爾之時識作何相佛言大藥如有丈夫長臂勇健著堅甲胄馬疾如風乘以入陳干戈既交心亂墜馬武藝捷疾還即跳上識棄於身速即受身亦復如是又如怯人見敵怖懼乘馬退走識資善業見天父母同座而坐速託生彼亦復如是大藥如汝所問識棄故身新身未受當爾之時識作何相大藥譬如人影現於水中無質可取手足面目及諸形狀與人不異體質事業影中皆無無冷無熱及與諸觸亦無疲乏肉段諸大無言聲身聲苦樂之聲識棄故身新身未受相亦如是大藥是資善業生諸天者大藥白佛言云何識生地獄佛言大藥行惡業者入於地獄汝當諦聽大藥此中衆生積不善根命終之時作如是念我今於此身死棄捨父母親知所愛甚大憂苦見諸地獄及見己身應合入者見足在上頭倒向下又見一處地純是血見此血已心有味著緣味著心便生地獄腐敗惡水臭穢因力識託其中譬如糞穢臭處臭酪臭酒諸臭因力蟲生其中入地獄者託臭物生亦復如是賢護勝上童真合掌白佛言地獄衆生作何色相身復云何佛言大藥其愛血地生地獄者遍身血光身如血色生湯隍者身如黑雲生乳湯河者身點斑雜作種種色體極軟脆猶如貴樂嬰孩之身其身長大過八肘量鬚髮身毛並長垂曳手足面目虧曲不全閻浮提人遙見便死大藥白佛言地獄衆生以何為食佛言大藥地獄衆生食無少樂惶懼馳走遙見鎔銅赤汁意謂是血衆奔趣之又有聲呼諸有飢者可速來食便走向彼至已而住以手承口獄卒以熱銅汁寫手掬中逼之令飲銅汁入腹骨節爆裂舉身火起大藥地獄衆生所食之物唯增苦痛無少安樂地獄衆生苦痛如是識不捨之亦不毀壞身如骨聚識止不離非業報盡苦身不捨飢渴苦逼便見園林花果敷榮廣博翠茂見已喜笑互相謂言此園翠茂清風涼美衆急入園須臾暫樂樹葉花果咸成刀劍斬截罪者或中破身分為兩段或大叫呼四面馳走獄卒群起執金剛棒或執鐵棒鐵斧鐵杖齧脣瞋怒身出火焰斫棒罪者遮不令出斯皆已業見如是事獄卒隨罪者後語罪者云汝何處去汝可住此勿復東西欲何逃竄今此園者汝業莊嚴可得離不如是大藥地獄衆生受種種苦七日而死還生地獄以業力故如遊蜂採花還歸本處罪業衆生應入地獄初死之時見死使來繫項驅逼身心大苦入大黑暗如被劫賊執捉將去作如是言訶訶禍哉苦哉我今棄閻浮提種種愛好親屬知友入於地獄我今不見天路但見苦事如蠶作絲自纏取死我自作罪為業纏縛羂索繫項牽曳驅逼將入地獄賢護罪業衆生生地獄者苦相如是爾時賢護與大藥王子聞説是已身驚毛竪俱起合掌作如是言我等今者俱歸依佛請垂救護願今以此聞法功德未脫有流處生死輪不落三塗入於地獄賢護復白佛言欲有請問唯願聽許佛言如汝希望恣汝所問賢護白佛言世尊云何為積云何為聚云何為陰云何為身不遷佛言賢護智界見界意界明界以此四界和合成身四界境識名之為積聚謂六界六入六入境三界二入因即髮鬚毛爪皮肉膿血涕唾黃痰脂𦙽髓液手足面目大小支節和合崇聚名之為聚猶如穀豆麻麥積集聚貯而成高大謂之為聚其地水火風空識名為六界眼耳鼻舌身意名為六入色聲香味觸法名六入境即貪瞋癡名三界因又風黃痰亦名三因二入者謂戒與信又有二因謂捨與施又有二因謂進與定又有二因謂善不善其受想行識此四名無色陰受謂領受苦樂等相及不苦不樂之相想謂知苦樂相行謂現念作意及觸識者是身之主遍行諸體身有所為莫不由識不遷者謂身語意淨證獲道果此人死已識棄有陰不重受有不流諸趣極樂而遷不復重遷是名不遷於是賢護與大藥王子禮佛雙足白言世尊佛一切智説此法聚當於未來作大利益安樂衆生佛言如來法聚常住非斷一切智者知而不為我經無量勤苦積集智光今説此經此正法日為諸衆生作大明照德譽普流一切智海為能調心流注者説此經所在之處讀誦解説皆天鬼神阿修羅摩睺羅伽咸悉擁護皆來拜禮水火王賊等怖皆不能害諸比丘從今已往於不信前勿説此經求經過者慎勿示之於尼乾子尼乾部衆諸外道中亦勿説之不恭敬渴請亦勿為説若違我教虧損法事此人則為虧損如來諸比丘若有禮拜供養此經典者應當恭敬供養是人斯人則為持如來藏爾時世尊而説偈言當勇超塵纍勤修佛正教除滅死軍衆如象踐葦蘆持法奉禁戒專精勿虧怠以棄生流轉盡諸苦有邊佛説此經已賢護勝上童真大藥王子并諸比丘菩薩摩訶薩天人阿修羅乾闥婆等普大會衆聞佛所説歡喜奉行爾時衆中有一王子菩薩摩訶薩名為大藥從座而起整理衣服合掌向佛而白佛言世尊彼神識從此身移當有何色佛讚彼大藥菩薩言善哉善哉大藥如是如是汝之所問此義其義甚深唯諸如來乃能知耳然此識除於如來更無有人而能知者爾時跋陀羅波梨白佛言世尊希有此大藥王子能問甚深之事最微最細甚深甚密佛報跋陀羅波梨言如是跋陀羅波梨此大藥王子於往昔已曾供養毗婆尸世尊種善根故跋陀羅波梨此大藥王子昔五百世曾作外道當於爾時嘗問此識義然此大藥王子當於爾時於此識中亦不能了知此識何來何去此義不了我今應當為其決了此義爾時跋陀羅波梨長者子讚大藥王子言大藥善哉善哉仁者智慧廣大無有邊際乃能問世尊甚深之義我今勸請大藥願問世尊此義入一切難智者巧解深意勿令此蘇摩浮坻娛樂少事而先問佛所以者何其故數數惱亂不善問於世尊但佛世尊出世甚難世間如此法會聚集復難是故汝今應當勸請世尊解釋甚深義處爾時大藥王子菩薩摩訶薩瞻仰世尊而見世尊喜悅微笑清淨猶如初秋蓮華始開見已歡喜爾時大藥王子菩薩白佛言世尊我渴仰故樂聞正法慮恐世尊不具與我顯説法要不決我疑又恐世尊不久當取涅槃又恐諸衆生不能了知善惡業報恆受生死煩惱不能捨離佛告大藥言大藥我於往昔故為此偈從大山崖投身布施復行無量無邊難行苦行百千億等種種諸事大藥汝所有疑但當問我莫以為難我隨汝意當分別説爾時大藥復白佛言世尊此識何色佛告大藥言大藥此識如幻師火如人水內影如風輪無定無有定色如衆生眼見虛空如似愛大藥復問其愛云何佛言猶如人射以有眼根見箭去時如人執明淨鏡於其鏡內見己面形若除鏡已形便不見此識亦爾從人身移其識界唯見罪福譬如生盲人不見日天出時中時後時夜亦不見月天出時暗時並皆不見此神識亦復如是於其身內不可得見大藥此身內愛著及取及想智者但有識所有此身和合集聚諸界諸入諸陰等所有色者眼耳鼻舌及色等諸受或苦或樂意等所有諸色者是名為識大藥如人以舌知味或苦或辛而彼人舌有色彼味無色此身內所有骨髓肉血是有色所受者是無色是名為識受罪福者爾時跋陀羅波梨頂禮佛足而白佛言世尊受罪福者是誰佛告跋陀羅波梨汝諦聽諦受我為汝説有見實者彼見此識而此識不可得如菴婆羅果掌中可見此識不住眼道亦非以眼能得見彼如恆河沙數如來見此識我亦然無色可見唯愚癡輩不知不見故我為説但有識名不可以見跋陀羅波梨此識如受罪福我為汝説汝當諦聽譬如有人著陰鬼或羊顛鬼或乾闥婆鬼或天神跋陀羅波梨於汝意云何彼人身內有彼諸鬼或陰鬼等可見以不跋陀羅波梨言世尊彼鬼在人身中或內或外實不可見但彼諸鬼在人身內亦無有色跋陀羅波梨如彼天神最勝在人身中取最妙香華塗香末香并諸華鬘及以飲食皆取最上殊勝如是此身取最勝業時以識故受或取王位治化自在或取富饒大長者家或受天果報如是此識受福如此最勝天神靈在人身內受最勝祭祀或受王位或受富饒潤彼人身令使歡喜如是此識受福果報亦復如是跋陀羅波梨如彼不淨毗舍闍鬼神倚在人身中受不淨諸物臭穢或在圊屏內受諸祭祀得祭祀已即生歡喜而彼人被不淨鬼神力故常樂臭穢不淨之處心既愛樂得臭穢物便生歡喜如是此識得惡果報生不淨意或生貧賤家或生下劣家或生餓鬼恆食糞穢之物心生歡喜然此識如是受惡果報如彼勝天神靈雖無色形但受最勝最上祭祀如是此識雖無有色但受最勝最妙果報隨業受身如彼無色富多那鬼倚著人身恆樂食諸糞穢如是此識在不淨業中恆樂下賤之處跋陀羅波梨汝當知此不淨識如是跋陀羅波梨如彼鬼形在人身中而無有色此識受善不善果報如彼鬼神汝應當如是知見爾時大藥王子白佛言世尊凡受欲云何佛答大藥言當見有人各各和合故生欲想譬如以木鑽火因人身力然後出火欲受於欲因於男子意感於觸後生欲事譬如因華成子然彼華內初無有子有華故然後結子可見如是此身生已然後識可見而此身內亦無識可見以識故身內有骨髓肉血等不淨之物如彼種子種已生華因華而受色香味等既成果已還滅如是此識成身已亦復還滅但取善惡受心想意識至於彼世趣彼男女和合生歡喜心因彼交會相持出於不淨出不淨已還各相離而彼二人受欲樂時心生歡喜既受欲已無復欲想還各相離或生厭離欲想如是如是此識因身攀緣生歡喜心增長受想猶如人身因見女色即生欲想各各著身受欲訖已還復厭離而去此識亦然既受身已還復捨去生厭離想復次因父母欲事來中陰受身攀緣業此識有從中入欲因成就身而彼業無色其男子女人因亦無色但因受攀緣故生欲想而即有色是故言受欲想也色受欲想故名為受欲復次大藥因持戒攀緣故受後果報此事云何我為汝説言持戒者身斷殺生不盜他物不行邪淫不妄言不飲酒鬪亂謹慎不放逸是為攀緣欲受後世須陀洹果斯陀含果即受後有或天身或人身而彼有善業或有漏或無漏成就諸陰等潤彼處識受持或善或不善諸業成就識等受諸欲事已還自厭離是故名此因持戒故受後果報也爾時大藥王子白佛言世尊此識云何受天身復云何受地獄身佛告大藥王子菩薩言大藥汝今諦聽我當為汝解説此事大藥此識以法界持故生作天心見而彼天見不在肉眼彼見體所見即是受因故名見受因也而此人所見天見者即是福攀緣善成就即見天宮於欲天中受種種五欲樂事如是見已便生欲心因即如是起念智我今應須至彼處耳彼生如是欲心已而發染著念心取有相復見其故身棄在尸陀林內彼如是見已便作是念是我天識也此造善根已我當欲向天上爾時大藥王子復白佛言世尊彼識既如是著故尸云何不即入故尸佛告大藥王子言大藥譬如有人剃除鬚髮既見鬚髮落地作如是念我此鬚髮好黑香潔願我此髮還著頭上如舊大藥於汝意云何彼之頭髮還能更著頭以不大藥言不也世尊佛言大藥如是如是彼人神識捨其身已還欲入中更依住者無有是處爾時大藥王子復白佛言世尊此識既是微細無有正色廣大無邊云何能來就大白象身復能破金剛之身既無千象力云何人生即能持千象力佛告大藥譬如風界無色不可見住山谷間而彼風從彼山谷出已能摧折崩倒如須彌等高大之山使其破裂大藥於汝意云何彼風界有何色彼山復何色也大藥白佛言世尊彼風柔弱復無色身當如是見佛復告大藥言大藥如彼風界軟弱無色體彼識亦復然軟弱復無色身然其無妨能成就大身能成就微細小身而彼識蚊子及象一種不異大藥譬如小燈燭光或在壁或在室能滅大黑暗分此識亦復如是雖復微小能成大小形色而皆因業受故爾時大藥復白佛言世尊彼業有何色有何體幾種因應當可觀佛報大藥言諸業境界者是微妙受快樂受得天飲食譬如有二人同共遊行至於曠野然彼二人一人忽值涼冷清水而得飲之一人飢渴命終而彼水不能自入彼人之口亦無於此一人不與飲者但以因緣故一人值水涼冷飲之一人不值如是如是此善不善諸法亦復如是如黑月白月善不善應須當見譬如生果熟已變成別色然彼色以火力多故令其成熟如是如是此身以福力故生於大富長者家多饒財寶現受快樂在於天宮顯現受天快樂然後失天自在勢即顯現無福之勢猶如種子於地上種生樹以後其種子於樹上不現亦不從枝移枝亦不在樹內顯現亦無有人手執彼子置於樹上亦不從根移彼種子可現如是如是此諸業若善若惡倚住身內而不顯現如從種子然後有華從華然後有子其華不在於種子內其子亦不在於華內子華無有二別體如是如是此身內諸業有從業有身其身不在業內可見業不在身內可見如華成熟然後成子如是身成熟已諸業可現如種子何地方有彼地方即有華有華然後有子如是如是此身所有生處於彼之處見善及惡便即有現然彼諸業根無有色如人因身有影而彼影無定無色還隨人而行而彼影不倚住於人亦不離身有影可現如是此身內現善惡相隨而不相離身行之處隨逐而行其業處處隨逐其業不離身有亦不離身業可有現如諸藥若辛若甜若苦等人飲服已能除諸病既除其身諸惡成其柔軟現好顏色衆人見者形相可知此人身值甘藥然彼諸藥等味及力無有色其味力色不可得現唯在人身形色端正可現耳如是如是此善業無色而至人身以美飲食故身著好服故其人諸根具足故身受快樂復以金銀珍寶莊嚴此身有富貴形勢此皆是善業境界其失勢無有福業貧窮困苦遠離資財恆常乏少規求他物飲食麁澀行住坐臥悉皆下劣無好福報養育身體所生醜陋此皆是不善業境界猶如明鏡以其明故面形妍醜分明顯現而彼鏡內影無有色如是如是由善惡力故此識顯現於人中若地獄餓鬼畜生中大藥此諸業隨於此識大藥應須如是知如是見大藥復白佛言世尊此識云何成就諸根受大身云何捨諸根佛告大藥譬如獵師入深山林手執強弓即取毒藥塗其箭鏃以射大象而彼毒滴雖少入皮至血毒氣移行遍滿身中至一切諸根境界令根閉塞屈折諸節令血變色遍諸身分遂即捨身其毒還至本所入處自然出外大藥其毒藥一滴極甚微小其象身極大於汝意云何大藥報佛言世尊計毒藥極微小其象身如須彌山毒藥移行所以遍體佛告大藥如是此神識捨身之時捨諸根捨諸界次第亦復如是如是大藥復白佛言世尊云何受如是廣大身不曾畏難佛告大藥譬如須彌山高八萬四千由旬而彼山有二龍王一名難陀二名優波難陀繞之三匝住持彼山而彼龍王喘息之氣海水不堪飲彼龍王出入息時彼須彌山即動如彼龍王身廣大多力彼婆修吉德叉迦龍王亦復然大藥於汝意云何彼龍王等識欲與蚊子識一等以不汝勿別見大藥王子白佛言世尊如我意所見彼之龍王及蚊子識一等無異佛復告大藥如有一毒名婆蹉那婆復有毒藥名訶羅訶羅將如芥子與難陀波難陀等食即速疾命終大藥於汝意云何龍毒藥毒何毒力大為龍毒大為藥毒大大藥報言世尊如我意見其難陀波難陀毒多其婆蹉那婆毒少佛告大藥如是如是雖有大身敵九千象力無妨其識雖小無定色不可見但此識因業緣成就大身大藥譬如尼拘陀子其形雖小無妨能成就大樹枝條長廣覆蓋數百千地大藥於汝意云何其子形及樹身二種何者是大大藥報佛言世尊如以小孔比於虛空佛復告大藥而彼樹不可在子內見亦不離子而生於樹大藥如彼微細子有廣大樹如是如是無色識成就大色身因識故現色身不離識色身可見爾時大藥復白佛言世尊其識牢固猶如金剛云何成就羸弱之身佛告大藥譬如有人貧窮不能自濟忽然值遇如意寶珠彼人得珠執已所造如意即得稱成樓觀池臺城門坑塹周匝高門園林華果枝葉蓊鬱彌覆其上及餘資財諸物皆悉如心自然化作大藥彼等諸事悉皆羸弱速疾破壞離散之法然後彼人手執如意珠忽然失落彼等樂事即滅不現大藥如彼如意珠千金剛破終不可壞有此功能隨意所念皆悉剋果如是如是此識牢固猶如金剛而受身者此不堅牢也爾時大藥復問世尊彼識既是軟弱云何破壞堅牢之身而移至彼世佛告大藥譬如水流注下在於山內還穿山而出大藥於汝意云何彼水有何堅牢大藥報佛言世尊其山體是堅鞕牢如金剛而彼水滴本性柔軟猶如夢為觸者安藥如是如是彼識本體柔軟能破大身即得出去爾時大藥復問佛言世尊凡有衆生從衆生界捨身命終之後云何受諸天之身云何復受諸趣之身佛告大藥言大藥汝諦聽我當為汝解説此事大藥凡有衆生捨衆生體命終之後以行福業之事以受身還捨彼身其識捨人身見得天身見彼既得天眼已即見六欲諸天又見六欲天宮而見彼人身破時復見天上園林歡喜林壞亂林等彼處有高座天衣覆上處處臺殿微妙樹林處處有端正玉女聚而彼識見常有華莊嚴諸事心喜見者種種瓔珞耳璫臂釧而彼見座上有天童子其玉女及天子二人歡喜共見而彼天童子生已復更見生天之童女彼天童子見童女已即生欲心生欲心已即得歡喜得歡喜已即得遍體心意歡喜心意歡喜已彼於爾時即變身色而色猶如蓮華其人命終之時即得不顛倒見鼻不喎綟口氣不臭彼人耳目似青蓮華色身分支節更不離解彼亦不流血亦不生糞尿身諸毛孔亦不揩折諸甲無復青色手無黃色手腳不動亦不申縮而取命終大藥彼人命終之時預有天相所謂現前見輦輿彼輦輿有千數柱莊嚴懸諸鈴網其鈴出好微妙音聲有種種微妙香華而散其上又出好妙香氣復有種種瓔珞莊嚴其上復有無量諸天童子彼見如是已生大歡喜心彼生歡喜心已於身生相二齒白淨猶君陀華顯現其兩目不甚大開不甚大閉其聲微妙哀美二足下猶如蓮華色而彼死尸命終之後身心不冷不熱彼亡人有眷屬不甚悲戀而彼人欲依法取命終之時其時正日初出諸方無有黑暗了了覩見衆色諸方復有善妙香氣遍滿而來其人臨欲終時兩目不閉其所見諸方無有迷惑若見如來像即得信心發清淨意復見心所喜愛諸眷屬以歡喜心抱其身猶如人死已還活亦如遠行人歸慰喻諸眷屬作如是言諸眷屬等莫憂莫愁一切諸有生者皆有如是別離法也大藥彼衆生若福業強若內發布施心其辨才數數自讚歎歌詠布施功德或種種功德因緣而彼人作如是語已意樂欲睡眠身心得安樂遍滿其體安隱捨身命捨身命時上見諸天共同榻坐見同坐已其玉女將手置其身上其玉女兩手掬滿香華既掬華已白彼天言大善大善願有吉利事欲生天童子時至而彼玉女作是語已手即索華索已復索索華之時而彼衆生即取命終彼捨諸根共識捨諸根境界捨諸大時四陰無定體無色如人欲騎馬或如日天或如明珠或如火炎或如水月或如幻化身攀緣善業速疾如筒出氣移去而彼神識欲生彼處因彼華見父母坐天榻上見彼天和合其神識於華內有形出彼時有微妙風甘露味和合而吹而彼起已彼識於七日內頭戴天冠生天童子爾時大藥菩薩復白佛言世尊彼神識既無有色云何為因緣而成就色云何為因緣而現見佛言大藥譬如二木和合各各相揩而出於火而彼火不在木內可見不離木而可得火亦非一因而能生火亦非無因而得出火非是木上即得見色以因故出出乃見色亦非離木而別有色可得如是如是大藥彼識以父母和合故成就受身其識亦不在身內可見亦不離身而有彼識大藥譬如火出已然後見色亦非熱故可見有色亦非赤故可言見色如是大藥彼神識以成就身故言有識亦不由受故可見亦不由諸行故可見大藥譬如日天圓滿光明照曜大有威光顯赫可見而諸凡夫輩不見正色或言黑色或言白色或言黃白色或言緑色大藥不可以身不見神識或黑或白等猶如日喻不可以暖可見光明其可見者但出沒行時如是須觀大藥此神識凡欲觀時但取其諸性大藥復白佛言世尊其識有何諸性也佛言大藥彼性受性取性諸行性憂愁性思惟性惱性喜性不喜性等是識諸性應當如是觀復次神識有本性可觀何等為本所謂善心不善心等為本爾時大藥復白佛言世尊彼神識從此身出已云何速疾而受彼生處云何從此身出已未至彼身受生之時於何處住此之神識當云何觀佛答大藥言譬如有人其臂纖長手足上下一切正等乘微妙速疾駿馬馳走入陳入陳已被刀槊弓箭所傷其心惱亂在彼陳內其心迷悶墮馬倒地而彼人善解戎仗倒地已速疾而起手執其馬即便騎上譬如彼人倒地之時速疾得馬得馬已即乘彼馬如彼馬速疾得速疾乘彼神識亦如是應當知如彼人被賊趁心生恐怖乘彼馬速疾而走此神識初捨身欲至彼亦復然欲生天即攀緣天念見天父母在一座上見已攀緣速疾即得受生復次大藥汝問凡人初移識時其識未至彼時在何處住其性當云何觀者大藥譬如人影在於水中雖復現色非人正形色當如是觀大藥彼人影上下手足正等成就色時在於水中亦不作如是念言我有熱惱我有寒凍我身疲乏彼無如是心言我是真體如前在胎肉塊而彼影無有擾亂處而彼人身影在水中之時無有聲出或苦聲或樂聲大藥此神識從此身捨已未至彼身有如是形有如是性大藥凡有福神識初欲取天身時作如是受爾時大藥菩薩復白佛言世尊此神識欲取地獄生云何受佛告大藥汝今諦聽如無福衆生欲取地獄生者我為汝説大藥凡有衆生若造不善業以彼業攀緣所攝而彼衆生此處欲捨其身捨身之時生如是念我即是彼人從此地獄捨身此是我父母而彼人捨身之時一等成就色身如本性有成就彼人如本身體即見身分而彼人初捨身被憂愁所流即見種種地獄彼神識初捨身已在彼地獄即成就有業即見彼地獄或有他方見如血灑而彼即心生染著相生染著相已即成地獄身而彼神識猶如下濕臭爛地因故生蟲身譬如屏臭穢爛故生蟲譬如酪內臭壞有諸蟲生大藥衆生欲生地獄亦復如是爾時跋陀羅波梨合掌向佛而白佛言世尊諸衆生輩在地獄其身有何色云何而受身體佛告跋陀羅波梨言若有衆生染著血處彼等身體生血色若有衆生染著毗羅尼河彼等身體即生不白不黑雲色若有衆生染著灰河彼等身體生斑駮色而彼等諸衆生於彼處身體柔軟猶如王子安樂養育其身跋陀羅波梨於彼處諸衆生受身廣大長八肘半其髭鬢頭髮甚長其足可畏反向於後若有閻浮提人欲往地獄觀者見彼地獄人即便怖死復次跋陀羅波梨地獄衆生雖復有食無暫時樂爾時大藥復白佛言世尊彼諸衆生食時有何等食佛報大藥菩薩言大藥彼衆生輩在地獄遊歷時遙見赤色或鎔銅或鎔鍮石見已各相唱言嗚呼仁者誰欲得食近來相共食此聞是聲已聚一處向鎔銅所會堂而住已求食故張口欲食而彼鎔銅及以鍮石熾盛放光作如是聲多吒多吒入其口然其全身大藥彼諸衆生以為食故受如是苦事復次大藥彼地獄中衆生於彼時其神識唯在骸骨內而彼等神識不離骸骨神識不離骸骨故不取命終雖然而彼等衆生猶尚飢惱彼處亦無食事於彼處有微妙園林彼等眼見種種華果種種樹木蓊鬱青色亦見微妙廣大地方柔軟青草所覆彼等見如是園林地方微妙各各歡喜微笑各各起念各各相喚汝等人輩如是園林微妙可受快樂又有涼冷微風彼等聞見此事已速來聚集即共入彼園林之內入已少時受樂於彼樹上所有華果及諸葉等悉皆成鐵彼衆生等即被彼鐵枝葉華果擘裂其身彼地獄衆生被枝葉華果猶如竹根擘裂身時口大叫喚處處馳走如是之時其後有諸閻羅王人手執利鈇或執大鐵杖其目可畏牙齒極利頭髮火然其炎高大全身燒然手執種種器杖罪人隨業所生彼人順後趁逐口唱是言人等住住莫走汝等自業所作此園林何故苦走不在此受斯業也大藥彼諸衆生在於地獄受如是苦惱當如是觀復次大藥其地獄人過七日後具足受地獄苦猶如蜂採華造蜜所以者何種種諸有因故成神識始受取地獄諸苦而彼神識初捨身不自由被諸苦所逼心中不樂初見大黑暗至彼處猶如有人被賊所逼牽挽心作如是念嗚呼我今何故捨微妙閻浮提棄所愛諸親侶向地獄速疾而行今不見天上之路其於彼時猶如蠶蟲被絲所纏速疾求受生處彼不自由被業所纏縛不能得住大藥其地獄衆生有如是因緣有受如是等諸苦惱之事爾時大藥王子及跋陀羅波梨長者子聞此事已身毛皆竪合十指掌向佛歸依其大藥王子等發心作如是願藉此聞法因緣在流轉生死煩惱內願莫生惡道願莫受地獄苦也爾時跋陀羅波梨復白佛言世尊我更欲問佛前所心疑佛告言跋陀羅波梨隨汝所疑恣汝意問跋陀羅波梨白佛言世尊何者名聚何者名積何者名陰何者名移佛言跋陀羅波梨凡有四種法界成就此身何者為四諸界和合智慧見意無明諸境界識此是總義我已説言聚者即是六界諸入境於六界內麁者三一者入復有二種取其內有髮髭鬚衆毛皮肉膿血涕唾脂五藏手足頭面身分支節和合故名為聚譬如諸穀積聚或烏麻或大小麥或豆豌豆以聚集故名積聚如是如是此身有身分有支節聚集故名為積聚言六界何等為六一地界二水界三火界四風界五空界六識界言六入者何等為六一眼二耳三鼻四舌五身六意言六入境界者何等為六一色二聲三香四味五觸六法此名為六入境界言諸麁界本體三何者為三一者欲二者恚三者癡彼等發起有三何等為三一者風二者黃白痰三者涕唾言諸入取者有二何等為二一者持戒二者信復有六何等為六一者施二者財三者精進四者禪定五者善六者非善言陰者云何名陰一者受二者想三者諸行四者識此四陰是無色言受者即是受用言想者即是知別樂苦言諸行者見聞觸受此名為識為身作主能得自在一切諸物中自在故言移者善成就清淨戒身業口業意業受根取命終時於彼時彼識捨諸陰更不受有生更不回故一向受樂故名為移是名為移離此者不名為有移如是次第別者不名為移作如是語已跋陀羅波梨及大藥菩薩頂禮佛足而作是言善哉世尊善能為我説如是義真實一切智世尊於未來世此法門為諸迷惑愚癡衆生當作潤益佛報彼二人言跋陀羅波梨此諸如來智者無有虛妄非一切智亦不能知此真實體我於過去行無量苦行熏修此智光明如今日所説無有異也此是智光明法自處處流布功德名聞一切智海藏為諸衆生教化故説所在之處所説之處於彼之處非人護持及諸天修羅摩睺羅伽人非人等來彼護持處頂禮於彼之處無諸恐怖縣官不能作惡劫賊當不能害佛告諸比丘汝等諸比丘若知從今去此法門不得無信人邊説亦不得覓過失人邊説亦不得外道尼乾等邊説亦不得尼乾陀聲聞邊説在阿蘭若空間者邊亦不得説亦不得不至心請人邊説所以者何恐其求過失如來實無過失若有出家比丘或在家俗人信受隨順此事者彼人應須當順彼人邊應須起慈悲心一如如來一種須發如是心此人持諸佛庫藏也爾時世尊而説偈言發心出家故應當行佛法降伏魔軍衆如象壞竹舍若能行此法謹慎放逸事滅生死煩惱當盡一切苦佛説此經已其跋陀羅長者子大藥王子菩薩及大比丘衆天龍阿修羅乾闥婆等聞佛所説歡喜奉行
