body:
  text: 爾時力生天子説偈讚曰若諸因緣業及所得果報此體性悉空佛説如師子爾時隨順力天子説偈讚曰若以業因緣增長於諸果兩足尊能知是故佛無等爾時順行力天子説偈讚曰修習如是界造作如是業當還獲是報佛眼悉能知爾時力起天子説偈讚曰修習如是界成就如是性佛知諸衆生如觀手五指爾時力行天子説偈讚曰修習如是界還值如是友如是相親近勝丈夫悉知爾時力加天子説偈讚曰加持於彼界導師能了知親近於諸友人尊悉照見爾時決定界天子説偈讚曰彼界彼要期彼友彼相應佛悉決定知故能除疑惑爾時正定界天子説偈讚曰彼界彼相續隨所住世間所行及諸趣勝人皆悉知爾時學界天子説偈讚曰於彼諸界中導師智能知彼智體性空勝智如是説爾時乘界天子説偈讚曰修習於彼界隨機時住世佛悉如實知故號無比身爾時隨順界天子説偈讚曰修習於彼界隨所得功德依因及果報佛知悉無餘爾時共界住天子説偈讚曰隨所修習界隨其所向道佛悉知無餘故為智所敬爾時智行天子説偈讚曰隨所修習界隨其所向道佛知衆生行故號學智者爾時行無畏天子説偈讚曰正定及邪定及不定衆生於此三聚中佛能決定知爾時乘行天子説偈讚曰若正定衆生堪趣涅槃者佛為世間日於中智無礙爾時解脫行天子説偈讚曰若有諸衆生住於不定聚墮於諸惡道亦為説涅槃爾時力期會天子説偈讚曰佛者但假名力智亦如是及四無畏等但隨言説有爾時見實天子説偈讚曰無佛及佛法亦無餘智聚顯示第一義如來如實知爾時力住天子説偈讚曰住於佛法力因是得無畏自在隨所欲悉是諸佛子爾時法無畏天子説偈讚曰世諦及真諦顯示此二種彼於真諦中言説不可得爾時智尊天子説偈讚曰法言説各異法相亦復異是言説無相佛智是法相爾時行精進天子説偈讚曰非處不定衆或向於異趣邪定一切處大牟尼悉知爾時信力天子説偈讚曰修習於彼界如起信樂心見貪以為淨牟尼悉了知爾時不淨乘天子説偈讚曰不實妄分別增長貪欲界信則行彼道牟尼如實知爾時慈乘行天子説偈讚曰不實妄分別增長瞋恚界信則乘彼道牟尼悉了知爾時乘因緣道天子説偈讚曰不實妄分別增長愚癡界信則乘彼道牟尼悉了知爾時乘捨天子説偈讚曰有不活畏者增長於嫉妬信彼則習行牟尼悉了知爾時習近善知識天子説偈讚曰近於善惡友還增彼惡界還成於彼信瞿曇悉了知爾時識堅固天子説偈讚曰流轉於世間隨所修習界隨順信於彼佛知悉無餘爾時行堅固天子説偈讚曰流轉於生死修習如是行隨順信於彼佛知悉無餘爾時信根天子説偈讚曰若有諸衆生隨所修習界佛悉能了知故號無礙智爾時根行天子説偈讚曰佛了知諸根隨其方便起攀緣及境界隨所入如生爾時乘根天子説偈讚曰身苦所逼迫由貪著渴愛斷滅諸渴愛唯佛智為勝爾時根境界天子説偈讚曰教下根衆生遠離於色愛教利者觀察兩足尊所説爾時根勝天子説偈讚曰下根住空間能滅於貪欲正觀於渴愛兩足尊能知爾時根決定天子説偈讚曰於先起愛欲佛觀無所得知無知寂滅故名為勝根爾時不離根天子説偈讚曰遠離不忿怒是離瞋對治是下根所行佛知衆生欲爾時信根天子説偈讚曰行慈除瞋恚能起衆生智彼能滅恚界人尊悉能知爾時求根天子説偈讚曰不瞋無過惡慈行性寂滅淨穢不可得故號人中尊爾時根順行天子説偈讚曰行於邪分別為他説邪行惑重無方便佛見倒解脫爾時智起天子説偈讚曰貪瞋恚癡等取著於前事違彼得智明大名稱悉知爾時離智愛天子説偈讚曰貪瞋及愚癡及明暗事中其性不可得兩足尊悉知爾時持威德天子説偈讚曰衆生所得智隨得智多少隨所成智器如來悉能知爾時求根天子説偈讚曰以智知於智遠離諸煩惱天人師悉知故我稽首禮爾時一向樂根天子説偈讚曰國土及時節觀察法方便煩惱穢及淨如來悉知空爾時智幢天子説偈讚曰衆生根欲信上中下差別縛解及智慧悉見無覺知爾時根幢天子説偈讚曰諸根上中下煩惱智及受調伏不調伏佛説悉無相爾時修根天子説偈讚曰禪解脫煩惱正受三摩提起清淨衆生如來悉能知爾時力速疾天子説偈讚曰得禪寂滅故於諸法自性悉皆能了知故號一切智爾時力鎧天子説偈讚曰若法及自性能説於此法能如實正受故不著三世爾時樂力天子説偈讚曰煩惱邪分別起生於四種能知業所生故號無比人爾時知力天子説偈讚曰能知清淨法對治於煩惱能宣説於業故號佛無比爾時力士天子説偈讚曰於禪解脫起三摩提正受煩惱及清淨佛悉説虛假爾時力生天子説偈讚曰禪解脫清淨三昧及正受彼從不逸生佛於此悉知爾時力增長天子説偈讚曰大雄於此中能於禪等轉知入捨無礙如風行於空爾時知前際天子説偈讚曰於無數億劫住於諸有中不為有過染故號勝丈夫爾時住前際天子説偈讚曰於無數億佛已曾修供養為求無上道是故我歸依爾時見前際天子説偈讚曰曾於過去世種種奉施佛於其種種辨人尊悉獲得爾時前際善巧天子説偈讚曰昔流轉世間如法學如行曾見無量佛故能深解法爾時學前際天子説偈讚曰諸佛法王所大雄昔修行於佛邊學已故禮知衆行爾時本方便具足天子説偈讚曰於無量億劫無邊諸佛行修行勝精進為求佛智故爾時本方便決定天子説偈讚曰一切法決定多億劫觀察一切法無入但説緣和合爾時思前際天子説偈讚曰於無量億劫導師曾修行知於處非處故名解世間爾時簡擇前際天子説偈讚曰住於處非處觀察於業因界根禪解脫佛悉能知彼爾時觀察前際天子説偈讚曰過去曾觀察增長智慧力十力大雄猛以智觀世間爾時前際境界天子説偈讚曰大雄本修行知一切衆生淨行不淨行故能治衆生爾時觀察前際行天子説偈讚曰先觀於衆生過去之所行信樂及與界然後治衆生爾時信力天子説偈讚曰我今信如來不可思議劫觀察本所行心悉無所著爾時智信天子説偈讚曰於無數億劫思佛昔所行善男子無能測盡如來德爾時觀後際善巧天子説偈讚曰如來以佛眼觀十方衆生初生及與死種種業相應爾時學後際天子説偈讚曰若因及以業隨趣向佛道牟尼悉知彼故號一切智爾時識生死天子説偈讚曰若衆生以界熏習造諸業衆生及業習佛了知無覺爾時知生死天子説偈讚曰近如是朋友造作如是業趣向如是道牟尼悉了知爾時所須善巧天子説偈讚曰能知於所須隨其如作業如是作業已如來悉了知爾時事善巧天子説偈讚曰依於如是事造作如是業佛悉能知彼皆是佛境界爾時知事天子説偈讚曰隨所執著事能有所造作佛了諸根故悉能知彼業爾時智善巧天子説偈讚曰若智及與事佛知彼妄想隨彼如執著佛亦知無餘爾時修作善巧天子説偈讚曰隨執著造業由於煩惱故佛悉能知彼故為世間歸爾時趣善巧天子説偈讚曰隨趣如造業隨業得彼果隨所緣作業佛眼悉了知爾時攀緣善巧天子説偈讚曰能知於所緣隨緣業成熟於諸趣受報佛悉知無失爾時習氣善巧天子説偈讚曰知惡業習氣善業亦復然知過去所行衆生趣趣中爾時業善巧天子説偈讚曰能知三種業現未及過去衆生於趣中凡於中迷惑爾時報善巧天子説偈讚曰少作得多報多作得少報及知多少等外道於中惑爾時學業天子説偈讚曰知於現報業亦知生報業及以後報業佛眼悉能了爾時知現法業天子説偈讚曰若現世作業現在則受報佛悉能了知凡夫不能解爾時知生報天子説偈讚曰若作如是業於異生得報彼大智悉知衆生不能了爾時知後報天子説偈讚曰若業多億劫然後得受報或復過於彼如來悉了知爾時知業不熟天子説偈讚曰若所造作業其業緣未熟未得於果報如來悉了知爾時觀業未熟天子説偈讚曰如來善觀業若業相應時生於諸衆生悉皆能善説爾時善知業熟天子説偈讚曰彼業若成熟能與當來報佛能如實知亦知彼智空爾時業熟決定天子説偈讚曰一切智了達輕業及以重能知衆生欲故得為我尊爾時知業輕重天子説偈讚曰趣惡道衆生隨其業如見彼業若輕重智者悉了知爾時知衆生行天子説偈讚曰見衆生所行及輕重諸業雄猛隨順知外道不能了爾時觀衆生行天子説偈讚曰觀於衆生行宣説於業報如器恆河水投鹽於一兩爾時學業天子説偈讚曰若受於思業佛説業究竟亦學無學報勝仙已宣説爾時樂佛智天子説偈讚曰佛勝眼所見三界中愚智隨業受於報見微細頂禮爾時説業盡天子説偈讚曰生死衆生所世尊大導師悉了知無餘故禮智無畏爾時無所得天子説偈讚曰若業生及死衆生各趣趣彼報由如夢兩足尊悉知爾時求煩惱天子説偈讚曰貪欲瞋恚癡兩足尊悉盡猶如夢渴人飲於清冷水爾時離分別天子説偈讚曰從於分別生貪欲瞋恚癡猶如夢中戲歸命勝説者爾時滅分別天子説偈讚曰若滅於分別則名盡煩惱如夢見雲散人尊顯現此爾時觀察漏盡天子説偈讚曰如夢見天雨起漏亦如是大雄能顯示起漏之因緣爾時觀察夢天子説偈讚曰如夢見大雨起漏亦如是大雄能顯示凡迷惑生漏爾時觀如夢天子説偈讚曰如夢見天雨隨順起諸漏大雄能顯示凡迷生諸漏爾時如自性知天子説偈讚曰如女夢生子生已還復死生喜亦生悲佛觀世亦然爾時思量夢天子説偈讚曰如夢見斬首盡漏亦如是自解亦教他故禮悉解者爾時修習慧天子説偈讚曰見法能解了如夢遇愛事遠離彼非實如是悅世間爾時智心天子説偈讚曰聞於如來法以空法自悅如夢中説夢如是曉世間爾時欣喜意天子説偈讚曰禪定者能令世間天人喜觀察於諸趣猶如鏡中像爾時決定慧天子説偈讚曰聞於如來法由如箜篌音渡人天疑海故禮人中王爾時幻喜天子説偈讚曰如人作幻化迷惑於愚人智者終不迷知幻不實故爾時除相天子説偈讚曰觀於一切世猶如夢作幻我於中無疑以聞佛法故爾時學幻天子説偈讚曰如幻師作幻自於幻不迷以知幻虛故佛觀世亦然爾時觀妄想天子説偈讚曰妄想生世間大導師悉知如精進念佛夢中即見佛爾時滅妄想天子説偈讚曰非事能生欲皆由妄想起不實妄起欲人尊如實知爾時識解天子説偈讚曰猶如深谷聲其響無有實是故不著世如是觀世間爾時説善巧天子説偈讚曰彼聲無有實而於中聽聞人尊宣説此救拔諸凡愚爾時如説行善巧天子説偈讚曰於法別義中衆生異妄取能行者知法於中除疑惑爾時順義行天子説偈讚曰若義及法實無有能了者無説亦無證牟尼作是説爾時法假名行天子説偈讚曰煩惱垢漏習皆想妄分別穢污及清淨但假名言説爾時分別善巧天子説偈讚曰一切但名字謂煩惱漏等穢污及清淨大智之所説爾時無依慧天子説偈讚曰於三界不著其心如虛空離惡真福田頂禮心寂滅爾時不下劣天子説偈讚曰非色非非色非欲非涅槃佛心無所依其猶如虛空爾時無欲天子説偈讚曰離於欲界愛色無色亦然解脫於貪礙頂禮愛盡者爾時遠離愛天子説偈讚曰於有無有中佛永斷遠離於三界無著頂禮牟尼王爾時障愛天子説偈讚曰障蔽於三界行於丈夫行能解脫衆生歸命救濟者爾時解脫渴愛天子説偈讚曰遠離於結使於後盡生滅身心皆清淨頂禮無熱親爾時知自性天子説偈讚曰大雄解自在知法中無事無縛亦無解頂禮見實者爾時出瘀泥天子説偈讚曰遠離愛欲泥亦離於諸有無取亦無捨頂禮盡後有爾時吐棄資緣天子説偈讚曰棄垢及資緣捨罪亦遠愛亦離於諸蓋歸命大導師爾時棄欲天子説偈讚曰棄捨利不利無著行決定出離於魔網頂禮無著者爾時樂利益天子説偈讚曰若自及他道遠離惱熱者大雄見彼道頂禮無礙見爾時得名稱天子説偈讚曰與佛智相應如説如觀者彼能除煩惱頂禮解世間爾時無畏天子説偈讚曰於諸法決定無能當對者師子吼無畏智海吼亦然爾時一切處無所畏天子説偈讚曰善度一切處遠離諸毒箭無畏不怯弱我禮最勝者爾時無所希天子説偈讚曰非天乾闥婆非魔及與梵能有難問者故佛如師子爾時師子遊步天子説偈讚曰佛於法無畏曉了諸法故無礙故無著無能難問者爾時無怖天子説偈讚曰如山林師子無怖亦無畏摧伏諸禽獸林中而大吼世尊如是吼驚怖諸外道天龍乾闥婆不見敵對者爾時一切處超勝天子説偈讚曰一切三界中悉皆都無有力敵於佛者故為我歸依爾時師子慧天子説偈讚曰大智見一切於諸法無畏世間無與等我禮無所畏爾時稱順生天子説偈讚曰自知是正覺如法無能難若有能難者世間悉無有爾時持藏天子説偈讚曰佛作師子吼開顯諸法藏億梵聞説已悉發菩提心爾時順威儀天子説偈讚曰彼衆得大利順佛威儀者發菩提心已必作勝導師爾時順樂法天子説偈讚曰彼世大衆生得聞佛法已能發菩提心必成妙丈夫爾時淨心天子説偈讚曰得聞佛説已世間無與比千億衆生等發勝菩提心爾時清淨流天子説偈讚曰人王於長夜佛學善修習故佛身清淨嚴相三十二爾時無漏心天子説偈讚曰佛得盡漏故而作師子吼得上智慧山無能難問者爾時順衆生天子説偈讚曰三界中悉無天人及修羅言佛漏不盡故佛具十力爾時巧盡漏天子説偈讚曰大勝沙門漏皆悉盡無餘於是無能難故佛是我父爾時常精進天子説偈讚曰於人王能難言有餘煩惱世間不可得故佛自在父爾時寂滅行天子説偈讚曰佛已斷貪瞋愚癡及習氣亦滅惡業行我禮寂滅者爾時方便行天子説偈讚曰若以方便觀斷盡諸煩惱彼佛滿足智是故我頂禮爾時方便解天子説偈讚曰無量巧方便導師於中修斷彼諸煩惱皆悉盡無餘爾時方便慧天子説偈讚曰導師照世間巧慧無有盡故斷諸煩惱及以習氣等爾時修寂滅天子説偈讚曰斷諸煩惱故習氣悉無餘於是佛大智不動無所畏爾時觀道理天子説偈讚曰佛斷煩惱盡及滅諸習氣照明如佛者世間更無比爾時斷使天子説偈讚曰佛斷諸習氣無有腥臭事故佛一切智天中最勝慧爾時住邊天子説偈讚曰佛今最後身已斷生因緣由盡諸漏故世親得無畏爾時無量智天子説偈讚曰大雄斷種子焚燒苦惱牙枯涸憂枝蔓我禮離惱者爾時出坑澗天子説偈讚曰世尊一切智已離無明坑佛行已得淨故佛得無畏爾時度有天子説偈讚曰已度於有海導師所作辦亦捨於彼岸自利得無畏爾時入涅槃天子説偈讚曰佛已得寂滅悉破諸煩惱乃至少習氣世親皆悉無爾時法幢天子説偈讚曰佛建正法幢摧折憍慢幢大雄已顯示無量諸法行爾時法性天子説偈讚曰性與諸子本牟尼達諸法善友於群生我禮最勝海爾時法充天子説偈讚曰渴樂於佛法故得無所畏無著諸佛子而作師子吼爾時求法天子説偈讚曰為求諸法故佛子得發心及見佛無畏有知求菩提爾時渴法天子説偈讚曰渴樂佛法故多億衆生輩聞佛無畏已深發大精進爾時法起天子説偈讚曰見佛説法勝建立於正法無畏布施已佛子求菩提爾時持法天子説偈讚曰世尊所説法甚深難可見佛子得聞已求無上菩提爾時無吝天子説偈讚曰身命及餘財佛子無吝惜聞佛師子吼悉求妙菩提爾時無異慧天子説偈讚曰聞佛説法已心思無有異於佛無畏所求法持律儀爾時無異行天子説偈讚曰聞法王吼已不趣於異路遠離於二乘求無上菩提爾時近住天子説偈讚曰見佛師子吼諸子得聞已定得勝菩提當成如來身爾時近辨天子説偈讚曰於佛世尊所得聞辨才已如來妙法中深生喜樂心爾時得辨才天子説偈讚曰佛吼無畏時所説不可毀信樂心決定終無退轉意爾時常喜天子説偈讚曰十力吼無畏所有諸佛子一切時欣喜心調求菩提爾時無怯弱心天子説偈讚曰常喜不怯弱世尊諸佛子樂求勝菩提以聞佛語故爾時無礙心天子説偈讚曰彼等求佛心終不有退轉欣喜微妙心聞佛善説故爾時巧知無邊法天子説偈讚曰以修正法故白法黨不減導師知非處不生厭足心爾時巧説法天子説偈讚曰修行黑法黨若不退減者世尊知非處故佛無所畏爾時法性無畏天子説偈讚曰黑法體性爾必當穢淨法彼不污心者佛知彼非處爾時巧相應天子説偈讚曰黑法及白法二異不相合佛説於彼義故佛是我師爾時巧知善不善天子説偈讚曰大雄皆悉知諸法不雜聚妄想分別故於善法中退爾時如説行滿足天子説偈讚曰行於煩惱者終不生白法不生白法故當知必退減爾時樂解脫天子説偈讚曰若樂解脫者修行於黑法佛説彼有障故佛一切智爾時淨心天子説偈讚曰心樂解脫者須知煩惱事大雄説此法故佛應受供爾時見煩惱天子説偈讚曰行於煩惱中不識煩惱者彼不知正法善逝如是説若言行諸惡不退善法者於解脫非器兩足尊所説爾時調伏天子説偈讚曰離欲及憒閙亦離瞋癡等如佛所説法應當如是修煩惱及白法愚癡不知者佛於彼非師大仙如是説爾時勤修解脫天子説偈讚曰佛説對治法為除煩惱故行彼不盡惑無能擊難者爾時向解脫天子説偈讚曰佛説如是法為斷煩惱故若修不滅惑無能擊難者爾時方便相應天子説偈讚曰佛是説法者為諸聲聞等若修不證者無能擊難佛爾時趣解脫天子説偈讚曰佛説如是法為欲斷煩惱若不滅惑者無能擊難佛爾時無畏功德天子説偈讚曰為滅煩惱故佛説不淨觀若不盡滅者無能擊難佛爾時善發心必修天子説偈讚曰慈能斷瞋恚修慈若不斷無能擊難佛世尊得無畏爾時淨目天子説偈讚曰佛説能修彼智慧除愚癡若彼不斷者無能擊難佛爾時滅覺觀天子説偈讚曰為覺對治故説於安般念修彼不滅者無能擊難佛爾時尊重無相天子説偈讚曰為斷吾我故佛説空寂滅以彼不滅者於是無能難爾時斷我慢天子説偈讚曰為斷憍慢故佛説無相法若修不滅者不見能難佛爾時淨身天子説偈讚曰深心信清淨一切煩惱盡修彼不斷者無能擊難者爾時深解想天子説偈讚曰對治及朋黨求於煩惱道無畏難佛者如來初不見爾時解用天子説偈讚曰世尊但名用此彼盡不盡無畏問難者彼亦但假名爾時調伏身業天子説偈讚曰以智善解已身業得流行世尊悉遍知故號一切智爾時知身天子説偈讚曰身業甚清淨大雄悉無餘憐愍群生者我禮世間親爾時身業簡擇天子説偈讚曰善簡擇身業憐愍衆生等照世而造作故號勝丈夫爾時善見身業天子説偈讚曰身業得清淨導師悉觀見憐愍諸群生故等一切智爾時善觀身天子説偈讚曰善觀得清淨身業得相應憐愍群生故勝丈夫遊行爾時成就語言天子説偈讚曰具甘美功德離於綺澀語智慧相圍繞世親而演説爾時時語天子説偈讚曰依時義相應遠離無益事佛言無不忠衆生悉受行爾時成就智慧天子説偈讚曰不惱愍衆生成相應不濁不壞於因果佛本如是説爾時不相違天子説偈讚曰乃至為身命未曾有妄語是故佛功德於世無有礙爾時實語天子説偈讚曰佛行實語因以是世瞻仰至心樂聽聞為得佛法故爾時從實生天子説偈讚曰世尊以實語漸備成菩提諸法真實性世尊皆悉知爾時實精進天子説偈讚曰於諸有為法如性真實見世尊皆悉知諸法真實相爾時簡擇業天子説偈讚曰於己及與他知身口意業以其智清淨故號佛無等爾時觀察意業天子説偈讚曰人王心意業所有思量事悲念於衆生故禮愍世者爾時巧覺觀意天子説偈讚曰世尊心緣處是心皆調柔悲念於衆生故禮愍世者爾時巧方便天子説偈讚曰衆生心所緣意業所起作種種智慧生世尊悉知彼爾時解慧天子説偈讚曰意業是佛地愍觀衆生故方便智清淨佛智無體性爾時巧知過去天子説偈讚曰佛知過去世若人所行業戒忍精進智佛皆悉知彼爾時觀察過去天子説偈讚曰觀察過去行能知多億佛過去所行處求勝菩提故爾時本行具足天子説偈讚曰憶念本行事億劫阿僧祇佛心無所著佛本所行處爾時觀察本行天子説偈讚曰阿僧祇億佛導師悉曾問出生三昧方種種成佛法爾時本行生天子説偈讚曰無量阿僧祇導師三昧門過去諸佛所曾問亦修行爾時觀察本住天子説偈讚曰生死中多過應供非應供觀已化衆生度脫於盲冥爾時厭過去世天子説偈讚曰彼此相食噉亦曾相戲樂迭互相殺害世尊皆悉知爾時知未來境界天子説偈讚曰導師未來時智慧無有礙衆生信業報諸趣佛能知爾時從本行來天子説偈讚曰世尊於過去智慧無障礙善業三摩提離趣知諸趣爾時巧知未來天子説偈讚曰佛於未來時智慧無障礙終死及生處於業報亦爾爾時離有法天子説偈讚曰世尊王三界三世中説勝佛智常無礙善知有境界爾時用行天子説偈讚曰衆生業行趣及受果報事此等但假名世尊如是説爾時觀察現在天子説偈讚曰王尊王現在智慧終不礙於無數佛土牟尼皆悉知爾時現在無畏天子説偈讚曰世尊正觀察三世悉平等究竟無所有迷惑凡夫智爾時智無所住天子説偈讚曰導師如是見三世無所住以依於法性諸法無事故爾時教三世天子説偈讚曰過去及未來陰生必敗壞無事無自性導師所顯説爾時意無著天子説偈讚曰世尊説三世皆悉無堅牢如幻亦如焰説言猶如響爾時三世自在富天子説偈讚曰世尊於三世常勤增智慧知諸行如幻諸根無所著爾時欲到彼岸天子説偈讚曰大雄於其夜得證上菩提世尊勤進欲至今不退減爾時欲作精進天子説偈讚曰世燈所有欲常不有退減世尊諸子等甚樂精進欲爾時建立欲作天子説偈讚曰世尊從欲起猶如水中蓮不為世所染如蓮處於水爾時欲解脫天子説偈讚曰欲及世間親此二名法界不二無二體世尊皆悉見爾時精進生天子説偈讚曰以精進威德剋證大菩提於其是非法終不捨精進爾時念具足天子説偈讚曰佛於一切處發心皆隨順於其善惡法佛念不損減爾時攝心天子説偈讚曰世親常攝心知諸衆生行隨其所修行而為其説法爾時敬重般若天子説偈讚曰世尊智慧海邊際不可得經億僧祇劫佛説不可盡爾時學解脫天子説偈讚曰無等佛世尊解脫不損減解脫及脫者佛求不能得爾時會解脫智天子説偈讚曰世尊解脫者等解脫知見解真實不減以知無自性爾時觀察身天子説偈讚曰佛於然燈始常修真實行三業無過失故歎號為佛爾時深行天子説偈讚曰世尊無過失不如餘衆生知諸法自性佛自性不惑爾時大慧天子説偈讚曰佛於一切種心念不迷惑其念常現前譬如油滿鉢爾時心不散亂天子説偈讚曰乃至少許時心念終不亂佛得不共法衆生悉不知爾時善解智慧天子説偈讚曰若有思量捨善逝無此事世尊不共法其法不思議爾時超一切天子説偈讚曰於是三界中知其一切法一切無如佛故號難降伏爾時堅持天子説偈讚曰無上堅固士於法無所畏等同一切佛能覺未覺者
