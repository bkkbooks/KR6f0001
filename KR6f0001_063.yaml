body:
  text: 北齊三藏那連提耶舍譯菩薩見實會第十六之三本事品第四爾時慧命摩訶迦葉見諸阿修羅王供養佛已生希有心作是思惟世尊本修菩薩行時作何善根得是果報時迦葉即入如實三昧以其三昧嚴心力故憶念過去阿僧祇阿僧祇劫如來所修一切功德於彼彼道彼彼生中所修善根皆為滿足無上菩提以此善根得住不退轉地彼諸善根皆得念知爾時迦葉憶念如來大善根時作如是心如佛所習善根廣大如來一一發心善根如十方世界恆沙剎土其中衆生皆得人身得人身已衆生如恆沙劫供養善逝亦如修羅一一衆生如恆沙劫供養如來已不能報如來一發心善根爾時慧命摩訶迦葉從三昧起以偈讚曰一一如來牟尼尊發心廣大向菩提此修羅等所供養佛迦羅分不及一世尊應供人中上如須彌山真檀聚人天中勝所供養由度功德彼岸故人中師子應受供過諸恆河沙數等譬如大海滿中水香水和合而供養具足功德應受供多於恆河沙數等積滿花聚而供養猶如斫迦婆羅山自然大士應受供如須彌山燈明炷大海以為香油器以燈供養諸勝者應受供養大威勢多於恆河沙數等造立塔廟而供養由度功德彼岸故人中堅固應受供以諸廣大勝寶蓋其蓋遍覆三千界經於那由他劫數憐愍世間人中尊無邊功德應受供以諸寶幢所供養遍滿十方諸世界於不思議億劫數以廣大幡而供養滿恆河沙諸世界經於無量億劫數供養如來人師子起於分別作譬喻大論師中師子子諦聽諦聽諸天人我及諸來在此衆若如恆河沙數等諸有十方世界衆一切皆當得作佛具足十力人師子彼佛頭數如恆沙一一皆有恆沙頭於一一頭如恆沙各各皆有恆沙口彼於一一無量口有於無量沙數舌以舌讚歎於如來彼諸如來説不盡功德彼岸不可到一切智智不可量由度功德彼岸故爾時世尊告諸比丘言善哉善哉諸比丘我諸聲聞端直而住有智有法亦如梵天乃能入我功德海中何以故如來具足無量功德具足不思議功德諸比丘如來功德聚不可思議諸比丘如來功德聚若是色者一一發心所得功德如恆河沙等世界中所不容受何以故諸比丘如來一一發心功德一切智所攀緣處如恆沙等諸佛如恆沙等劫不能思量説不可盡何以故如來本修菩薩行時無一發心不為利益一切衆生衆生所攝者無一發心不為一切衆生衆生界無邊際其中衆生亦無邊際所有衆生界無邊際如來一一發心功德亦無邊際何以故如衆生界無邊際如衆生界不可量如來一一發心功德聚不可窮盡皆為憐愍利益安樂一切衆生故是故發心假使一切衆生供養時不能報如來一發心功德何以故彼諸衆生供養如來皆為悕望雜食世報故菩薩本發心離於雜食求世報心為利益安樂衆生故欲令衆生背於生死趣向涅槃如來本修菩薩行時為利益安樂衆生離於雜食不求世報佛告諸比丘於過去世無量無邊流轉生死阿僧祇不可思議無始世界不可説劫中有佛號曰因陀幢王出現於世如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛婆伽婆彼佛如來以一一發心如恆沙等世界中曾為衆生作利益安樂思量發心比丘彼因陀幢如來作佛時恆河沙世界同一佛剎其因陀幢如來應供正遍知國土嚴淨離於惡趣及以八難是因陀幢如來應供正遍知其國土中所有衆生住正定聚其邪定衆生增上慢衆生一向皆無不淨身業不淨口業不淨意業一切皆無亦無惡趣煩惱作惡趣業何以故因陀幢如來教是衆生令其發心止一切惡以其善法授令修學是因陀幢如來國土中曾得五種樂所謂一得欲樂二得出家樂三得禪樂四得三摩跋提樂五得無上菩提樂彼諸衆生雖受其樂而不貪著譬如蜜蜂但取其味不取花色彼諸衆生亦復如是雖受其樂而不取著譬如飛鳥空中而行不著其空如是衆生雖受其樂而不取著亦復如是是因陀幢如來應供正遍知其佛土中所有衆生無有憂苦唯有喜樂亦無不苦不樂受愚癡無故唯有稱心之樂何以故彼諸衆生本修善故由彼因陀幢如來本修菩薩行時現諸相好令彼衆生不作一切惡安置衆生修習善法彼等次第離諸惡道安於善處彼等於一切種不善業一向悉無其所作業得果報時心不欣樂生苦受者無有是處不作惡業不受苦果故愚癡無故不苦不樂受亦無彼因陀幢如來佛土中一切時恆無惡風暴雨亦無毒熱彼諸衆生時節變易苦一切皆無彼因陀幢如來本修菩薩行時彼佛土中其諸衆生一切身業智上首智順轉演説開示正顯如是一切口業智上首智順轉演説開示正顯如是一切意業智上首智順轉演説開示正顯如是彼諸衆生從彼菩薩聞已彼諸衆生一切身業一切口業一切意業智上首智順轉回向以善業故愚癡報不生以其愚癡故受不苦不樂受彼諸衆生於彼佛土中苦受不苦不樂受一向皆無以離愚癡故彼諸衆生生彼國土時其因陀幢如來教化已於法敬重若遊行時思量於法愛欲於法染著於法彼等心生愛欲染著於法遊行時無有苦受行住坐臥睡寤乃至無有威儀之苦彼諸衆生在國土中無惡可順以無惡故無苦可生於善無著以是因緣彼諸衆生善順無故變易苦無於諸法中不生貪著是故壞苦不生亦無怨憎會苦何以故由彼衆生於一切衆生中得住平等心現前是故無有怨憎會苦亦無愛別離苦何以故由彼衆生於一切法不著故其愛別離苦從愛而生是故無有愛別離苦苦苦亦無何以故於樂受不生著故唯有行苦所謂無常苦何以故彼佛唯説第一義故彼佛住世經恆沙劫於彼佛剎無一衆生與佛競論者來生其國何以故由彼如來本行菩薩時成熟衆生故佛告諸比丘於意云何能以下善根少善根不善習善根不善相應善根非大精進善根非善趣善根非善發善根非善回向善根可能利益如是等衆生能與樂除苦耶可能淨如是廣大國土成熟如是多衆生耶諸比丘言不也世尊佛復告諸比丘言於意云何可以下心怯弱不善根相應心非精進心非善集根心非善趣心非善發善根心非善回向心可能利益如是等衆生思惟與樂能除苦耶可能嚴淨如是廣大佛剎成熟如是多衆生耶諸比丘言不也世尊佛復告諸比丘言於意云何可以下信少信羸信怯弱信不善相應信非精進信非善集善根信非善趣信非善發善根信非善回向信能利益如是等衆生除苦與樂耶能嚴淨如是廣大佛剎成熟如是多衆生耶諸比丘言不也世尊佛復告諸比丘於意云何可以下戒少戒羸戒非精進戒非善集善根戒非善趣戒非善發善根戒非善回向戒能利益如是等衆生除苦與樂耶能嚴淨如是廣大佛剎成熟如是多衆生耶諸比丘言不也世尊佛復告諸比丘言於意云何頗以下精進少精進羸精進怯弱精進非相應精進非精進精進非善集善根精進非善趣精進非善發善根精進非善回向精進能利益如是等衆生除苦與樂耶及能嚴淨如是廣大佛剎成熟如是多衆生耶諸比丘言不也婆伽婆佛復告諸比丘於汝意云何頗以下念少念羸念怯弱念非相應善根念非精進念非善集善根念非善趣念非善發善根念非善回向念能利益衆生及思惟與樂耶及能嚴淨如是廣大佛剎成熟多衆生耶諸比丘言不也世尊佛復告諸比丘言於汝意云何頗以下定少定羸定怯弱定非相應善根定非精進定非善集善根定非善趣定非善發善根定非善回向定能利益衆生思惟與樂耶能嚴淨如是廣大佛剎及能成熟如是多衆生耶諸比丘言不也世尊佛復告諸比丘言於汝意云何頗以下慧少慧羸慧怯弱慧非相應善根慧非精進慧非善集善根慧非善趣慧非善發善根慧非善回向慧能利益衆生思惟與樂耶能嚴淨如是廣大佛剎及能成熟如是多衆生耶諸比丘言不也世尊佛告諸比丘言諸比丘實如是不以少善根少戒少信少精進少念少定少慧能利益衆生及思惟與樂離苦耶能嚴淨廣大佛剎成熟如是多衆生耶佛告諸比丘於意云何彼時因陀幢如來汝知誰也如來問已諸比丘默然不答當於爾時東方過如恆沙等諸佛世界有世界名曰月光莊嚴彼土有佛號高威德王如來應供正遍知今現住世文殊師利在彼衆中即知釋迦牟尼心念已即白高威德王佛言今釋迦如來在娑婆世界説法世尊我今往彼見釋迦如來禮拜聽法供養恭敬作是請已時高威德王如來告文殊師利任意而去今正是時爾時文殊師利童子從座而起偏袒右肩右膝著地頭面禮高威德王如來右繞三匝譬如壯士屈伸臂頃時文殊師利在彼月光莊嚴世界中沒釋迦牟尼佛前出頭面接足敬禮如來却坐一面白佛言世尊昔時因陀幢如來者今即世尊是也何以故由是世尊具足不可思議諸善方便能成熟衆生淨佛國土恆不疲倦亦無厭足故世尊安置衆生住菩薩乘亦無厭足若有實語人作正語者勝中之勝勝中之妙勝中上首最勝中最勝言佛如是者當知釋迦牟尼佛真實無異時文殊師利而説偈言雄猛巧方便憐愍諸世間現大威神力成熟衆生故已於過去世曾作八億佛猶自有神力無心取正覺六十一三千清淨佛國土淺識不知佛牟尼巧方便不捨初發心彼彼處處現更於未來世示現無量佛伽樓羅王授記品第五爾時復有八億六千萬金翅鳥王見諸阿修羅供養世尊及得授記已於如來所生無等敬信踊躍欣喜為供養故化作八億六千萬殿堂純以諸天七寶莊飾甚奇微妙一一殿堂七重鈎欄四寶所成微妙第一所謂金銀琉璃頗梨金鈎欄者金為尋梁及作衆柱銀為曲㯪銀鈎欄者銀為尋梁及作衆柱金為曲㯪毗琉璃鈎欄以毗琉璃而為梁柱頗梨為㯪頗梨鈎欄頗梨梁柱毗琉璃㯪彼諸殿堂周匝四面垂七寶鈴所謂金銀琉璃頗梨真珠車璩馬瑙其寶精奇微妙第一是諸殿堂復以七寶羅網覆上所謂金網銀網毗琉璃網頗梨寶網赤真珠網車璩之網馬瑙網等微妙第一復更化作八億六千萬七寶之蓋微妙奇特所謂金銀乃至馬瑙復更化作八億六千萬七寶妙幢所謂金銀乃至馬瑙青幢黃頭黃幢青頭赤幢白頭白幢赤頭雜色之幢純色為頭純色之幢雜色為頭復更化作八億六千萬七寶妙幡有種種色嚴淨第一復更化作八億六千萬七寶之帳所謂金銀乃至馬瑙寶線織成微妙第一爾時諸金翅鳥王持是八億六千萬七寶殿堂八億六千萬七寶之蓋八億六千萬七寶之幢八億六千萬七寶之幡八億六千萬七寶之帳悉以奉獻如來世尊既奉獻已彼諸鳥王及供養具於虛空中繞佛三匝譬如羅婆那象王於三十三天頂戴諸天乘空而遊詣波利質多羅樹彼諸鳥王持是殿堂蓋幢幡帳飛騰虛空繞佛三匝亦復如是爾時彼諸鳥王敬繞佛已却住一面曲躬合掌衆共一音以偈讚曰歸命出離生死者歸命救度生死人歸命無等堅固士歸命無上無等聖願我當得堅固身三十二相自嚴飾復有八十隨形好唯願我等如導師願我圓光具威德形顏功德皆成就願得第一佛威儀令他心淨證寂滅願具持戒三摩提亦得諸佛上智慧願悉作佛度群有如佛今作世導師世尊我願具十力亦到十八不共岸成佛智慧過世間如今如來上中上亦知衆生無體性如幻如夢無所依宣説如響如虛空如佛今日為衆説爾時世尊知諸鳥王得敬信已現微笑相是時慧命馬勝比丘見佛微笑以偈問曰人中無上勝導師非是無事現微笑愍世間者為我説現此微笑何因緣彼諸鳥王已供佛寶殿幢幡空中現令此天人生希奇願兩足尊説是義一切大衆合掌住深心清淨皆欣喜願聞金翅未來果願兩足尊説此義人中最勝若説已一切大衆皆無疑大衆離疑得無畏如來智能令欣喜大衆欣喜得無畏離諸過惡心清淨彼衆樂聞如來説猶如弟子受師言願斷大衆心所疑願佛攝受令欣躍大衆欣喜皆來集願説金翅當來果爾時世尊以偈答慧命馬勝言十力真實超一切八枝梵聲悉具足降伏諸根為馬勝説於金翅未來果善哉馬勝問是義我現微笑愍世間諦聽彼報以悅意心當欣喜除疑網鳥王於我設妙供為求無上菩提果十種智力四無畏得彼法故成導師復求十八不共法此等金翅供善逝亦求堅固不壞身三十二相八十好求佛淨戒三摩提諸佛境界大智慧成就淨土度世間金翅求此供養我彼等信心供我已智者能離畜生趣當必得生於天上此是惡道最後身彼等後如恆沙劫常生人中及天上供養無量諸佛已當得作佛伏諸根彼佛國土無惡趣具足身相離八難彼佛同名普端正其劫名曰須彌幢八億四千萬歲中憐愍世間故住世彼時一切諸善逝住壽佛事皆悉同彼佛離熱度煩惱一一諸佛八十會一一會中八億人離於憍慢得自在以彼本有金色身大力常懷憍慢故後成佛時為衆生除斷憍慢轉法輪彼等過去已曾為修極苦行仙人衆其數八億六千萬凡所修行為神通彼諸仙人得通時歎己苦行為希有不犯禁戒具功德居住林中生憍慢以慢故生金翅中以通心故具神力戒清淨故得見佛以慢故忘菩提心如是佛授菩提記及説金翅本所生大衆聞已皆欣喜喜已皆成菩提器龍女授記品第六爾時九億六千萬龍女見諸阿修羅伽樓羅供養世尊及授記已心生欣喜彼得欣喜踊悅稱心於世尊所起心供養化作九億六千萬蓋皆七寶成毗琉璃網以覆其上赤真珠寶以為網緣金為蓋莖毗琉璃寶以為蓋子數有百千雜寶旒蘇垂下四面化作九億六千萬馬青馬青色青形青光諸莊嚴具一切皆青毗琉璃寶以為韁鞚於上虛空中化作大威德摩尼寶車於其車上復有寶殿縱廣正等六十由旬其殿遍覆諸來大衆其殿四面化作九億六千萬衆寶旒蘇周遍垂下甚奇微妙其諸光彩奪人心目化作寶網彌覆殿上復有寶鈴懸殿四廂化作七寶鶬鵠白鴿以次飛行繞殿四面又復化作九億六千萬種諸龍音樂時諸龍女乘彼青馬各擲寶蓋於虛空中自然遊行是諸龍女各取樂器奏諸音聲繞佛三匝以天旃檀末天沈水末多摩羅葉末天真金末及諸龍花并復化作種種之花而散佛上復以優波羅花旒蘇種種雜色衆花旒蘇種種無量雜香旒蘇種種無量雜色之衣種種無量雜色瓔珞以用散佛廣設供養亦如彼諸阿修羅王爾時九億六千萬龍女作音樂時以佛神力其聲遍滿三千大千佛之世界其中衆生聞是聲者於阿耨多羅三藐三菩提得不退轉於大威德衆寶殿中及寶旒蘇衆鳥行間諸寶鈴網微風吹擊出妙音聲其聲和雅甚可愛樂譬如百伎音樂善巧學人之所擊作所出音聲和雅可愛於彼大威德殿乃至鈴網所出之聲亦復如是此聲亦遍三千大千佛之世界其中衆生若聞聲者於阿耨多羅三藐三菩提亦不退轉爾時彼諸龍女復更雨於種種天花種種天香與水俱下其香花氣順風逆風不順不逆皆悉能去以香水故於迦毗羅城縱廣正等六十由旬皆成香泥其香泥氣遍滿三千大千世界其中衆生聞是香氣亦於阿耨多羅三藐三菩提得不退轉爾時彼諸龍女供養佛已及九億六千萬蓋九億六千萬馬九億六千萬音樂一切衆寶莊嚴供具於虛空中頭面禮佛右繞三匝却住一面曲躬合掌以偈讚曰諸龍婦等有智慧心意踊悅生欣喜供養釋迦牟尼佛願求安隱大菩提化作九億六千萬寶蓋及與妙莊嚴供養善逝善調心出離一切諸障礙復化九億六千萬妙馬及與莊飾具馬與莊嚴皆青色亦復更有青色幢彼馬一切空中行詣於佛所作供養龍婦咸有信敬心頭面頂禮如來足於龍宮中化音樂為供養故而持來來已奉上釋迦文應受供養大導師善逝令彼音樂聲遍滿三千大千界無量衆生得聞已皆悉不退菩提心彼諸龍女於空中化作一大衆寶殿縱廣由旬有六十遍覆十方一切衆寶名威德熾然光普照十方大千界彼諸龍女大衆前淨心欣喜供養佛生於踊悅無等心為求安隱菩提果願令我等當作佛利益一切衆生故我等願於無量衆説法度諸煩惱纏亦如十力大導師現救苦惱衆生等一切諸法如幻焰亦如水沫不堅實又如注雨所起泡當知諸法無有主衆生如像亦如影如是觀察世間已唯願我等為衆説法性真如及實際如佛無過善見法虛偽妄相誑愚者如幻莊嚴無有實唯能惑亂諸凡夫衆生於法迷無智不知諸法如實性導師已見彼彼法復能令他衆生解虛空興雲遍覆地見彼空雲猶如影彼無體實無所依亦復如影無有實如是衆生無體性唯能誑惑諸根門佛智如是見有趣但能誑惑無智者世間尊重以此業於智慧人作利益如來示現無體性一切衆生真實故唯以實法悅預子生死泥中作橋梁愚癡實法非境界由於著聲不求義以佛無邊我歸依具足示現真實者能與愚夫作親救歸趣舍宅善知識如是為求大菩提我等供養尊導師願得作佛覺寤他我益世間猶如佛爾時世尊知諸龍女得深信已現微笑相爾時慧命馬勝比丘以偈問曰於世智中勝智者最勝導師現微笑尊重堅固德如山今現微笑非無因人中最上勝尊主願為説此笑因緣天人龍鬼若得聞於佛皆生大欣喜世間導師於世聞常知一切因緣法無有一法佛不解因緣種類佛悉知唯願善逝見為説如佛所知笑因緣一切大衆若得聞皆生欣喜除疑網如來妙法有大利此等大衆必當獲大衆若得寂定心由味妙法利益故佛力令斷分別已唯樂菩提聽佛説若得聞於笑因緣當必成就於佛道若人於法情有疑其心掉動生苦惱現今此會大衆是不知微笑因緣故大衆堪能斷疑網唯願導師令除滅速為衆説度我等以何因緣現微笑誰於今日心清淨誰於今日降魔怨誰於佛所生敬信誰於今日供養佛唯願導師大衆前演説誰有如是力我等聞已生喜心生喜心已得安樂此諸大衆咸敬禮一切皆有疑網心願説笑因生喜故唯願世尊斷衆疑此諸天人得聞已大衆當得無疑網若得聞於如來説一切當得欣喜心爾時世尊以偈答慧命馬勝言善哉善哉慧馬勝能問如來笑因緣見諸龍女供養已我愍世間故微笑我今為汝説彼果離諸過惡至心聽我今所為現微笑汝馬勝等聽我語此諸龍女心無著求大菩提修進行以智慧修世間空決定安住菩提道於此無作無受者亦無生者養育者但有諸法無餘事其法亦妄如焰像以知恩故供養我能以智慧知真實善哉佛解諸世間所謂能見空無主彼樂此空善修習雖設供養猶如幻於勝菩提所發願觀彼菩提亦無著此以無等供養佛亦觀衆生空寂已永離龍道惡趣身與彼帝釋天中住在忉利天極受樂盡彼天子壽命已無能毀訾彼名稱復得生彼夜摩天居止夜摩天宮時具受彼天勝妙樂諸佛子等住彼中乃至盡彼天壽量此諸佛子具受樂盡彼夜摩天壽已復得往生兜率天與彼處天同其類為諸天女常圍繞具受彼天勝妙樂心無所著住善道譬如蓮花水不污彼天能以大智慧觀察一切世間空猶如畫石字不滅彼念不失亦如是彼諸天子居彼天具受彼中勝妙樂於彼善道盡壽已當更往生化樂天彼得善名無能毀為諸天女勝供養雖住天宮心無著乃至盡彼天壽限於彼化樂天宮中具受彼天勝樂報彼智慧者命盡已於一切法得究竟往生他化自在天作大商主信清淨住彼天中心無染如是住時愛樂法彼等居彼天宮殿受彼極妙五欲樂無愚癡者住善道乃至盡彼限壽量雖受天欲見其過樂求寂定及涅槃修習獲得禪定已命終即生梵天中於梵宮中善知禪受彼禪果寂滅樂智慧無等住一劫願求無上大菩提住彼梵宮一劫時善住威儀求智慧方便以利益世間廣作無邊無有量智住梵宮樂在禪於禪不著而寂滅知著禪樂亦是過諸根寂定求菩提於一切處心信解皆得安住菩薩行知諸禪定虛誑相唯求寂滅大涅槃彼諸佛子於彼中求於安隱菩提果在彼梵宮心清淨思利世間善調心諸梵天等自然教彼説梵教非出世唯有諸佛菩提道究竟能得出世間梵天當時生信已發心安住於佛法知本梵天自然教非是究竟出世道於善逝法彼相應為於世間説是法如彼法眼所説果令彼聞者速能知彼等住彼梵宮時作諸利益世間已能令無量那由他億衆安住菩提道彼於無量那由劫當得供養一切佛後於未來星宿劫諸根寂靜當作佛諸天人龍阿修羅金翅夜叉乾闥婆鳩槃茶鬼緊那羅一切大衆皆欣喜彼等一切佛教化於佛法中得力已皆悉欣喜合指掌稽首頂禮於佛足
