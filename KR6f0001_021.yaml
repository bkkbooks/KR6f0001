body:
  text: 大唐三藏菩提流志奉詔譯被甲莊嚴會第七之一如是我聞一時佛住王舍城迦蘭陀竹林與大比丘衆及諸菩薩摩訶薩俱悉從種種佛剎來集爾時世尊無量百千衆所圍繞供養恭敬時彼衆中有菩薩摩訶薩名無邊慧即從坐起偏袒右肩右膝著地稽首作禮合掌向佛白言世尊我有少疑請問如來願垂聽許為我宣説爾時無邊慧菩薩摩訶薩而説偈言大雄大丈夫世間無與等我為衆生故少疑當請問不起師子座現身遍十方一切異論中無能傾動者智藏無邊際諸力無有量世尊一一力普能度世間善住一切智善住於十力無畏大師子最勝無上尊十八不共法如來之所有照明於世間摧伏諸外道了知一切法是故無過上無失大導師我疑當請問無邊離垢智大海不動智境界無礙智我疑當請問世尊善修集於道無疑惑安隱大導師我疑當請問已度諸暴流已斷諸結縛能拔衆毒箭我疑當請問已破無明㲉已息煩惱熱清涼善安住我疑當請問無畏無上智無著無礙智法海一切智如來已證得佛無量功德智證悉圓滿盡一切有漏破諸煩惱見世尊多積集無量大功德不思議法王我疑當請問世尊殊勝智普能照世間演暢法光明無邊功德海導師法光故遍照於世間是故世間中佛法光明現法海一切智辨才無有上精進不思議清淨離諸見佛眼無邊故智境亦無邊世間無等尊我疑當請問法王大牟尼能斷衆生惑導師我當問願隨其意樂我觀一切處天上及人間無有等如來普遍照明者善住諸功德莊嚴大丈夫不思議法王仙中照曜者譬如大雪山衆寶端嚴處世尊安法座端嚴亦如是妙音大精進能宣悅意聲衆生若得聞善根悉清淨世尊人中勝時演法光明以是諸衆生隨意便開覺知時知衆會知人大導師敷演法光明以時智慧者梵音大精進願賜清淨言如天雨大地法潤遍霑洽世尊處衆會普宣法雨已於此法悕望衆生皆滿足最上勝安住如王處妙高惠施諸衆生能令衆歡喜大雄兩足尊不思議境界一切諸衆生無有能知者無量大丈夫衆會已和合依怙大牟尼志求佛境界我於佛境界發趣故來集導師無礙智如何疾開覺我隨其意樂瞻顏欲請問世尊願開示為斷諸疑惑若聞無上法便得心歡喜踊躍充遍身能斷衆疑網法王無上尊一切智無畏一切知見者我疑當請問佛於一切法無有少疑惑精進大導師我疑當請問無上斷疑者於法不疑惑無邊功德海我疑當請問無邊大光明無邊大功德無邊清淨智我疑當請問無邊精進智無邊境界智無邊饒益智我疑當請問世尊無邊智離邊及無邊能斷一切疑我疑當請問不思議法王垂哀聽我問見許我當問牟尼為宣説請問一切智釋迦名稱尊若垂聽許我願決我疑網爾時世尊告無邊慧菩薩摩訶薩言無邊慧汝今於我渴仰志求欲於如來幾何所問若有問者我當解説爾時世尊而説偈言告無邊慧汝欲何問悉應問之我當解説如彼所問一一發明隨其樂欲速為開示我為汝説一切無疑如汝志求稱汝所問汝今時問如時如義以時問故我決定説如汝意樂問所應問我皆隨順為汝説之汝今時問我亦時説斷汝疑網當得無疑我為法王了義究竟於一切法得無疑惑我於諸法正覺難思如衆生意所問為説我於諸法悉無有疑時而問者速當為説我時為説無有疑惑如其意樂釋彼所疑我常了知時及衆會諸衆生等意趣所同亦常觀察一切衆生有欲無欲彼皆明見若有智者能善修行我皆以時正法開悟若無智者愚癡迷亂彼無慧明不尊重法若無尊重於法不求雖聞此法無大明智法善巧者於法希求若聞此法得大明智樂大乘者求人中尊聞斯法已得大明智佛無上智不思議智而發趣者聞皆滿足樂無礙智求最上尊彼聞此法得大饒益若有智性求不思議彼聞此法得無上智若有衆生求佛道場轉無上輪得法歡喜愛樂精進於法尊崇聞離垢法欣然踊躍若有衆生樂善修習以法光明説無上法荷諸重擔無邊策修彼聞法已歡喜充滿若有希願善法思惟於彼慈哀為之開釋哀愍汝等隨汝所問我能決定當斷汝疑我多千歲修行善巧疑惑已除知汝意樂若有疑者恣汝所問當為汝説斷諸疑惑若有疑者恣汝所問如其樂欲我當説之若有疑者恣汝所問我住於法得無動搖爾時無邊慧菩薩摩訶薩白佛言世尊如來應正遍知我於菩薩乘中少有所疑今當請問何等善丈夫遠離於怖畏一心正念為諸衆生被大甲胄於大甲胄而莊嚴之起大愛樂而尊重之以不放逸乘此大乘以大清淨平正之道無諸堆阜瓦石荊棘衆惡雜穢諸見稠林亦無毒刺苦惱坑陷亦無繫執怖懼艱難正直無曲如理平道無障礙道剪諸稠林裂一切網遠離黑暗蠲除愛著捨和合故而發趣於阿耨多羅三藐三菩提世尊如來應正遍知我於此義故致斯問何等善丈夫何等大甲胄被此甲胄乘於大乘以斯大道而當發趣世尊應説諸菩薩摩訶薩甲胄莊嚴安住於道安住諸法理趣善巧於法理趣住善巧故而能起於諸法理趣善巧光明法光明故不捨甲胄乘於大乘以不退轉精進之力無忘念根相續慧力速能成就法界理趣分明善巧往詣道場轉于法輪為諸衆生演説法故一切衆生如其所願如其發趣解脫生死世尊如來應正遍知此之大乘我欲利益安樂衆生故問斯義世尊如來一切知者一切見者以何等法成就諸菩薩摩訶薩一切諸法海印三昧以三昧故令諸菩薩摩訶薩乃至未證阿耨多羅三藐三菩提猶不退轉世尊如來知見成就未曾有法善諸衆生智慧之藥故我問耳爾時無邊慧菩薩摩訶薩而説偈言為諸菩薩故我問兩足尊一切知見者甚深佛法義大乘所修行何定能發趣我今皆請問饒益諸衆生云何善丈夫能被無邊甲如是被甲已云何當發趣云何起樂欲云何愛於彼云何大精進云何不放逸云何諸菩薩乘於此大乘乘已復云何此事應當説云何乘大乘發趣菩薩道唯願世尊師速為我宣説云何平正道平等而發趣於諸見稠林剪伐恆無倦於諸境界中云何得超越云何以平等裂於貪愛網云何除黑暗得大智光明彼諸菩薩等云何當發趣云何能觀察遠離衆結縛云何諸菩薩離縛善安住云何諸菩薩超過大怖畏善巧諸法義發趣於無上菩薩被何等無邊大甲胄被斯甲胄已乘於此大乘云何諸菩薩發趣平正道我今所問者世尊應演説菩薩云何得莊嚴大甲胄莊嚴無上乘世尊應演説安住於斯道及彼道莊嚴諸法之善巧世尊應演説云何能了知法界之理趣法善巧光明世尊應演説云何諸菩薩得此法光明究竟一切法世尊應演説云何諸菩薩得法光明已不捨大甲胄由是而發趣云何諸菩薩乘於此大乘精進不退轉由是而發趣云何諸菩薩志念常堅固能以智慧力而得善調伏云何得法界理趣之善巧法王不思議世尊願宣説云何能速往至於菩提場轉于大梵輪世無能轉者云何無所動演説於諸法為一切衆生如其昔所願演説諸法故解脫於生死云何令衆生究竟獲安樂饒益衆生故我問世導師一切知見者願為我宣説當以何等法成就諸菩薩一切法大海所作印三昧樂求佛法者渴仰大菩提若聞此法者舉身悉充悅爾時世尊告無邊慧菩薩摩訶薩言善哉善哉無邊慧汝於往昔供養承事無量諸佛種諸善根集諸功德不可稱量於此深法欣求渴仰以大志樂成就衆生而興大悲問於如來汝今諦聽善思念之吾當為汝説諸菩薩摩訶薩以功德成就而發趣於阿耨多羅三藐三菩提唯然世尊願樂欲聞爾時世尊告無邊慧菩薩摩訶薩言無邊慧諸菩薩摩訶薩為阿耨多羅三藐三菩提被甲胄者為欲攝取諸衆生故被大甲胄為諸衆生布施清淨故被大甲胄為諸衆生持戒清淨故被大甲胄為諸衆生忍辱清淨故被大甲胄為諸衆生精進清淨故被大甲胄為諸衆生禪定清淨故被大甲胄為諸衆生智慧清淨故被大甲胄為諸衆生獲安樂故被大甲胄為諸衆生起饒益事相應心故被大甲胄為諸衆生貪瞋癡病作對治故被大甲胄為大功德作善巧故被大甲胄為無上智善圓滿故被大甲胄為諸衆生生死怖畏作救護故被大甲胄為欲顯現無等等智善圓滿故被大甲胄於此三千大千世界所有諸魔若魔眷屬若魔使者住魔業者及行諸見稠林險徑一切外道諸遮羅迦出家吠陀烏摩利迦路伽耶陀及此外道相應之輩與交戰故被大甲胄諸菩薩摩訶薩如是被於大甲胄已不捨甲胄起大精進能入一切衆生界中以忍安住遠離怖畏不驚不懼不動不亂而復被於無邊甲胄所謂救護一切衆生甲胄剪一切見稠林甲胄破諸魔軍甲胄能授智慧甲胄無邊津梁甲胄度諸重擔甲胄增長淨信甲胄安住尸羅甲胄淨治業藏甲胄一切清淨力藏甲胄方便善巧力藏甲胄能斷一切執著甲胄不退不悔智慧甲胄諸菩薩摩訶薩被於如是大甲胄已亦不捨離乃至盡邊際堅固精進力曾不動搖而發趣於阿耨多羅三藐三菩提爾時世尊而説偈言菩薩被甲胄為攝諸衆生衆生無邊故被甲亦無邊布施清淨故一切令充悅為利諸衆生乃被斯甲胄持戒清淨故饒益於世間為利諸衆生乃被斯甲胄忍辱清淨故勇猛善安住為利諸衆生乃被斯甲胄精進清淨故成就不退轉為利諸衆生乃被斯甲胄禪定清淨故所行境亦然為利諸衆生乃被斯甲胄智慧清淨故無漏無過上為利諸衆生乃被斯甲胄一切諸衆生樂具悉當與善知此義故乃被斯甲胄菩薩於衆生能為饒益事以清淨四攝普遍諸有中若病貪瞋癡而為對治者授諸衆生藥所患令消除由是諸菩薩善能被甲胄於功德資糧獲無邊善巧衆生生死苦逼迫不安隱我當為救護被甲胄無邊無邊生死苦我能令解脫愛見網所縛一切皆當斷於此煩惱網一切能斷者堅固精進力勇猛而被甲一切諸衆生令住安樂道以是趣涅槃安隱而無上以大精進力乃被斯甲胄當共一切魔敵戰嘗無倦若住於諸見稠林而行者路伽耶陀等被甲利於彼及餘無量衆行諸非道者於彼咸利益故被甲無邊如是被甲已不捨於甲胄起大精進力被甲勝堅固入於生死界以忍得安住成就堅固忍被甲無過上遠離於怖畏亦無有驚懼被無邊甲胄一切勤修習善住於甲胄常能正了知寂然不動搖不亂不退轉被如是甲已智者復當被救護衆生甲破壞衆魔甲無邊津梁甲一切悉當被勇猛勝智人被已得安住為大重擔故被甲無有上度一切衆生苦擔悉令脫增長清淨信善住於六根戒得共相應被甲無過上成就勇猛智菩薩能安住威儀戒相應被甲無所動於昔勝尊衆清淨修諸業是故被甲胄而常不怯弱以愛衆生慧饒益諸世間通達於方便被甲善安住於巧方便智菩薩能通達如是被甲已斷除衆結縛遠離一切執正信不違背被甲之智人發趣於無上菩薩能決定自利及利他以善精進力堅固無退轉復次無邊慧諸菩薩摩訶薩於無量劫荷諸重擔被大甲胄如是甲胄若魔若魔眷屬或魔使者及行邪見稠林惡磧諸衆生等所不能見何以故無有形色不可示現無對無相捨相離相無名字故無邊慧假使飛箭量如須彌攢鋒激射無能中者設以三千大千世界所有衆生一一為魔各有若干魔軍眷屬競共俱時發諸利箭亦如須彌彼終不能壞諸菩薩摩訶薩如是甲胄乃至不能損一毛端於諸菩薩摩訶薩意尚猶不能令有異念何況身也諸菩薩摩訶薩若以一心摧伏彼者能令衆魔退散消滅善能安住如是甲胄而不動搖一切衆生無能壞者何以故以無相故非諸衆生見所行故一切衆生不能見知諸菩薩摩訶薩而能了知一切法故如實知見被大甲胄為欲救護諸衆生故於一切法無所執著為欲饒益諸衆生故於一切法亦無所得是故衆生不能見知如是甲胄無有形相無有示現無言説故不與色相應不與受想行識相應不與內相應不與外相應不與亦內亦外相應不與非內非外相應不與界相應不與處相應不與地界相應不與水界相應不與火風空界相應不與欲界相應不與色無色界相應不與有作相應不與無作相應不與亦有作亦無作相應不與非有作非無作相應不與聲聞地相應不與獨覺地相應不與佛地相應不與語言道相應亦不與色因相應不與色相相應不與受想行識因相應不與受想行識相相應亦不與相非相相應亦不與一切法相應非不相應無有繫縛無有解脫亦非算數譬喻可知以一切法過諸數故如是甲胄一切法見皆不可得色見不可得受想行識見不可得乃至無少法見可得如是甲胄不與一切法相應非不相應不與色相應非不相應不與受想行識相應非不相應於一切法若相應不相應彼皆遠離如是甲胄亦無有作作者無故亦無有相相非有故無處所相無和合相無有分別無有動搖無有攀緣無性可見被甲胄者亦不可得如是被甲亦不可見何以故諸菩薩摩訶薩被甲胄時而不見有誰為被甲何處被甲從何被甲亦不見有我能被甲我所被甲亦不見有此處被甲他處被甲亦不見有如是被甲所為衆生於一切法無所行故無所有故諸菩薩摩訶薩被如是甲胄則被如來所被甲胄身不可得心不可得意不可得不可得故遠離分別諸菩薩摩訶薩若住少法若得少法現被甲胄當被甲胄不應説名被大甲胄若心超過乃可説名被不思議大甲胄也諸菩薩摩訶薩不為少衆生故被大甲胄亦不為一劫衆生故被大甲胄亦不為百千劫百千俱胝劫百千那由他俱胝劫諸衆生故被大甲胄為於無量無數劫中諸衆生故被大甲胄是故説名被於無量大甲胄也諸菩薩摩訶薩被甲胄時被於不住衆生想甲胄不起我想甲胄離衆生想甲胄滅我想甲胄知衆生性甲胄知我性甲胄過想受甲胄知一切法無作相甲胄空相甲胄無想相甲胄無願相甲胄知一切法無生相甲胄無滅相甲胄知一切法差別性相甲胄無差別性相甲胄知一切法事相甲胄無事相甲胄無邊慧若住於事而被甲胄終不説名被大甲胄以諸菩薩摩訶薩不住於事求大智慧是故説為被大甲胄爾時世尊而説偈言無量千劫中被大無邊甲為欲令衆生解脫諸苦惱如是大甲胄若魔若魔使作諸魔業者眼所不能見及餘衆生等行見稠林者甲胄不思議亦非彼所見無色無形像無對無相待甲胄不思議故非眼所見無名亦無相遠離一切相甲胄無有邊故無相見者假如須彌箭攢鑽來中射甲胄不思議令箭自摧折世界所有魔亦以須彌箭於斯大甲胄競共來激射然於大甲胄不損如毛端甲胄不思議無能摧壞者由是諸菩薩身心無變異甲胄不思議誰能傾動者若以一念心摧伏諸魔衆菩薩不思議魔軍咸退散如是大甲胄未嘗有動搖一切諸衆生而無能見者一切諸衆生不知甲胄相是故諸衆生眼所不能見菩薩為依怙能知一切法猶若勝金剛斯為善被者不受一切法救護諸衆生順諸佛法故斯為善被者甲胄無所取隨順一切法甲胄不思議斯為善被者甲胄無示現淨治一切法諸法離言説無能示現者不與色相應不與受相應不與想行識相應及和合不與內相應不與外相應不與內外俱相應及和合不與界相應不與處相應若界若處中亦無有和合不與地相應不與水相應不與火風空相應及和合不與欲相應不與色相應不與無色界相應及和合一切無所得不與諸有作不與諸無作相應及和合甲胄不思議無住無和合無縛無解脫亦無不相應甲胄無邊際不共聲聞地不共獨覺地相應及和合乃至諸佛地及與一切法一切不相應一切不和合種種語言道而無能及者甲胄無有邊無體難思故不與一切法相應不相應甲胄不思議超過一切數甲胄無有上無縛無非縛亦無有色相受想行識相不與彼諸相相應及和合不與諸法相相應不相應亦不與無相相應及和合甲胄無有上無縛無解脫一切諸法中不墮一法數一切諸法中甲胄不可得是故無有上説名不思議甲胄無有色無受亦無想無行亦無識非諸蘊所攝如是勇猛者被斯大甲胄身心無所得不見微少法過諸思擇故清淨心安住而常無怯弱説名不思議堅固被甲胄其心無所動不計諸劫量説名不思議甲胄無有量不取法非法以無時量故説名不可量不起衆生想亦無有我想能知此想故一切想不生亦知一切法此法皆無相如是被甲胄説名不思議復次無邊慧此大甲胄名曰妙法嚴具莊嚴亦名最上不可壞故亦名一切法無差別不於少法作差別故諸菩薩摩訶薩被此甲胄持大慧力乘於大乘最上之乘無等等乘大攝受乘無邊攝受乘一切衆生乘此乘者於此乘中無不容受然於此乘不增不減能令衆生安樂而住亦令衆生安樂而出若有衆生乘此決定安樂乘者無有身心疲倦勞苦無邊慧此乘映蔽一切世間天人阿修羅聲聞緣覺及餘諸乘而當出離此乘無來無去無住無見無知前際不可得後際不可得中際不可得三世平等猶如虛空不離塵染無有相待無有障礙亦無執著以此乘故而當出離此乘無量不可量故本無礙相不住相故最上第一乘此乘者無怯弱心而發趣於阿耨多羅三藐三菩提無邊慧此乘如燈如日月輪為諸衆生作大光明此之大乘亦復如是光照三千大千世界無能映蔽無能障礙能以無邊大功德海而發趣於阿耨多羅三藐三菩提無邊慧此乘離暗能除一切世間之病超過一切世間之法攝大衆生非諸下劣所能乘也唯除能被大甲胄者如我所説於無量劫救護衆生供養諸佛種種善根資糧清淨之所能乘聲聞緣覺及餘下劣繫縛世間世間相應或增上慢慢所調伏一切外道無信之輩尚不欲聞此乘之名何況而能乘此乘也若有衆生遊戲不可思議境界乘此乘已如其勝願而發趣於阿耨多羅三藐三菩提無邊慧此乘無際初中後際不可了知此乘際斷際不可得無邊際是乘際無量際是乘際無邊慧乘無邊際亦無中際無有少際而可斷者言際斷者以無少際説為際斷不分別際説為際斷如是名為此乘際斷際無所有説為中際際無所有説為邊際際無所有以際説之於彼際中際不可得不可得故邊際中際無際無斷入於際門入際門故此乘超過於彼超過亦無所得無邊慧何者為際謂斷常際入語言故際則非際彼斷常際無有邊際以彼際相相無邊故所言際者無有分別分別斷故超過於際遠離斷常無邊慧有身見者則於際門有所依止若無身見則於際門無所執著無執著故於斷常際乃能超過無邊慧斷常際者而無有實但誑語言於三有中分別二際於彼二際若不攝取若不相應乃能超過斷身見故於二際門而無所執無邊慧若諸菩薩摩訶薩未離身見則不名為被大甲胄乘於大乘於彼際門則為執著設欲斷際起斷際想於前後際而有分別若諸菩薩摩訶薩已離身見是則名為被大甲胄乘於大乘於彼際門則無所執過二際已以安樂乘而發趣於阿耨多羅三藐三菩提無邊慧諸菩薩摩訶薩以大慧力能於一切住際之法不斷不破善巧方便攝取止觀修習無相得無相證則為諸佛授法光明法光明故一切際斷於彼際斷亦無所執無有少際於彼際門若相應若不相應若憶念若不憶念於一切法善巧方便安住止觀便獲無邊大法光明法光明故遠離黑暗怖畏毛竪建大法幢出大梵音大師子吼告衆生言汝等速來於此大乘大安樂乘大調御乘大發趣乘而發趣於阿耨多羅三藐三菩提為諸衆生演法光明法光明故能令衆生被大甲胄乘此大乘無邊慧諸菩薩摩訶薩於此大乘此大甲胄勿生慳吝當願衆生發菩提心被此甲胄乘此大乘於此大乘此大甲胄亦勿慳吝而能展轉勸諸衆生復願衆生被此甲胄乘此大乘而當出離諸菩薩摩訶薩住是行時攝取佛國清淨佛國攝取聲聞及諸菩薩圓滿功德以此無邊大功德海而發趣於阿耨多羅三藐三菩提無邊慧此之大乘等于法界此岸彼岸無可得者然能運載一切衆生從此至於法界之中無處相應法界相應甲胄相應若於此乘等于法界勤修習者而發趣於阿耨多羅三藐三菩提無邊慧譬如法界無有塵染無能壞者無能染者此之大乘亦復如是無壞無染無壞染故而當趣於一切智智是故此乘説為大乘此乘無礙一切世間天人阿修羅不能退轉以無著故而當趣於一切智智是故此乘説為大乘言大乘者謂大莊嚴一切莊嚴無不入此大乘中者爾時無邊慧菩薩摩訶薩白佛言世尊於此乘中豈有有為諸莊嚴耶爾時世尊告無邊慧菩薩摩訶薩言如是如是無邊慧我隨世俗於此乘中亦説一切有為莊嚴無邊慧若轉輪王帝釋梵王無不皆從此大乘出若已出者若當出者雖住轉輪釋梵尊位不為生死煩惱過失之所染著能於諸欲一一稱量既稱量已則便厭捨於出離道而能了知無邊慧若諸菩薩摩訶薩乘此乘者雖受生死於一切處不為染污能見過患能知出離若我於此未説諸法及諸莊嚴以此乘相於彼諸法及諸莊嚴亦能了知而發趣於阿耨多羅三藐三菩提爾時世尊而説偈言大乘無上乘此乘不思議若有乘此乘彼皆當出離是大依止處此乘不思議無量無邊際故名為大乘一切諸衆生乘於此乘者此乘無有減亦復無有增一切諸衆生乘於此乘者安樂而發趣於中無苦惱若諸菩薩等於此乘發趣直進無他行身心不疲倦照明於世間天人阿修羅當於此大乘無上而發趣映蔽諸緣覺及以聲聞乘亦於此大乘無上而發趣無來亦無去無住無前際後際及中際無得無所見三世悉平等猶若淨虛空此乘亦如是遠離諸煩惱此乘無相待無障無罣礙一切悉能救所向無執著此乘無有量亦無一切相自性不可得無畏不思議若有乘此乘得無所畏者乃於佛法中無障無罣礙以此乘發趣普明於世間如日百千光無時而不照此乘不可壞無能映蔽者無量德資糧無上而發趣此乘超世間出過於三界遠離諸黑暗能趣於無漏此乘唯攝取一切諸菩薩其餘衆生類於中不容受若有智慧者無量千劫中方便勤修習乃乘於此乘非諸聲聞衆及以諸緣覺一切外道輩而能乘此乘若有諸衆生趣於非道者斯人鮮福德不堪聞此乘若有諸衆生於不思議法善巧而遊戲安住於此乘隨其所建立殊勝之誓願住斯正道中無上而發趣此乘無邊際亦無有中際邊際及中際一切不可得以際不可得此乘無有際一切際斷故安樂而發趣此乘無邊際無邊是乘際此乘無量際無量是乘際此乘無際斷無際為際斷於際不分別斷亦不可得乘際無邊際亦無有中際亦無無際際際性無所有於際無際相非際為際相於彼諸際中際相無所有非際説際門此乘已超過於彼所過量相應不可得我説斷常際有邊無邊際如是一切際彼際悉非際一切際無邊際相無所有一切際自性於中不分別如是諸際中以斷於分別邊際無邊際一切悉能斷若有有身見則説諸際門執著此諸際為無依怙者若無有身見不著諸際門不執一切際為能照明者一切際非際諸際非真實一切際性相彼皆無所有不受一切際於際悉超過不著諸際門能斷有身見若於有身見不斷不遠離不被大甲胄不乘於大乘以受於諸際分別諸際相前際及後際一切皆分別若於有身見一切已能斷乃被無邊甲乘於無上乘不著諸際門為世智慧者能於種種際一切悉超過由是佛法中安樂而發趣菩薩善觀察能以大慧力不得少有法可斷可除滅常以善方便善攝於止觀一相了知故諸相皆了知安住於正法得大法光明以是法光明決了彼諸際不見少有際若際及非際於彼可相應一切無所著若見苦衆生慰諭而告言汝來於此乘安樂而出離一切受生處能作法光明被甲乘大乘亦以此開示此乘此甲胄於彼勿慳吝亦令諸衆生被甲乘大乘乘此安樂乘無上而發趣如是諸菩薩安住此修行能於佛法中以速而發趣清淨佛國土攝受諸聲聞及諸菩薩等功德莊嚴事
