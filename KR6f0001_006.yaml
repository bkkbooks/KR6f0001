body:
  text: 爾時無邊莊嚴菩薩摩訶薩白佛言世尊云何名為出離諸法陀羅尼門佛言無邊莊嚴此是出離一切文字印法一切諸法悉入其中云何名入以平等故一切諸法皆入平等亦不見法入於平等不可了知不可得故於一切法自性如實不分別時一切諸法悉入其中離於無作及有作故由諸文字及以語業演說諸法如是二種不如實故性平等故所有文字及以語業皆悉平等於諸法中所有言說皆非如實此是諸法如實句義所有文字及以語業此二皆無以無有故無有真實開示演說所言文字及以語業無真實者即是諸法無差別句無增勝句無建立句此甚深法不可宣說一切諸法皆非真實非不真實何以故諸法本性非以文字語業宣說可見可得一切諸法皆無本性如是諸法非作非不作非等非不等非寂靜非不寂靜然於諸法亦住寂靜及不寂靜所言住者亦無所住亦不變異亦復不住不變異法何以故法無住故不入算數非由算數建立言教而能令法入於算數一切文字語業演說皆不可得不住於處及一切處如是文字及以語業無所從來去無所至不住中邊一切文字及於語業業非業故非功用故以於一切文字語業自性空故文字語業亦復皆空亦以文字語業他性空故他性亦空乃至自他性空故自他性亦空自他空故彼則寂靜若寂靜者彼則寂滅若寂滅者彼一切法即寂滅門由彼彼門得說法名若說文字若說語業彼一切門亦不可得門清淨故無所有故由彼彼門演說諸法而於此門究竟清淨能平等入於一切法如是厭離云何厭離謂貪本性貪本性者彼則清淨若清淨者彼則究竟若究竟者云何有貪云何有說無邊莊嚴如是略說無有分別無有戲論法門清淨陀羅尼門入是門故能破無明黑暗重障能隨憶念明法種性於一切法得入光明清淨法眼陀羅尼門及能證得文字差別演說法門由是門故便得入於一切智智及得近於諸佛如來於諸法中得為勇健能破外道降伏魔軍令諸衆生增長善根入於如來祕密之法隨得法門陀羅尼門由是法門於十力中獲大法光速疾成就如來之力無邊莊嚴諸佛如來以十力為力為無上力超過一切世間之力能於衆中作師子吼何等名為如來十力無邊莊嚴如來於此以無上上一切智智於處非處以處非處如實了知此是如來第一之力由此力故處大仙位為諸衆生演說正法及能為轉無上法輪唯除如來天人世間先無有能如法轉者復次如來以無分別一切智智如實了知過去未來現在諸業業攝取因善與不善無量行相無著無礙此是如來第二之力復次如來以無分別一切智智無著無礙能善了知一切有情無量諸行此是如來第三之力復次如來以無上上一切智智如實了知種種勝解無量勝解各各勝解所有分別及妄分別此是如來第四之力復次如來能如實知無量界種種界無量緣種種緣世間住處此是如來第五之力復次如來能如實知若因若緣知見趣道此是如來第六之力復次如來以於天眼無礙智見及以無上一切智智如實了知諸有情等生死之智此是如來第七之力復次如來能如實知靜慮解脫等持等至離染清淨能出入智此是如來第八之力復次如來宿住憶念作證明智如實了知此是如來第九之力復次如來漏盡智證明智如實了知此是如來第十之力無邊莊嚴如是無量無上一切智力以是智力悉成就故為諸菩薩及諸衆生於諸佛智得攝受故於諸法智證清淨故開示演此無邊法藏佛復告無邊莊嚴菩薩摩訶薩言善男子汝今當觀如來所說如是甚深如是難了一切智智力清淨故所有諸法說名如來及如來力然於彼法亦不可見亦不可說無邊莊嚴所言力者此是如來不可摧伏無上法門於彼安住開示演說此法理趣由斯理趣建立力故能演說此一切諸法無建立性以之為力如是諸力無生起性無有自性離於自性如是如來十力圓滿而能開示無量無邊甚深之義無邊莊嚴此是諸佛無上法門住斯門已便能演說如來十力及能說此力清淨門普清淨門無邊莊嚴我當復為諸菩薩等能於法門得清淨故說陀羅尼汝應聽受陀羅尼曰怛姪地也反他鉢囉二合牟折寧一儞牟折寧二牟折寧三毗鉢囉二合悶折儞四阿折黎五阿毗耶二合引咤儞六鉢囉二合婆怒揭帝七帝誓八摩訶帝誓九阿鉢囉二合底耶二合末囉尼十阿那引靺囉尼十一阿引靺囉拏毗戍達儞十二儞馱那鉢囉二合吠設儞十三突囉阿儞乞屣鉢儞十四靺虞十五靺虞薩嚩黎十六薩嚩囉尾戍憚儞十七母達囉二合十八母達囉二合尾戍憚儞十九薩鉢唎縛嚟二十三漫多鉢嚟嚩嚟二十一阿揭囉引二合弩麼底二十二遏他二合娑憚儞二十三僧羯囉二合尼麼掣憚儞二十四戍嚟二十五戍囉寐唎曳二合二十六阿引褐囉二合尼二十七烏波那末底二十八儞那嚟二合設儞二十九三曼多波嚟普里也二合揭帝三十馱羅引弩揭帝三十一阿儞迷設儞三十二阿傘儞迷設儞三十三陀引囉尼揭帝三十四儞馱那鉢唎戍憚儞三十五阿弩達囉毗婆枲儞三十六跋囇二合三十七跋達囉二合筏帝三十八莫三十九莫企筏底四十珊馱引囉尼四十一烏筏馱引唎尼四十二阿難多鉢囉二合皤吠四十三鉢囉二合步引多鉢唎嚩嚟四十四設儞四十五鉢唎二合些設儞四十六摩訶嚩迦引世四十七阿迦引捨娑牟薩囉尼四十八弭底彌囉迦囉尼四十九薩婆若鉢他上毗輸達儞五十涅槃那鉢他上珊那唎設儞五十一莎訶五十二無邊莊嚴此是陀羅尼印法教法門一切諸法悉入其中若諸菩薩於此法中如說修行具勝辨才差別智慧能善了知最勝出離陀羅尼句云何名為勝出離句陀羅尼曰娑上揭囉阿上鉢演多一蘇迷上嚧囉怛那娑揭囉珊儞折耶二阿毗怛儞三阿三毗怛儞四阿卑靺嚟五拔折囉二合珊儞六涅陛設儞七阿乞芻二合毗儞八阿僧乞芻二合毗儞九阿乞沙二合耶十阿避夜已二合十一乞沙二合耶阿鉢演帝十二阿乞師二合去那乞沙演多薩姪里二合世平十三阿鉢唎乞沙二合曳十四阿毗乞疏二合避儞十五阿毗揭嚟十六阿毗揭羅若那揭囉尼十七莎訶十八無邊莊嚴此勝出離陀羅尼句若有菩薩於此法中精勤修習則能增長智慧如海能以大慈慰喻衆生言我授汝廣大法藥破滅汝等無明黑暗拔除汝等無始無終生死煩惱憂苦毒箭亦令汝等愛縛當解超度一切生死瀑流作大法光使諸衆生善根生長能得究竟永拔濟故如是善人為善導首能令入於一切智智亦復不令有一衆生從此無上大智退失能以大慈普遍一切令諸衆生於未聽受與義相應寂滅厭離無生智門得無礙辨無邊莊嚴若諸菩薩欲說法時云何於此陀羅尼句繫念現前令法不斷謂諸菩薩處師子座以無礙辨思惟如來無量功德由於方便廣大智慧令善巧地極清淨故若諸衆生於聽法所來雲集時當於彼所發生大悲於諸衆生起大慈心以廣大智決定理趣如實開示令不增減知諸衆生意樂差別以善分明決定語業及文字句廣為宣說由是說故能令自身善根增長以清淨法攝受衆生如來能以無量譬喻開示演說如是法聚陀羅尼門汝等若能如是宣說無上正法是則住於佛所作事速疾圓滿四無所畏無邊莊嚴如是菩薩以大方便清淨智慧善能修習起神通業所有諸法即能攝取廣大智聚此中何者起神通業無邊莊嚴若諸菩薩住神足中以如虛空無所依想善能分析大種積聚如來成就無礙智見無邊智見以智見力於一切法得善巧智能善決定無有少法而可了知住無所得住無等等亦不與俱住阿蘭若住無執著住清淨智無有少法不知不見遠離黑暗無有障礙善住無量無邊智見是故如來平等見覺一切諸法如幻如夢及能開示無名法想是故我等應隨佛學如來智慧無有障礙能善了知一切衆生上中下根令諸菩薩安住平等起神通業由是成就神足現前由是神足加持之力於戒定慧及以解脫智見淨施法智善能安住由此能得真實加持攝受無量差別神變於梵世間而得自在處師子座擊大法鼓令諸衆會皆悉歡喜及為衆生作大利益無邊莊嚴譬如大鐵輪圍山王以諸衆生業增上力於此世界圍繞而住不令衆生嗅地獄香聞地獄聲見於地獄如是菩薩於此法中善修學已為諸衆生除滅一切有障礙法授與一切無障礙法如是菩薩以金剛智攝受善巧於此法教悟入甚深住無所得甘露灌灑云何名得甘露灌灑謂煩惱魔蘊魔天魔所不能損縱於死時雖有死魔亦得自在不起死想何以故由彼正士住於空性無相無願於一切法無所分別不生不滅不墮不起不來不去不住不染不淨亦不怯弱無有障礙無有所得捨離憍慢其心謙下內離迷惑善了於外見聞覺知所不能攝了知諸法皆悉平等如實入於如來法中以不虛妄無有變異安住真如此即名為諸菩薩等所入般若波羅蜜門於此住已則能成就無邊智慧由是慧力能使入於不思議智及諸如來祕密言說於一切法能善了知隨覺無間等菩提故隨覺無間不可思議等於菩提不可思議隨覺無間無所分別等於菩提無所分別了知無間及菩提法無所得故彼亦不作無間差別不作菩提平等之想無間菩提不作不壞不集不散於此義中能作業者於此所說寂靜法門而不執著亦不分別諸業果報能善了知業果平等以平等故不得業果亦不分別亦不執著何以故彼於煩惱及以業障獲得輕安遠離結因於諸法門能得照曜於此陀羅尼品能得光明彼住如是清淨門故能於十方世界遊化具清淨行無所住著不為世法之所染污於諸世間天人之中堪為福田親近供養無邊莊嚴我說供養住第八地諸善男子功德無量何況菩薩於如是法而修行者若於菩提及以衆生衆生之法乃至世間之法無有所得亦不分別及諸戲論彼人則能了知此法如說修行能消世間廣大供養應以如來供養而供養之無邊莊嚴若諸菩薩修學此法於諸供養一切所有皆悉具足離諸怖畏乃至能捨一切身命彼於諸法無所攝受而能攝受廣大之法處無畏座作師子吼降伏外道及外道法摧滅波旬及魔軍衆能除衆生一切覆障當以法船渡諸衆生當示衆生一切智道當能安住一切衆生於隨順道當能令彼一切衆生隨順聖諦不相違逆當為衆生開示一切菩提分法當以法施慰喻衆生當令衆生能得法喜無邊莊嚴若有於此陀羅尼門能忍信受則與得受菩提記人等無有異彼既聞法當於己身而自授記如來法王施設此法開此法藏而能安立此陀羅尼印及能建立此諸法門攝受我等是我等父哀愍我者無邊莊嚴若有菩薩以勝意樂能於我所起於父想彼人當得入如來數如我無異無邊莊嚴於此陀羅尼門法品之中此是第二出離陀羅尼印演說法藏清淨陀羅尼品第三之一爾時世尊觀察四方作如是類種種神通以神通力令此衆會諸菩薩等見於十方無量諸佛及聞諸佛所說之法爾時佛告無邊莊嚴汝觀如來於一切法無有所作無數離數及寂靜數能作如是自在神通如來之力無畏如是無邊莊嚴如來之性不一不異非不一異無所有故非有非無無有自性非無自性應如是知如來之性乃至無有少法可得如是見者亦復無有少法可見若不可見則無所有亦無所取無邊莊嚴如來之性無少真實少不真實若少真實少不真實是則應言有如來性無如來性如來之性離有離無亦不曾離無邊莊嚴一切諸法自性本性猶如虛空如是法門諸佛如來未出世時所未曾說無邊莊嚴若諸菩薩於此法中如是解者則能發生無量辨才於諸法中能為照曜於佛無畏而作光明無邊莊嚴言無畏者謂得如來最上無畏能於少法不攝受故不增長故不可得故不遍得故不隨得故如來出世若不出世法不增減不遍增減諸法自性本性常住法界住性法界定性無邊莊嚴一切諸法住法定性如是無有不可得故一切諸法皆妄分別不以業報而得成就是故能入一切諸法無業報門如是諸法無自性故不如實故諸業於果非生滅因於滅趣道亦復非因如來但以世俗施設說一切法有因非因因自在故無有因故此是如來無畏之地如來具足無量辨才故能得入大無畏地無邊莊嚴云何無畏謂諸如來四無所畏此四無畏緣覺尚無何況聲聞及餘世間何等為四一者唱言我是如來應正等覺一切知者一切見者或有一切天人世間立論於我言我不能覺了諸法無有是處由此能得最上無畏於衆會中正師子吼我能演說無上甚深廣大法教二者唱言我是一切諸漏盡者或有一切天人世間立論於我諸漏不盡無有是處由此能得住於安樂我開示此無量俱胝劫所積集無上法藏三者我所宣說出離覺了於彼修習正苦滅盡或天世間立論於我若苦盡道不出離者無有是處我不見此相我不見此相時得安樂住為諸衆生示現此法種性於衆會中作師子吼四者我所宣說諸障礙法於此或有天人魔梵沙門婆羅門衆立論於我於彼習行無障礙者無有是處我不見此相時得增上安樂住我於衆中正師子吼我能轉此無上法輪一切外道諸天世間所不能轉無邊莊嚴此是如來四無所畏此中菩薩勤修學時速疾獲得無畏之地於人天中最為殊勝無邊莊嚴若諸菩薩由善修習虛空相故則能發生不可思議遍清淨門由是門故於一切法最初了知見一切法等虛空相無二無別一切諸法亦復如是然於虛空亦不分別亦不戲論得義善巧無少法界所從將來亦不將去亦不積集乃能觀察一切諸法無有積集不來不去於一切法行無所行燃大法炬為諸衆生作法照曜無邊莊嚴汝觀此法能為菩薩幾許利益幾許事業謂佛十力四無所畏亦復無有少法可得亦非不得無邊莊嚴一切諸法等虛空相為得義利開示演說業所依事及彼業因於中亦無義利可得無邊莊嚴此甚深法一切世間之所難信一切世間皆是滅壞虛妄建立由是於此法毗奈耶不能信受亦非世間能知世間皆悉非法以執著故言有世間及安住處假使乃至法想執著亦無有法而可執著由於非法起執著故則與如來及所說法共興諍論又不能了一切諸法自性本性復與無生法等相違是故於此甚深法教不能解了無邊莊嚴我為一切天人所信如實語者無諍論者如來世尊息諍論故捨離蘊故開示演說如是法教於中無蘊亦無蘊盡無邊莊嚴一切有者所謂一切善不善法於中都無善不善法善不善法皆悉寂靜善不善法各不相知善不善法不相映蔽以善不善執著因緣是故如來說一切法皆悉無記以彼真實善不善法不可得故若不可得則無有記何以故於中無因無因可見無邊莊嚴汝今當觀一切諸法皆悉無記若諸菩薩如是覺已於一切法無記言說亦不可得如是法門為諸菩薩於不善法如實見故得捨圓滿於法不住以無記門證入諸法是無記門彼則非門若非門者則不可得若不可得彼則清淨此是諸菩薩所入陀羅尼清淨法門由是門故得一切法光明照曜於諸法中無有愚暗迷惑猶豫及能獲得無礙法智慧眼清淨無邊莊嚴於此法中應生願樂云何願樂謂於諸法無所取故無有執著究竟離捨超過攝藏無希求故於善不善一切有為及世間法不觀待故此是無上不放逸地離攀緣地於諸法中無有所住不來不去無所建立此則說名慧眼清淨究竟遠離無所取故善能觀察捨離一切自性本性此名慧眼言慧眼者所謂盡滅厭離智性如是智性無生無作本性寂靜亦復不與寂靜相應斷相應故亦復非斷亦非無斷無缺無減此則名為清淨慧眼無戲論道由是慧眼得成就故以大慈悲攝諸衆生令其發心住緣衆生無盡妙行及能覺了一切諸法無有我人衆生壽者彼若證得大菩提時決定當能開示演說無上法藏及能清淨陀羅尼門為諸衆生種性教法不斷盡故應置法印佛復告無邊莊嚴菩薩摩訶薩言此陀羅尼清淨法門一切諸佛常所護念攝受開演住於十方三世諸佛亦皆宣說如是法門為諸菩薩開示三世平等法性由是能於三世諸法如實悟入此之法門成就菩薩清淨三世總持慧故彼諸菩薩無有世想於善不善了知無二而能生長種種善根身語意業悉皆清淨能遍清淨無量法門為得清淨總持慧故亦能開演無起作性清淨法教復能開示一切諸法畢竟空寂猶如虛空又能示現廣大慧光而為開示清淨智故亦能開示一切諸法及與菩提如虛空性而為示現一切智智道清淨故又能開示清淨道法即是菩提隨其所願得圓滿故能正了知演出實諦方便善巧而能宣說無分別諦故能善開示諸佛智慧隨順覺了一切義故無邊莊嚴若諸菩薩於此法中善修學者能速清淨菩提資糧得住菩提無有遠近不與少法共相違背亦不於此所說諸法而見遠近不以法及非法隨見菩提通達菩提絶諸顯示能以平等無顯示義了知菩提及觀諸法寂靜義時不分別菩提亦不見寂靜不寂靜義非寂靜外見不寂靜無有少分能觀見想於一切處能清淨見亦無少有可能清淨此是諸菩薩清淨智門由此門故而能隨念諸佛如來無邊法藏陀羅尼門能遍了知諸有情類自性本性為諸有情開示演說此諸法藏能遍清淨諸智慧業諸所願求於阿耨多羅三藐三菩提現等覺已增上意樂終不退轉及能隨念善清淨願於一切法速得自在而能習行諸佛如來大慈大悲一切如來善巧法藏皆現在前及能示現無量無邊大法光明身常安住諸佛智境無邊莊嚴此無量無邊法門誰之增語無邊莊嚴無量無邊者謂一切法地水火風虛空識界皆無量故欲界色界及無色界諸有情界無有量故然無少分諸有情界可得了知有情無故如是如是此有情界不可得不可了知界無有故是故諸法等涅槃界趣入涅槃一切諸法皆同趣入不可說處於涅槃界無有少分而可說故涅槃界中無有障礙亦無蓋覆障礙蓋覆永清淨故是故涅槃界清淨最清淨是涅槃界界亦非界遠離界故無有界故超過界故然以似界方便顯說所言界者安住非界及非非界於言說中亦無有界但以語言顯說諸法所有言說及能說者皆不可得不可了知一切言說即非言說如是一切言說如虛空性等入虛空由是地界不能言說無能說力乃至空界不能言說無能說力言識界者由是但以語言顯說諸法而彼識界界亦非界不入諸界不與界相應非不相應從虛空生入於虛空如是識界不在內不在外不在中間隨其空分之所攝受趣入虛空不可施設不可覩見若不可施設彼無所作餘緣相應說有識界此是菩薩之所入門一切諸法本性自性猶如虛空以依法界開示演說而亦無有諸法之界界非界故一切諸法猶如虛空是故如來說一切法皆是虛空量難得故顯一切法皆虛空性諸法本性如虛空故但以語言開示演說無邊莊嚴汝觀如來智所演說爾所清淨彼無法可生亦無法授與如是清淨法教是諸菩薩不顛倒智是故汝等應當願樂不由他緣智得無分別不增分別及能清淨不可言說理趣法門由一切法智清淨故佛告無邊莊嚴諸飛鳥類於何所行無邊莊嚴白佛言世尊行於虛空佛復問言虛空復何所行答言世尊如是虛空無有所行佛言如是如是一切諸法猶如虛空無有所行行無所行法不可得是故諸法無有所行亦復不行諸法本性無有可行及無可說而此法門為諸菩薩得虛空智清淨故轉此是無邊光明法門普遍照耀無量無邊猶如虛空彼之光明普遍照耀亦不可見菩薩得是門已能遍觀察十方世界及能隨見一切世間無邊莊嚴此是菩薩智所知地通達智地而非一切他論者地彼不能說故此法理趣是不可說法印語言顯示不可得故是故一切諸法不印亦不增印了知不印修習善巧故以虛空印印一切法以無相印能示現彼虛空無相無有為相無語言相以空無故說此虛空所言虛空彼無實體故說為空以真勝義應知諸法無言彼岸無邊莊嚴我於此中當說陀羅尼印能清淨句為虛空句智清淨故如空無句無句清淨如是應當了無諸句其句云何即說呪曰毗筏嚟一毗筏囉引弩娑呬諦二鉢囉引二合弩儞三儞珊那上尾筏囉尼上四阿毗夜二合筏迦引賖珊㮈設儞五鉢囉二合皤去嚟六鉢囉二合皤去囉弭輸達儞七涅毗羯鞞八阿引迦去賖三摩筏娑囉尼上九儞省霓十省上伽上波揭底十一省上去伽去毗牟折儞十二阿引娜上馱儞十三阿引馱去曩毗揭帝十四薑去乞沙二合掣去那鉢唎羯麼十五遏掣去泥十六阿弩鉢掣泥十七阿三去冥十八地毗耶二合十九若曩阿引呵囉寧二十鉢囉二合攘斫芻毗輸馱儞二十一設黎耶二合引播那耶儞二十二地孕二合祇烏怛囉尼上二十三阿喻雞二十四阿毗喻雞二十五阿三鉢囉二合喻雞二十六阿毗鉢囉二合喻雞二十七阿紇囉二合鉢馱涅賀嚟二十八涅提賖鉢馱毗輸達儞二十九阿底多引那揭多鉢囉二合底逾二合般那毗輸達儞三十訖唎二合多鉢唎二合羯麼毗儞諦三十一曩多引囉他二合弩揭諦三十二阿僧羯囉二合冥三十三阿訖囉鉢馱毗輸達儞三十四鉢馱鉢囉二合陛馱攘那毗輸達儞三十五涅皤斯三十六阿去皤去婆毗輸達儞三十七三漫多㮈賖地賖毗耶二合筏盧羯寧三十八弭囉引瘧上鉢馱涅訶嚟三十九鉢囉二合若弭輸地四十嗚上皤去娑阿鉢囉二合冥迦囉尼四十一阿矩羅波二合達摩㮈唎設那弭輸達儞四十二步多去遏囉他二合珊㮈唎設儞四十三阿怒耄馱遏他二合弭輸誕儞四十四娑竭囉質多弩鉢囉吠世四十五謎嚧鉢唎僧薩他二合引寧四十六囉濕弭二合鉢囉二合多鉢儞四十七薩婆路迦引地鉢帝耶攘囊尾輸誕儞四十八阿鉢囉二合底褐多四十九阿僧伽攘那㮈唎二合設寧五十佛言無邊莊嚴此諸陀羅尼印能清淨句演說虛空分段之句無有分段遍無分段無分段故於中無句無句清淨由一切法句清淨故為彼發趣住大乘者希求甚深清淨法者由如來力所加持故此諸呪句而得流布無邊莊嚴若善男子愛樂現證大菩提者欲為衆生作利益者於此呪句雖未曾聞而能悟解若有非人或淨居天持此呪句當授與彼若有發趣阿耨多羅三藐三菩提者諸天子等亦持此呪而授與之即說呪曰烏波僧荷嚟一娑荷嚟二紇唎二合三室唎二合地唎二合底弭輸誕儞四羯量曩遏他二合涅弟閃鉢囉二合底皤底五質多末弩弭攘那弭輸誕儞六阿引地耶二合怛麼二合麼呬遏馱鉢唎輸誕儞七揭底枲蜜里二合底末底八阿引褐囉儞岌多九岌多鉢底十薩嚟十一薩囉筏底十二佛言無邊莊嚴有諸天神住雪山中彼等天神若如來力之所加持而能授與諸說法者法之光明即說呪曰末底弭輸誕儞一蘇育多寐唎曳二合二阿竭囉二合呬多鉢馱涅荷唎三阿枳邏引枲儞四阿弭邏枲儞五鬱他引曩三半寧六弭儞多三麼引那鉢底七末底阿揭羅二合怒蘖諦八
