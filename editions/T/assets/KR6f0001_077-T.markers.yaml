  - {type: variant, offset: 4526, length: 2, content: 歡喜, 宋: 歡喜摩訶耐摩陀比丘復問那羅延法師那羅延言一切功德光明王佛時有一比丘問如是事如汝今問佛如是答時是比丘聞已歡喜, 元: 歡喜摩訶耐摩陀比丘復問那羅延法師那羅延言一切功德光明王佛時有一比丘問如是事如汝今問佛如是答時是比丘聞已歡喜, 明: 歡喜摩訶耐摩陀比丘復問那羅延法師那羅延言一切功德光明王佛時有一比丘問如是事如汝今問佛如是答時是比丘聞已歡喜, 宮: 歡喜摩訶耐摩陀比丘復問那羅延法師那羅延言一切功德光明王佛時有一比丘問如是事如汝今問佛如是答時是比丘聞已歡喜, 聖: 歡喜摩訶耐摩陀比丘復問那羅延法師那羅延言一切功德光明王佛時有一比丘問如是事如汝今問佛如是答時是比丘聞已歡喜, 聖乙: 歡喜摩訶耐摩陀比丘復問那羅延法師那羅延言一切功德光明王佛時有一比丘問如是事如汝今問佛如是答時是比丘聞已歡喜}
