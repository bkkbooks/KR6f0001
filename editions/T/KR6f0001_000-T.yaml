body:
  text: 大寶積經并序大唐太上皇製朕聞天之為大也高上下之容可紀地之為大也廣縱橫之數可推則知無去無來不生不滅拯沈淪於沙劫救焚灼於塵區毒龍懼其威光醉象憚其神力其大則包於宇宙其小則隱於毫芒七十二君先在陶鈞之內萬八千載即為俄頃之間漢日載其通暉周星彰其降誕鷲頭峯下演金口之微言雞足山中舒玉毫之瑞色干戈不用梵志摧鋒甲冑無施波旬潰旅闢圓明之淨域啟方便之禪門慧晷耀於昏衢慈雲清於朽宅無得而稱者其惟正覺乎然則教自西方法流東夏馬鳴龍樹肇闡瓊編羅什道安承宣寶偈關中道俗雖傳貝葉之文江左黎元未極蓮花之旨又以元魏迷於釋典宇文扇於魔風開皇之初暫為修建大業之末遽即分崩我大唐之有天下也叡聖重光文思御曆吞沙靜㜸練石稱神巢燧執鞭羲農擁篲懸法王之鏡轉梵帝之輪被正朔於蟠桃混車書於細柳三藏沙門菩提流志者南天竺國淨行婆羅門種姓迦葉氏也年十有二外道出家事波羅奢羅學聲明僧佉等論并曆數呪術及陰陽等年踰耳順遽乃心歸知外法之乖違悟釋教之深妙隱居名岳積習頭陀初就耶舍瞿沙三藏學經論其後遍遊五天竺國高宗天皇大帝聞其遠譽挹其道風永淳二年遣使迎接天后聖帝應乾司契當宇披圖令住東都居福先寺譯佛境界寶雨花嚴等經一十一部中宗孝和皇帝循機履運配永登樞神龍二年令住京下於崇福寺翻譯此經俄屬靈祐虧徵綿區集禍喬岳之仙長往茂陵之駕不還朕以庸虛謬膺丕構敬遵前旨勗就斯編法師尋繹故文發揮新句炎涼不懈曉夕忘疲舊翻新翻凡有四十九會總其部帙一百二十卷成以先天二年六月八日畢功進內法師戒珠在握慧炬明心為法門之棟梁啟僧徒之耳目伏願上資七廟八百之祚長延下及萬方億兆之甿恒逸遠邇寧謐朝野歡娛致澆俗於淳源歸迷生於壽域暫乘紫機之暇聊題緗帙之前所有會名具於其目云爾大寶積經述唐朝議郎行河南府告成縣主簿徐鍔撰夫日月出矣而輝耀十方時雨降矣而澡漉萬物況我身常樂湛虛空之相妙覺圓明融心行之本唯曒唯昧不生不滅者哉是以闢無學之地聿修迦蘭啟息言之津亶作羅奈智勝菩薩起方便之緣淨居天人發成就之力稱謂所絕者其第一義乎自恒星夜掩仙虹晝爍青鉢傳其睟容寶棺現其金臂法山摧仞拂魔箭於危屏直水橫流係慈航於彼岸烏虖妙藏不可以常祕戒輪不可以終雖雙林下砉示於泥洹逮一千年遹被於聲教龍持貝葉亟傳摩竭之城象負蓮華遂滿真丹之境三十七品慈悲於火宅一十二經引喻於沙界矣大寶積經者後漢迦葉摩騰竺法蘭及今朝玄奘法師菩提流志等咸自西天竺所致也如來昔在鷲峯利建平等金口注海酌之而不竭寶言如綸振之而有緒烱茲瑞憲久翳鴻都原壑屢非市朝多變歷代侚齊之主競興參譯跋陀授記之言罕能丕就洎我唐之有天下也功橫鐵圍化緜忉利苑禦千界提封萬剎張四攝之扉廣納諸有騁六道之驥冥濟群惑太上皇以澤深智海掌耀禪珠神皇帝以勛格梵空胸懸法印肅敷玄誥照灑鴻波歷選緇徒明𫾻列寀博考同異聿興刊緝勇振頹綱嚴持絕紐爰有沙門大德思忠東天竺國婆羅門大首領臣伊舍羅等譯梵文者求善住緣悟無生忍博聞強識精而譯之復有天竺沙門波若屈多沙門達摩證梵義者開忍辱場破煩惱眾弼諧神侶明而辨之復有沙門大德履方宗一普敬慧覺等筆授者令聞孔膠威儀不忒手握仙札受而字之復有沙門大德深亮勝莊塵外無著慧迪等證義者國之大師佛之右臂探諸了義演而證之復有大德沙門承禮雲觀神暕道本等次文者庇影多林息肩香窟勤修精進纂而次之復有潤文官者銀青光祿大夫邠王傅上柱國固安縣開國伯盧粲銀青光祿大夫太子詹事崇文館學士兼修國史上柱國東海縣開國公徐堅朝議大夫守中書舍人崇文館學士上柱國野王縣開國男蘇晉朝議郎給事中內供奉崔璩等位列鳳舞聲流雞圃分別二諦潤而色之復有銀青光祿大夫守侍中兼太子左庶子兼修國史上柱國鉅鹿縣開國公魏知古兵部尚書上柱國郭元振銀青光祿大夫檢校中書令上柱國范陽縣開國男張說銀青光祿大夫行中書侍郎同中書門下三品監修國史上柱國興平縣開國侯陸象先等朝踐瑣闥夕遊珠域護持四法總而閱之爾乃杖錫之士端珪之俊麻列定筵林攢樂土蔭祥雲而演譯倐換炎涼吸甘露而勤求載淹衡晷大乘章句義不唐捐小品精微拯無遺溺能事畢矣佛何言哉今所新翻經凡有四十九會七十七品合一十二帙以類相從撰寫咸畢以先天二年六月三十日進太上皇八月二十一日進皇帝禁闈曉闢真教上聞仙宁克怡宸襟允穆竦鈞陣於白日親御靈臺落雲雨於彤霄荐加殊尉賢愚稽首以為利見仁王真俗歸心以為潛登覺道次有清信佛弟子前少府監丞李式顏等皇朝金紫光祿大夫兵部尚書贈侍中隴西公逈秀子也復有清信佛弟子前右拾遺徐鐈等皇朝銀青光祿大夫太子賓客昭文館學士高平公子也咸屬彼穹降禍私門墜構陟遙岵而崩心瞻冥途而獻福於是胠篋探笥檀波羅蜜廣疊簡牋首崇書寫不變槐火遽盈苔袟然後裝之鏤軸綴以瓊籤羅綵簟而霓舒播珠函而錦縟方使猛風吹嶽長存妬路之文劫火燒天不壞多羅之典
