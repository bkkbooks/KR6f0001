body:
  text: 復次電得菩薩成就如是智已於諸衆生根行意樂善巧了知若見多貪衆生為欲調伏療其病故示同凡夫現受諸欲具有妻子家業資生猶如蓮花而不染著有諸衆生癡無智慧不知菩薩善巧方便而作是念何有智者貪受諸欲不異凡夫便謂菩薩遠離菩提如是衆生心不淨故起大瞋忿不生敬信由此業故身壞命終墮大地獄復以菩薩密化因緣罪報畢已決定當得入於平等電得譬如猛火隨投草木一切熾然悉成於火菩薩亦復如是智火熾然所有衆生若貪瞋癡若善不善菩薩於彼與之同行一切熾然皆成智慧是名菩薩不共之法又如須彌山王不共之相所謂四面四寶所成隨諸衆生青黃赤白種種色相彼若往詣琉璃面者皆同一色如彼琉璃詣金色面皆如金色銀頗梨色悉皆同等菩薩亦復如是得不共法隨諸衆生若貪瞋癡若善不善至菩薩所與之同行一切皆令入菩薩智彼心不淨自惡業故或墮地獄餓鬼畜生閻摩羅界以是菩薩不共功德及願力故罪報畢已決定當得阿耨多羅三藐三菩提電得過去無量無邊阿僧祇劫五濁世時有佛出現號曰寶聚功德聲如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊時世壽命百二十歲如我今日彼諸衆生極重貪欲瞋恚愚癡煩惱覆蔽違逆父母兄弟朋友不順和上及阿闍梨不知恩德常懷毒害姦詐賊心互相破壞非理而行於佛法僧不生敬信慳吝鄙弊行餓鬼法彼佛剎中有如是等諸惡衆生難可調伏時彼世尊亦以往昔誓願力故於此惡世得阿耨多羅三藐三菩提其佛復有二萬二千大聲聞衆彼時有王名曰廣授自在王化統閻浮提於佛法中信心清淨請彼如來及比丘衆於夏安居廣設供養爾時有一法師比丘名為無垢具足辨才善巧說法衆所樂聞開示衆生常不疲倦凡所說法無有希求容相熙怡先言問訊色力具足顏貌端嚴為諸衆生之所樂見供養恭敬尊重讚歎復有新學年少比丘常隨無垢出入王宮無有障礙種種供養衣服飲食臥具醫藥時彼衆中多有比丘不知修習身戒心慧不敬佛法及以衆僧常見斷見及我見等謗於佛法輕躁難調不攝諸根住於非法無沙門行自稱沙門身口意業悉皆邪僻時彼世尊過安居已便入涅槃其王廣授以赤栴檀闍維供養造立八十俱胝寶塔以赤栴檀而為欄楯四面皆有金色蓮花無垢比丘佛所記別多聞第一於佛滅後弘宣正法隨所遊行城邑聚落教化無量百千衆生皆令住於阿耨多羅三藐三菩提爾時多有諸惡比丘不知修行常懷嫉妬為魔所惑詣彼王所而作是言王所師敬無垢比丘出入王宮無有禁制而彼比丘未離貪欲非時而食香鬘嚴身實非梵行不應供養我為此事來告於王莫於過後佛正法中而生不信時有一魔名為極惡即自變身作比丘像復詣王所如前重說時廣授王數聞此語即作是念無垢比丘精勤有智我所尊重若有此事終無是處作是念已爾時魔衆於虛空中便現半身向彼王所而說偈言王應學伎藝善識於機宜廣授不能知非是人王相佛羅漢弟子已具於大智如是語不依云何隨斷見比丘為利益告汝以誠言斷見惡趣人實非修梵行彼人於宮內共婇女娛樂王應與侍從親覩離疑心王聞如是事心生大驚怖即便將侍從速疾詣宮中無垢時在宮演說第一義諸法自性空無我無壽者王與諸兵衆俱為魔所惑見宮中婇女圍繞於比丘瞋猛如醉象便敕旃陀羅比丘污我宮當治以苦法臣佐及眷屬皆為魔所持於無罪比丘隨忿而生害魁膾持刀進無垢便悲泣王語汝非法何故而復悲無垢白王言是事難自表且待須臾間我當有明證王聞比丘言即止於魁膾當試作何事汝應速宣說成就勝意樂行慈利世者合十指爪掌而發於誓言大王汝當知若實無此事願地六種動空中雨妙花當發如是言大地六種動空界雨天花魔衆懷憂惱王時生淨信禮足求歡喜我當墮地獄無依願覆護咄哉遇此惡如何起毒心無覆無所依所從唯惡友十方我無護唯有於大師我當捨王位盡壽歸依住比丘知彼王及眷屬志樂為說第一義王聞得正信與百億眷屬捨王位出家修習頭陀行不受他人請時王後宮內婇女八萬人聞說第一義皆住不退轉王依於佛教二十四年中日夜常懺悔罪業猶不盡百俱胝眷屬惡心向法師由此命終後墮於無間獄多億年受苦罪畢遇如來以昔恐怖因餘報常羸劣次第轉修習供養千億佛各於餘國中悉皆成正覺俱同一名字號功德名稱時彼廣授王慈忍比丘所由起毒害意於多億歲中受昔惡業對墮大叫地獄畢此業報已還得於人身值普眼如來親近常供養由此轉奉事八十俱胝佛然後成正覺今則我身是彼比丘欲害無罪法師者當來得作佛彌勒菩薩是時彼王宮內八萬諸婇女淨信植衆德承事無量佛於今復發行大願利衆生當奉千億佛各成等正覺我今告汝等一切勿生害修慈佛所讚速得大菩提是故電得於諸衆生根性志樂不能善知應一切時勿生害心電得譬如諸山須彌為最如來智慧亦復如是於諸智中最尊無上譬如一切諸水之中海為最勝如來智慧亦復如是於諸智中最為深大又如諸國王中轉輪聖王最為尊上如來智慧亦復如是於諸智中為無上上電得如來成就如是智故一切衆生貪瞋癡行心心轉變如來悉知一彈指頃皆能攝受電得如來成就一切種智如明眼人自觀掌中五菴羅果不用功力明了無疑如來亦爾了知一切衆生心行於大衆中種種說法無量無數佛世界中貪行相應諸衆生等為貪熱惱晝夜尋思虛過於時我悉知見為貪熱惱起於身口種種之業我悉知見瞋行衆生瞋忿覆心互相憎嫉以毒害故墮無間處我悉知見癡行相應諸衆生等無明暗迷惑執著樂隨邪見我悉了知有堪任者不堪任者有增進者有退失者於如來乘種善根者於緣覺乘種善根者於聲聞乘種善根者我悉了知如來成就如是智慧處大衆中能了衆生心行差別知非時故默然捨住但作是念此諸衆生於法迷惑不能解了如來具足殊勝根力善知時故堪調伏者勝志樂者能堪忍者受善言者我悉了知如是知已於彼衆生攝受利益是故電得初業菩薩未入正位於諸衆生勝志樂行不能善知若在家若出家皆不應起嫌害之心勿於長夜自致衰惱是故菩薩從初發心當於一切住大乘者生於佛想於餘衆生雖復見彼作諸惡業而亦不起損害之心何以故如來常說若諸衆生於白淨法有少缺減終不能得入於涅槃菩薩若見貪行衆生應作是念彼為貪欲熱惱所燒是我過咎見彼瞋恚及以愚癡熱惱燒者皆悉念言是我之罪何以故我見一切衆生病苦應為求藥方便療治我先誓願除衆生病而今捨置是我過咎菩薩成就如是意樂自省其過於諸衆生深起慈心若遇殺害割截身分於彼怨所生反報心無有是處電得菩薩如是正修行時過去所有不善之業永盡無餘未來不善終不更起電得乃往古昔無量阿僧祇劫然燈佛前有佛名勝生如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊出現於世世界名光明在安隱王城林中而住爾時有旃陀羅名為可畏凶險好殺安忍無慈手塗於血見者皆懼時旃陀羅繫牛其舍方入欲殺牛見驚怖掣繩奔走往於勝生如來林所時旃陀羅持刀隨逐彼牛惶怖墜於深坑其命將終楚痛號吼時旃陀羅見是牛已更增忿怒便入坑中持刀欲殺未下之頃爾時勝生如來於彼林中無量百千大衆圍繞廣為分別緣起法門所謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱如是因緣一切皆是純大苦集電得於此緣中無明於行無思無覺行於無明亦無思無覺乃至生於老死無思無覺老死於生亦無思無覺如是諸法性不可得無行無念無我我所本性清淨各不相知凡夫不聞如是法故執色是我我有諸色色屬於我乃至受想行識亦復如是由此執著我我所故無常計常苦計為樂不淨計淨無我計我生四顛倒顛倒見故無明迷惑不正思惟隨心染著不能破壞有愛繫縛生死輪回相續不斷智者善觀法界相故不見有少我人衆生乃至壽命生老病死繫縛殺害而可得者電得爾時可畏旃陀羅於是時中遙聞如來說法之聲即便覺悟尋止殺心棄所持刀從坑而出往詣佛所頂禮雙足却住一面白言世尊我今願欲於佛法中出家為道佛言可爾善來比丘即成沙門得具足戒爾時勝生如來知彼意樂漸已成熟廣為演說諸菩薩行可畏聞已證無生忍於佛法中永不退轉彼牛得聞如來所說緣起法句其聲微妙心生喜悅命終之後生兜率天得見彌勒成就正信如是電得諸衆生行甚深微密難識難知是故電得菩薩欲求阿耨多羅三藐三菩提者應當善知衆生根行於一切衆生中住平等心無礙之心於一切法常無染著捨諸所有修持淨戒安住忍辱發起精進入諸禪定如實觀察一切法性電得菩薩圓滿如是六法速能證得阿耨多羅三藐三菩提云何圓滿所謂依止一切智智而修行故電得何者是諸菩薩法伏藏所謂菩薩見一切色如實了知本來不生自性清淨菩薩於色得善巧故則能成就四無礙辨何等為四所謂義無礙法無礙詞無礙樂說無礙義無礙者於諸色義無罣礙故云何色義謂第一義云何第一義謂色不可得故成就如是第一義智名義無礙法無礙者於諸色法如實觀察如實了知名法無礙詞無礙者謂於諸色以無礙智善巧言詞種種分別名詞無礙樂說無礙者謂於諸色隨衆生機開示演說無染無著名樂說無礙菩薩成就如是智已普於一切迷惑執著色法衆生隨其性欲以無功用智如應說法而於法界不作二相廣說乃至香味觸法亦復如是電得是名諸菩薩摩訶薩法伏藏菩薩證得此伏藏已為欲調伏於如是等諸境界中迷惑衆生隨其意樂於一一處若一劫若過一劫以種種言詞善巧宣說亦不能得諸處邊際菩薩智慧亦無損減不離法界隨順無二無差別故是名菩薩善巧演說一切諸法無差別相獲得如是法伏藏已能為衆生如應說法令得具足無盡法財生死貧窮悉令永斷電得是名菩薩摩訶薩五種伏藏大伏藏無盡伏藏遍無盡伏藏無邊伏藏菩薩成就如是伏藏圓滿殊勝諸功德故少用功力速得阿耨多羅三藐三菩提說此伏藏法門時電得菩薩得陀羅尼五百菩薩得電光明三昧三萬六千天子發阿耨多羅三藐三菩提心爾時月幢菩薩白佛言世尊如佛所說無功用智是義云何佛告月幢若有菩薩於善法中身心相應攀緣造作是名功用若有菩薩身心調柔無念無依離修行相以彼成就往昔願智億千佛剎所可施為種種示現而於法界亦無所動常演說法無少法相以四攝法成熟衆生亦無衆生而可度者嚴淨一切諸佛剎土而亦不見不淨佛剎常念諸佛不觀色相遊諸佛剎不離法界是名菩薩無功用智菩薩成就如是智故滿足衆生一切希望而於所作亦無染著爾時世尊說此無功用智時三千大千世界六種震動釋提桓因與忉利天於上空中雨曼陀羅花優鉢羅花拘物頭花波頭摩花分陀利花栴檀末香而散佛上天鼓自鳴大光遍照昔未曾見衆生遇者身得清涼爾時世尊告電得菩薩言過去如來應正等覺皆於此處開示演說如是法門未來諸佛當出於世亦於此處開示演說如是法門現在無量阿僧祇世界中諸佛如來為此法門不斷絶故放大光明爾時長老阿難從座而起偏袒右肩右膝著地合掌向佛白言世尊當何名此經我當云何奉持佛告阿難此經名為無盡伏藏亦名說一切法無差別相以是名字汝當奉持佛說此經已電得菩薩長老阿難及諸四衆一切世間天人阿修羅乾闥婆等聞佛所說皆大歡喜信受奉行
