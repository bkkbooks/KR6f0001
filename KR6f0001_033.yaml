body:
  text: 世尊入城時無量諸衆生聞空中所説得眼盡邊智世尊入城時無量諸衆生聞空中所説了知眼自性畢竟空無我皆獲眼清淨耳鼻舌身心色聲香味觸乃至音聲名一切皆如是貪瞋癡忿慢慳嫉誑貢高乃至於放逸當知亦復然世尊入城時無量衆生類於上虛空中聞佛種種名或聞滅壞貪無有等比名或聞滅壞瞋利益世間名或聞了愚癡摧伏憍慢名或聞示世間寂靜導師名或聞現智慧利益世間名或聞現方便饒益衆生名或聞降伏魔無有懟恨名或聞以教法示現解脫名或聞廣度脫諸苦衆生名或聞人中尊運濟世間名聞是諸名已皆得眼清淨虛空及海水乃至於須彌一切皆可量佛智無窮盡若於眼盡得決定成就法身不為難若能成就勝法身當獲無邊總持智若獲無邊總持智彼悟無量諸契經若悟無量諸契經於佛神通不難得若於眼生得決定成就法身不為難若能成就勝法身當獲無邊總持智若獲無邊總持智彼悟無量諸契經若悟無量諸契經於佛神通不難得如是耳鼻舌身心色聲香味并觸法乃至音聲及名等當知一切亦復然爾時大地皆震動大海諸山亦如是阿修羅衆及諸天一切皆悉生歡喜魔及魔軍摧諂曲咸求成就佛莊嚴諸天各處妙宮殿淨心歡喜相慶言導師今已出世間為利一切人天衆地居天衆在本宮亦以淨心相慶慰善哉導師今出現普為世間安樂因空行天衆聞是言咸皆歡喜生淨信以悅意聲稱歎佛導師出現利世間四王天衆聞是言咸皆歡喜生淨信以殊勝音稱歎佛導師出現利世間忉利天衆聞是言咸皆歡喜生淨信以殊勝音稱歎佛導師出現利世間夜摩天衆聞是言咸皆歡喜生淨信以殊勝音稱歎佛導師出現利世間我等當發菩提心志求如來無上智依止天人最勝尊度脫一切衆生類兜率天衆聞是言咸皆歡喜生淨信以殊勝音稱歎佛導師出現利世間如來往昔俱胝劫修習無邊殊勝行示苦衆生安隱道令超生死證涅槃化樂天衆聞是言咸皆歡喜生淨信以殊勝音稱歎佛導師出現利世間他化天衆聞是言咸皆歡喜生淨信以微妙聲稱讚佛導師出現利世間如來已度於生死降伏衆魔并外道成就無上佛菩提拯濟群生登彼岸諸梵天衆聞是言咸皆歡喜生淨信以微妙聲稱讚佛導師出現利世間如是展轉聲遞聞諸梵眷屬皆欣慶導師出現利世間魔軍怖畏懷憂戚上至有頂諸天衆聞佛出現利世間如是展轉聲遍聞修羅損減天增長惡魔宮殿悉空虛諸天眷屬皆充滿以無畏力降邪衆速成最勝大菩提如是剎那天遍知世尊出現利群品善哉世間開導者以清淨眼施衆生世尊入城時貪欲逼惱者聞説不淨觀貪欲滅無餘世尊入城時瞋恚逼惱者聞説慈悲法瞋恚滅無餘世尊入城時愚癡逼惱者聞説智慧法愚癡滅無餘世尊入城時憍慢逼惱者聞説離慢法憍慢滅無餘世尊入城時嫉妬逼惱者聞説離嫉法嫉妬滅無餘世尊入城時忿怒逼惱者聞説離忿法忿怒滅無餘世尊入城時慳吝逼惱者聞説離慳法慳吝滅無餘若修調伏行聞此無邊法便入多聞海成就總持門又聞空中説以華供養佛成就勝功德大悲神變説又聞空中説讚歎如來身生處及種族言音悉殊勝如彼衆生趣神通隨類説眼耳鼻舌身若色若聲等屈伸或俯仰所現皆殊勝如來超世間而作世燈炬示現諸色像皆佛神通力凡夫樂著色為現種種身隨彼衆生類説色無堅固若人多執著如來現神力隨彼器非器為説相違法衆生無量世未曾供養佛剛強難調伏為説於地獄若人迷業道依見樂戲論世尊令彼聞息見戲論聲又聞空中説眼性決定空無來亦無去無相無所有又百千衆生聞空中演説肉眼及慧眼乃至於法眼世尊神變力聞説戒定聲智慧及解脫解脫知見聲衆生若干種如應現神變以隨類言音演説真實法若有諸衆生樂修施戒忍神通隨類説施戒忍辱聲世尊神變力隨衆生根性皆為廣分別令受持演説世尊神變力聞説蘊界處縛解若遠近地位差別相又聞説諸地無量智光明亦聞煩惱習有離有非離世尊神變力聞説人天性由業果不同受生有差別或於女人衆化女莊嚴身空聲説厭離聞者除貪欲若於舍利子深心有淨信大悲隨應現為説無上法拘律陀迦葉劫賓那難陀摩訶迦葉波及憍陳如等隨彼所愛樂聞説聲聞法天及阿修羅及諸夜叉衆毗婁迦眷屬無量鳩槃荼以佛神力聞陀羅弭拏呪一致徙一畢致徙二醫囉上蘇上醫囉三污囊上徙四曼去囊上徙五污企上六阿怒企上七阿乞差羅忙囊夷八陀囉尼儞瑟吒儞名上九多迦儞十伊上名滿多囉十一儞呵上引囉十二阿不唎步底十三儞囉阿去察囉十四微耶乞里夜帝十五阿去察囉縛囉耳帝十六迦上羅嚩呬去寧十七薩攘微蛇呢底攘曩十八鉢囉舍薩帝舍薩多十九鉢囉舍薩多二十多囉𮓃多部名上二十一暗嚩囉暗嚩囉二十二麗羅嚩曩室者二十三質多微嚩耳多二十四質多阿難上多二十五烏閉囉呵嚩耳多部名上二十六囊南上二十七迦上尼上阿迦上尼上微嚩耳多二十八室麗瑟吒二十九阿麼羅寧麼羅三十弗奔沒反理底曩囉始者三十一呵呵里三十二摩摩上里三十三吠囉妮三十四底瑟吒三十五斫芻怩呵囉三十六烏地哩多嚩枳三十七安吒哩三十八句吒哩三十九計都四十蘇計都四十一素頗囉嬭四十二迦囉嬭四十三句素磨上儞曳四十四迦迦𠾆四十五却佉𠾆四十六嗚般羅暮𠾆四十七底瑟吒呬四十八陀羅尼四十九那伽昵呵囉五十般囉羅也底五十一阿底般囉羅也底五十二頞哆囉般提五十三安多囉多嚩地失遮五十四呵呬哩五十五摩佉里五十六醫妮三婆去𠾆五十七底瑟吒呬五十八陀羅妮五十九𮭃多霖反蒲盧若提六十又以毗沙門提頭賴吒等無數殊妙聲説真實呪法如是無量聲善逝神通説神通無有量所説亦無邊或於無佛剎遊戲神通力佛身衆圍繞亦如今所見於不思議剎現無量變化初生行七步捨王位出家道場成正覺思惟所得法為衆轉法輪示現入涅槃及以神變力演説種種法令無量衆生成就殊勝智爾時大悲現諸梵衆圍繞為説修慈法增廣於慈心爾時大悲現諸天衆圍繞為説四攝法增廣四攝行爾時大悲現諸龍衆圍繞為説瞋恚過令捨瞋恚心爾時大悲現夜叉衆圍繞為説損害過令捨損害心爾時大悲現修羅衆圍繞為説鬪諍過稱讚修忍心爾時大悲現迦樓羅圍繞為説乖違過稱讚和合心爾時大悲現乾闥婆圍繞以無邊愛語稱讚於如來爾時大悲現摩睺衆圍繞呵毀外道法稱讚如來教爾時大悲現鬼神衆圍繞廣稱讚如來希有諸功德大悲現神變令百千衆生聞説眼盡邊究竟能通達大悲現神變令百千衆生聞説眼生邊究竟能通達大悲現神變令百千衆生聞説眼邊際究竟能通達大悲現神變令百千衆生聞説眼流轉究竟能通達大悲現神變令百千衆生聞説眼寂靜究竟能通達大悲現神變令百千衆生聞説眼無有究竟能通達大悲現神變令百千衆生聞説眼無生究竟能通達大悲現神變令百千衆生聞説眼寂滅究竟能通達大悲現神變令百千衆生聞説眼無我究竟能通達大悲現神變令百千衆生聞説眼無人究竟能通達大悲現神變令百千衆生聞眼無衆生究竟能通達大悲現神變令百千衆生聞眼無命者究竟能通達大悲現神變令百千衆生聞眼無養育究竟能通達大悲現神變廣為諸衆生呵責於世智不令起愛著大悲現神變廣為諸衆生呵責於世利讚無為功德大悲現神變廣為諸衆生呵責有漏智讚諸無漏慧大悲現神變廣為諸衆生呵責世間禪稱揚出世定大悲現神變廣為諸衆生呵責有漏戒讚無漏學處大悲現神變廣為諸衆生呵責小心過稱揚大心德大悲現神變稱讚修身戒乃至於心慧無漏無所依大悲現神變稱讚滅苦道樂著戲論人諸佛所呵責大悲現神變廣為諸衆生分別眼斷過開示寂滅相耳鼻舌身心色聲香味觸乃至音聲名一切皆如是大悲現神變廣為諸衆生盛年少壯者示以無邊過大悲現神變廣為諸衆生生處憍逸者示以無邊過大悲現神變廣為諸衆生種姓憍逸者示以無邊過大悲現神變廣為諸衆生受用放逸者示以無邊過大悲現神變廣為諸衆生自在放逸者示以無邊過大悲現神變廣為諸衆生於色放逸者示以無邊過大悲現神變廣為諸衆生女人放逸者示以無邊過大悲現神變廣為諸衆生衣服放逸者示以無邊過大悲現神變廣為諸衆生於酒放逸者示以無邊過大悲現神變廣為諸衆生為王放逸者示以無邊過大悲現神變廣為諸衆生於戒放逸者示以無邊過大悲現神變廣為諸衆生智慧放逸者示以無邊過如是覺神通禪巧增上慢財説明眷屬音樂及歌詠是名稱讚歎供養并利養美妙誑諂憍無慚及無愧貢高具足慢放逸貪亦然大悲現神變開示諸衆生心意下劣者為説殊勝想大悲現神變開示諸衆生自輕退屈者為説精進力大悲現神變開示諸衆生貪著財物者為説知足法又化香宮殿及以華宮殿皆挾妙樓閣化佛於中坐又化諸天女住薝蔔華宮皆現於半身持華鬘供養又化諸天女住婆師華宮皆現於半身持金鬘供養又化修羅女住摩利華宮皆現於半身持花鬘供養又化諸天女住青蓮華宮皆現於半身稱讚佛功德又化諸梵天坐真金宮殿而現於全身慈聲稱歎佛又化諸天女種種莊嚴身環珮互摚觸出微妙音聲説諸有為法遷變無堅固愚人妄分別不能如實知如是嚴具聲不從身心出無去亦無來亦無有方所乃至於色心一切皆如是愚者不能思於此生疑惑如是莊嚴具所出妙音聲聞于百千剎解脫無量衆汝等當觀察導師自然智無邊功德身超過愛戲論寂靜無諸過離見治心翳相好以莊嚴身意皆清淨汝觀佛入城猶如師子步鵝王象王行滿足衆生願成就殊勝福真實相莊嚴普令諸衆生瞻仰無厭足汝觀兩足尊具大慈心者雖以少物施獲無量功德能令諸衆生於多百千劫乃至證涅槃果報無窮盡汝觀兩足尊成就無漏戒令諸衆生等恭敬而頂禮無量諸天衆各捨其宮殿不耽樂遊戲親近於導師汝觀魔及民於佛生信樂咸持金柄扇侍奉於左右五百諸魔子以天悅意華共散於如來希求無上慧曾於過去佛稱讚而供養今者遇世尊各各懷欣慶亦以無量辨讚歎於如來爾時有魔子名為捨愛者最初稱讚佛能知眼盡邊亦了眼生邊乃至寂滅相又知眼盡等無邊名義句以善巧言詞為衆生演説而於名義中無著無疑惑了知無去來無取亦無捨自性常空寂遠離於文字亦無能受持讀誦修行者往昔諸如來已曾廣開示得以假名字而實無所説如是自性空超過蘊界處無妄無真實亦無處非處乃至言語斷心行處亦滅愚夫著相故見佛有入城世尊離諸相愚人妄分別世尊入城時若人生歡喜是則相分別當必懷憂戚若離相分別則不見入城乃至行動相得無分別慧若以相見佛則見有入城於生轉法輪一切皆分別若以相見佛乃至生歡喜彼人住魔行魔境常現前若以相見佛當見於變異是人懷憂戚智者應憐愍於法若見得便有失法憂於佛若見生則有涅槃苦若多劫修行了知一切相不分別入城亦無涅槃想若了心相空則住佛行處不分別入城亦無涅槃想若人如是知則見於諸佛亦能了性空畢竟無生滅世尊無量劫修習諸苦行為證於性空愚人不能了世尊入城時百千衆圍繞人及非人等淨心而供養若於剎那頃思惟眼盡邊了達諸相空其福復過彼乃至算數分皆所不能及如是眼生邊邊際與流轉乃至於寂滅當知亦復然耳鼻舌身心色聲香味觸乃至音聲名一切皆如是爾時世尊當入城時以足按地普皆震動諸山傾靡悉向於佛人天為法咸來恭敬爾時世尊當入城時天主人王阿修羅衆并諸夜叉各捨本城來詣佛所歡喜供養爾時世尊當入城時復有無量異類諸鳥鸚鵡孔雀迦陵頻伽覩佛如來殊勝功德於虛空中歡喜遊戲皆出種種微妙音聲爾時世尊當入城時以佛功德威神力故能令無量百千衆生盲者能視聾者能聽不完具者令得完具不安樂者令得安樂爾時世尊當入城時於虛空中聞如是説若以諸相分別如來是人不名供養於佛亦不了知眼盡邊性若離諸相殖衆德本則能了知眼盡邊性以能了知眼盡邊故則能了知諸佛功德於眼盡邊無有執藏於眼生邊無有依止於眼寂靜無有動念是人則為見於如來於眼生邊無有分別於眼邊際無有意謂於眼滅壞無有表示是人則為見於如來於眼無有無有染著於眼無生無有攝受於眼寂滅無有所執是人則為見於如來知眼盡故於根修習知眼邊故於根決定知眼生故於根自在是人則為見於如來知眼無有於色了達知眼滅壞於法觀察知眼無生於道修習是人則為見於如來如實了知眼盡邊故於業差別亦能了知以能了知業差別故是人則為見於如來如實了知眼生邊故於苦差別亦能了知以能了知苦差別故是人則為見於如來如實了知眼滅壞故於苦滅壞亦能了知以能了知苦滅壞故是人則為見於如來如實了知眼無有故於離諸相亦能了知以能了知離諸相故是人則為見於如來如實了知眼無生故於離習氣亦能了知以能了知離習氣故是人則為見於如來又如實知眼無常性於離障礙亦能了知以能了知離障礙故是人則為見於如來又如實知眼無文字於佛智力亦能了知以能了知佛智力故是人則為見於如來又如實知眼不來性於離諸欲亦能了知以能了知離諸欲故是人則為見於如來又如實知修習禪定於離煩惱亦能了知以能了知離煩惱故是人則為見於如來彼人亦能成就如是眼前際智眼無住智眼無生智佛神通智眼下劣智眼殊勝智智下劣智智清淨智戒清淨智身律儀智聲清淨智語律儀智心清淨智處差別智諸心法智心過失智業清淨智心律儀智智過失智聲清淨智蘊差別智蘊因緣智眼遍知智苦出生智無漏戒智戒因緣智苦因緣智苦因盡智諸有為智盡無盡智又如實知十二因緣有所行智無所行智有相無相有為無為建立攝受自他心智又如實知眼盡生邊邊際寂靜乃至流轉無有無生寂滅之性令諸衆生得清淨智諸勢力智精進之智又如實知一異門智一切衆生意樂之智又如實知一切衆生殊勝意樂心清淨智業異熟智諸根界智心變異智慧解脫智遍解脫智勝辨才智又如實知諸惡衆生不樂法者令渴仰智又如實知於諸理趣知時修習無懈怠智又如實知神通之力分析諸法無障礙智又如實知於廣大義及以言教隨解了智又如實知善友同處衣服飲食節量之智又如實知於諸無作陀羅尼法勤修習智又如實知身心無過遠離增減求無上智又如實知神通威力於虛空中現變化身成就無量百千衆生皆令歡喜發淨信智於諸如來樂尊重智於離欲法樂修習智於諸聖衆樂供養智於大菩提樂回向智於陀羅尼樂演説智於諸意樂善觀察智於聖者定善了知智於諸護念能決定智於無邊心善趣入智於無邊頌能演説智於諸欲結能覺悟智於下劣趣不墮落智於惡知識應捨離智於善知識能親近智於諸問答能決擇智於處非處能解了智於地非地能了知智於上中下能分別智有為之智無為之智事物之智非事物智攝受之智非攝受智修習之智非修習智眼非眼智眼共相智眼差別智眼自性智耳鼻舌身乃至名等二十五法亦復如是若人思惟眼因緣性真實空寂畢竟無我是人則能成就如是真實決定心三摩地若人思惟眼因緣起決定了知眼無常相是人則能如實了知眼及因緣畢竟無有耳鼻舌身乃至名等二十五法亦復如是爾時世尊當入城時以足按地現希有事我今略説少分功德普令衆生聞者歡喜天人導師從一毛孔出現無量百千光明一一光明遍無量剎為諸衆生而作佛事若人往昔供養諸佛長夜修行布施持戒彼人得聞如是所説神變之事歡喜愛樂若能了知諸佛神變非諸聲聞所行境界彼人得聞如是神變當生信解發希有心天人導師不思議力現如是等種種神變能令無量百千衆生於諸如來親近供養天人導師不思議力演説無量百千契經令諸衆生聞其所説皆能信受心生歡喜爾時世尊當入城時以神通力於虛空中作如是説知眼盡邊乃至寂滅眼性所因無去無來畢竟空寂耳鼻舌身乃至名等二十五法亦復如是爾時世尊當入城時於虛空中出微妙聲稱讚如來種種名號令諸大衆生信解心今現在世人中師子名為摧伏魔軍法王若有得聞如是名者則能降伏一切邪衆今現在世人中師子名為摧滅貪欲法王若有得聞如是名者則能捨離一切貪欲今現在世人中師子名為摧滅瞋恚法王若有得聞如是名者則能捨離一切瞋恚今現在世人中師子名為摧滅愚癡法王若有得聞如是名者則能捨離一切愚癡今現在世人中師子名為摧滅憍慢法王若有得聞如是名者則能摧滅一切憍慢今現在世人中師子名為摧滅忿恚法王若有得聞如是名者則能捨離一切忿恚今現在世人中師子名為摧滅嫉妬法王若有得聞如是名者則能捨離一切嫉妬今現在世人中師子名為摧滅虛誑法王若有得聞如是名者則能捨離一切虛誑今現在世人中師子名為摧滅諸見法王若有得聞如是名者則能捨離一切諸見今現在世人中師子名為摧滅戲論法王若有得聞如是名者則能捨離一切戲論今現在世人中師子名為正法清淨法王若有得聞如是名者則能解了清淨之法今現在世人中師子名為通達諸業法王若有得聞如是名者則能解了一切諸業今現在世人中師子名為具足神通法王若有得聞如是名者則能成就威德神通今現在世人中師子名為具足諸度法王若有得聞如是名者則能成就六波羅蜜今現在世人中師子名為了達諸行法王若有得聞如是名者則能了達一切諸行今現在世人中師子名生清淨光明總持若有得聞如是名者則能成就殊勝受生今現在世人中師子名色清淨光明總持若有得聞如是名者則能成就殊勝妙色今現在世人中師子名身清淨光明總持若有得聞如是名者則能成就殊勝色身今現在世人中師子名性清淨光明總持若有得聞如是名者則能成就殊勝種族今現在世人中師子名為名稱光明總持若有得聞如是名者則能成就廣大名稱今現在世人中師子名為布施持戒忍辱精進禪定智慧總持若有得聞如是名者則能成就布施持戒乃至智慧陀羅尼門今現在世人中師子名為成就空性法王若有能持如是名者則能演説諸法空義今現在世人中師子名為成就無我法王若有能持如是名者則能演説無生滅義今現在世人中師子名眼清淨總持法王若有能持如是名者則能演説眼盡邊義耳鼻舌身乃至名等二十五法并華鬘香燈傘衣服悉皆如是
