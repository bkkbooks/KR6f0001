body:
  text: 北齊三藏那連提耶舍譯菩薩見實會第十六之四龍王授記品第七爾時難陀優波難陀龍王等九億諸龍見諸龍女設妙供養及聞龍女得授記已生希有心未曾有心作是思惟乃至如來世尊應正遍知希有未有以是如來知諸衆生機根深信如來無有少分不見不聞不證如來正法是其善說能令大衆聞已現知無有時節隨機授法必令得果令諸智者現得證知乃至女人動轉輕躁智慧淺短猶得解佛所說深法況餘智者善能安住如來法中諸弟子衆如諸女人欲心增上瞋心增上癡心增上猶能得知如來所說是故難陀優波難陀龍王及諸龍等於如來所生希有心生未有心為供養故遍閻浮提諸山大海興雲遍覆一切世間普雨香水以成香泥彼香泥氣充滿三千大千佛剎其中衆生聞香氣者皆不退於阿耨多羅三藐三菩提於迦毗羅城縱廣正等六十由旬雨赤真珠遍覆其地復以無價種種衆寶周匝遍覆尼拘陀園復以龍華化成妙堂縱廣正等六十由旬椽柱梁壁皆用七寶復更化作無量樂器為供養故擊出妙音於彼龍花微妙堂中化作九億種種雜色衆花旒蘇懸於堂上以毗琉璃網覆諸寶柱以無價寶遍布堂下其寶柔軟譬如三十三天般籌緘婆羅石其石之色如毗琉璃石觸柔軟如迦遮鄰提迦衣微妙可樂繫人眼目令諸天人愛戀繫念彼諸寶等亦復如是彼諸種種摩尼寶中或有出於涼冷光焰有出青水有出赤水有出白水有出黃水或復有出雜色之水或復有出涼樂之風或有寶珠隨諸衆生所須之事皆悉出之或復有寶出於腴澤或有摩尼堪為明鏡一切大衆皆現其中於迦毗羅大城之中所出人民隨其多少皆現寶中一切大衆皆悉覩見佛及聲聞作此種種神通變化以彼摩尼寶神力故於其地中出於種種雜色寶蓋及以種種雜色寶幢亦有種種雜色寶幡復出種種雜花旒蘇亦有種種雜香旒蘇復有種種雜寶旒蘇復出種種真珠旒蘇復出種種雜色龍幡復出種種衆寶鈴網復出種種雜色良馬諸所出者皆是龍力爾時難陀優波難陀龍王及九億龍驅彼良馬隨而步行右繞三匝以妙迦遮鄰提迦柔軟之寶而散世尊於彼堂下地中所出種種衆寶上升虛空雨於如來及聲聞上復以諸龍無量樂器於虛空中自然出好微妙音聲供養於佛爾時九億諸龍繞佛三匝已在於佛前合掌默然念佛功德瞻仰如來目不暫捨樂佛功德深心安住阿耨多羅三藐三菩提故彼等少時合掌默然念佛功德已偏袒右肩右膝著地合掌向佛五體投地為佛作禮衆共一音以偈讚曰久修威儀百福相悲心離垢行具足棄捨無盡衆寶地世尊出於迦毗城於六年中修苦行如來不得甘露道善逝意猶不退悶以其久修智慧故如來真是天人師為世間故修苦行世人聞已尚不堪況復能以目親覩牟尼過去捨頭目如聖所集菩提心我等聞是不生樂由聞如來苦行故如佛本作忍辱仙為迦利王截手足及劓耳鼻不生恚我等聞是不能忍如佛以身上稱盤為鳥歸投不捨棄我等聞已亦不樂如來過去甚勤苦何故我等心不樂以世尊行極苦故於如來所作惡者墮惡道時佛復悲具足聖慧大導師云何能行不害心修習道行無瘡疣唯願佛說安樂行今此龍衆已發心求於善逝菩提行如佛所說悉能行唯願速說菩提道此諸龍衆甚渴仰唯求不死不生處願說如來安隱行令此衆生易受化爾時世尊見諸龍衆設其供養及聞發願知深信已佛於爾時現微笑相諸佛法爾若現微笑即於面門放種種色無量光明其光遍照上至梵天照已還來從佛頂入爾時慧命馬勝比丘以偈問曰善哉沙門大牟尼非是無因現微笑慈悲導師唯願說無等善慧笑因緣大衆瞻仰求欲聞世尊無量功德行於笑生疑心不樂唯願法王斷衆疑誰於釋迦佛法中今生敬信心欣喜誰令今日魔波旬心意迷亂不欣樂誰於今日能恭事功德法父大導師誰作第一勝供養願釋師子上上說此諸大衆合指掌皆悉對佛瞻仰住唯願導師除疑網為衆演說笑因緣大衆聞已生欣喜能知世尊正法教大智世尊令衆喜隨順正教善安住爾時世尊以偈答慧命馬勝曰深廣智慧大衆師說時梵音具八種清淨其心離穢濁諦聽我說笑因緣此諸龍王敬信心於我設供超一切是等為求佛菩提利益一切世間故悲心增上觀衆生無有導師云何樂我云何得大菩提成熟衆生不疲勞深樂寂定具智慧乘安樂乘心清淨於空無相及無願無量劫來久已修其心平等觀世間如佛所得智慧相慈悲喜心皆平等為令世間安隱故第一悲心憐愍者當得作佛稱其意彼等觀察世間已當成導師號無怨彼等當得甘露時無有魔怨亦無餘恆常演說無我法一向無有世俗說彼諸如來具大悲令諸衆生入佛智是諸善逝說法時一切衆生皆信解彼等世世修道時成熟衆生不為難彼所成熟聞法已當得解脫證甘露諸聞法者悉解脫是諸衆生皆端嚴一切衆生皆能知彼諸如來所說法一切鬼神及畜生無有不解彼佛語一切皆得念法已能解如來甘露法無有衆生聞佛說當時不生愛樂心愛樂彼佛所說者一切皆悉得甘露彼時所有受化者當得解脫生老病及解脫死憂悲苦聞佛說已心無垢如是釋迦牟尼佛說諸龍意答佛子如彼堅智心中轉為得無等菩提故如來授彼諸龍記大衆聞已皆欣喜大衆喜已歸依佛一切皆悉心寂靜鳩槃茶授記品第八爾時復有諸鳩槃茶一億八千萬見諸阿修羅伽樓羅龍女龍王等供養如來聞授記已稱其心意踊躍欣喜生希有心得未曾有如來世尊功德智慧微妙殊勝得如是等希有供養不怪不喜以佛智慧於諸智慧最尊勝故譬如大海不增不減何以故以深廣故如是世尊得勝供養心無增減亦復如是何以故於一切法無所疑故爾時一億八千萬鳩槃茶等為供養故化作一億八千萬蓋皆是七寶之所成就金線寶蓋銀線寶蓋毗琉璃線衆寶之蓋頗梨珠線衆寶之蓋赤真珠線衆寶之蓋馬瑙珠線衆寶之蓋車𤦲珠線衆寶之蓋彼諸鳩槃茶於衆寶蓋懸寶旒蘇有種種色金線寶蓋銀線旒蘇銀線寶蓋金線旒蘇毗琉璃蓋頗梨旒蘇頗梨寶蓋毗琉璃線以為旒蘇赤真珠蓋車𤦲旒蘇車𤦲寶蓋赤真珠線以為旒蘇馬瑙寶蓋頗梨旒蘇又復化作一億八千萬衆寶之車亦種種色甚奇微妙所謂金銀琉璃頗梨真珠車𤦲馬瑙於其車上復更化作一億八千萬衆寶之蓋與車相連一一寶蓋皆有百子其諸蓋莖皆用金銀及以頗梨毗琉璃等於彼寶蓋復化種種寶花旒蘇嚴飾其蓋所謂金花旒蘇銀花旒蘇毗琉璃花以為旒蘇頗梨旒蘇赤寶旒蘇龍珠旒蘇赤真珠花以為旒蘇復以赤真珠網彌覆其上又復化作鳩槃茶樂出種種聲而用樂佛復更化作一億八千萬衆寶色馬調伏駿疾以駕其車爾時鳩槃茶等各乘寶車繞佛三匝以七寶花而散佛上爾時彼諸鳩槃茶等從車而下來至佛前頭面禮已復繞三匝曲躬合掌住立一面以偈讚曰不增不減大牟尼譬如須彌諸山王受此無上供養者如來以得無畏故觀諸衆生但有名及但有用不取著導師以修寂滅定是故智者無貢高牟尼知世猶如幻亦如夢中受欲樂復似水月春時焰如是觀察悉無餘譬如乾城無有實於十方求不可得其城無實但有名佛見世法悉如是一切人天所供養寶車寶蓋及音樂幢花旒蘇合掌等世尊觀知如影響我等設是供養已願我當來得作佛亦願我知世如夢知已說法如世尊我等見諸苦惱者生老病死之所逼願知無死佛菩提說令聞者得解脫於諸無智衆生所願得菩提為說法演說無有垢濁法無道衆中為作導爾時世尊知諸鳩槃茶等深生信已現微笑相爾時慧命馬勝比丘以偈問曰佛非無因現微笑不怪一切為希有如來不怪而現笑我今願聞此因緣一切天人皆有疑見佛口中現微笑唯願斷除諸疑網演說世尊微笑事誰於正法得深信誰能如法見慈父誰佛所讚行供養人中勝者我願聞今日誰於有為行見其過患能棄捨今日誰能住實際清淨心者我願聞誰能降魔及眷屬誰能令佛心欣喜誰能得深有為底我願得聞斷疑心一切大衆合掌住為聞如來笑因緣願斷一切衆生疑兩足尊者說彼記爾時世尊以偈答慧命馬勝言善哉馬勝問是義汝於世間大利益以汝問笑因緣故諦聽馬勝我今說鳩槃茶衆供養我於寂滅法心得住彼等見我不驚怪心生希有起願求彼等今日供養我其心簡擇寂滅法以深心信起大悲於失道者能作道愍衆生故供養我為失道者起慈心此等賢智作是已得捨鬼身生忉利天主恆以慈悲心在天數數教導彼彼於諸法得無疑得為帝釋親眷屬彼於無量恆沙劫一一國土行佛行被大弘誓堅固鎧供養具大正法者彼於無量諸國土心無疲倦令清淨利益大衆作導師當得作佛號不怪彼於諸國行行時是國人必知成佛以此方便未來世雖度衆生無怪心為求無上安隱道淨諸國土都不怪於所作事心無著於大菩提亦如是所問笑因我已答衆生疑心皆得斷大衆離疑得欣喜以定得知彼供養乾闥婆授記品第九爾時復有三億六千萬乾闥婆衆見諸阿修羅迦樓羅龍女龍王鳩槃茶等供養世尊聞受記已稱其心意欣喜踊悅生希有心得未曾有歎言希有未曾有事乃至如來所說法界無有變異而示有作善根增長雖無作者而示作業彼乾闥婆等於此法中如是知已於如來所心生尊重發阿耨多羅三藐三菩提心彼欣喜已為供佛故化作三億六千萬頭羅婆那大龍象王皆有六牙一一牙上化作七池一一池中化七蓮花一一蓮花化作千葉一一葉上化七玉女一一葉間化七侍女以天諸寶為莊嚴具而用莊飾復執天香而用供養復於一一羅婆那象王頭上化作三億六千萬蓋七寶旒蘇懸蓋四邊七寶羅網以覆蓋上復於一一羅婆那象王頭上化作三億六千萬帳皆是諸天妙香所成繒綵旒蘇懸帳四邊化作三億六千萬頭羅婆那大象王已彼乾闥婆等各乘其象鼓天音樂於虛空中旋繞如來三十六匝以天旃檀末天沈水末天多摩羅葉末天真金末曼陀羅花摩訶曼陀羅花曼殊沙花摩訶曼殊沙花波樓沙花摩訶波樓沙花迦迦羅婆花摩訶迦迦羅婆花又復化作七寶之花而散佛上彼乾闥婆等散香花時是香花氣逆風順風縱橫皆去復雨種種天妙香水雨香水時於迦毗羅城縱廣正等六十由旬皆成香泥其香泥氣充滿三千大千世界其中衆生聞香氣者皆悉不退阿耨多羅三藐三菩提奏音樂時其諸音聲遍滿三千大千世界其中衆生聞此聲者亦得不退阿耨多羅三藐三菩提如是一一諸乾闥婆各於三億六千萬象王頭上設其供養令諸玉女有作樂者有作歌者有作舞者彼諸玉女作歌舞時令諸大衆一心觀望復有玉女動身手者散旃檀末者散沈水末者廣作供養如阿修羅所設之事等無異也爾時乾闥婆等各乘羅婆那大象王頭於虛空中繞佛三十六匝已各從象下復繞三匝頭面禮佛曲躬合掌在一面住以偈讚曰世尊勝慧出有頂自既出已復度他一切世間無如佛相好光顏極端正人中最妙無邊稱示現世間不思議不見一法性相異而令衆生住於善無有變異真如法但有言說無餘義無有用事及用者雖然佛化諸群生不來不去亦不生佛能演說如是法雖說諸法體性空世雄而令修習道無有一法能自作世間明者說有作諸法各各不覺知世尊示現一切作如車多集衆分支彼支不知自能作其車功用現可見佛說諸法亦如是諸法各各不相教亦不迭互相覺寤一切亦復不相依法本不生亦不死佛為世諦如是說世諦諸法不全無如世諦法體性住如是知已為衆說世尊如是說諸法大悲所作甚奇特諸法體性不可見如來方便說其性我等願作無邊稱具百福相大導師大悲利益諸世間願作世親如今佛我等願於暗障者隨順貪駛欲流者渴愛所纏百苦者救濟度脫如世尊我等願於衆苦者不見彼岸魔縛者走如猿猴輕躁者救濟度脫如世尊我等願於盲冥者六趣往來疲勞者於己自壞業果者救濟度脫如世尊爾時世尊知彼三億六千萬乾闥婆衆深生信已現微笑相爾時慧命馬勝比丘以偈問曰無邊威德現微笑導師如是非無因願佛速說此因緣斷除衆生諸疑網今見世尊微笑已大衆皆悉為疑網一切願聞微笑義唯願大悲斷衆疑誰於佛法生敬信能得離於諸疑網佛知衆生深信已人天勝者故現笑誰有智慧能隨順如來所說真如法知其念慧解行已在大衆中現微笑一切大衆無異心唯欲樂聞雄猛說合十指掌在首頂一心瞻仰如來面離諸穢濁無憂慮世眼現在故欣喜為除一切心疑惑願大悲說笑因緣爾時世尊以偈答慧命馬勝言我所現笑為世故善哉汝問正是時大衆善根當增長為我微笑授記事馬勝諦聽我所說導師所現此微笑我今當正說彼義汝應欣喜聽我說乾闥婆王敬信佛其心清淨生欣喜依於實法入法已於佛正法生希奇諸法寂滅安不動此等大衆趣實際如乾闥城如是入供養於我無有等如是諸法無有生一切亦復不盡滅大衆思惟如幻住未能解了生疑惑不可說法方便說我以真實故如是彼等入我正法已乘大龍象供養佛觀察菩提無生滅乾闥婆王供養我悲愍愚迷衆生等是故求大一切智彼等發願當作佛令諸愚迷失智者入真實法安住已使得不死寂滅句此等作是供養已捨離鬼身心喜悅定得往生天宮中恆與帝釋相親近得值多億那由他供養無垢諸善逝從一佛剎至一剎於諸佛所得聞法彼等修淨佛行已所得佛土亦清淨化無量衆發道心令其增長佛種子知諸世間性空已亦以此法教導他令衆安住一切智住世無量那由劫彼佛同號無邊慧一一諸佛住於世皆悉無量那由劫演說佛道令他聞如是釋迦牟尼佛說乾闥婆供養報與其授記令得聞馬勝所問笑因緣大衆聞已皆欣喜知彼佛記甚可樂聞是無等佛記已皆悉歸依釋迦文
